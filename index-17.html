<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0D0A1A"/>
<title>Lernur</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Spectral:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
@font-face {
  font-family:'IranSans';
  src:url('https://cdn.jsdelivr.net/gh/rastikerdar/iranian-fonts@main/IRANSansWeb/IRANSansWeb.woff2') format('woff2');
  font-weight:400;font-display:swap;
}
@font-face {
  font-family:'IranSans';
  src:url('https://cdn.jsdelivr.net/gh/rastikerdar/iranian-fonts@main/IRANSansWeb/IRANSansWeb_Bold.woff2') format('woff2');
  font-weight:700;font-display:swap;
}
@font-face {
  font-family:'IranSans';
  src:url('https://cdn.jsdelivr.net/gh/rastikerdar/iranian-fonts@main/IRANSansWeb/IRANSansWeb_Medium.woff2') format('woff2');
  font-weight:500;font-display:swap;
}

:root {
  --bg:       #0D0A1A;
  --bg2:      #130F25;
  --surface:  rgba(255,255,255,.032);
  --surface2: rgba(255,255,255,.058);
  --glass:    rgba(13,10,26,.75);
  --border:   rgba(180,140,255,.12);
  --border2:  rgba(180,140,255,.26);
  --border3:  rgba(180,140,255,.45);
  --text:     #F0E8FF;
  --text2:    #A890C8;
  --muted:    #7A6A96;
  --gold:     #D4A843;
  --gold2:    #F0C864;
  --gold-dim: rgba(212,168,67,.12);
  --gold-glow:rgba(212,168,67,.28);
  --plum:     #9B6DCC;
  --plum2:    #B890E8;
  --plum-dim: rgba(155,109,204,.12);
  --rose:     #E85A8A;
  --rose-dim: rgba(232,90,138,.1);
  --mint:     #5DDBA8;
  --mint-dim: rgba(93,219,168,.1);
  --nav-h:    calc(70px + env(safe-area-inset-bottom,0px));
  --r:        16px;
  --r-lg:     20px;
  --r-xl:     28px;
  /* Mobile font scale */
  --fs-xs:    11px;
  --fs-sm:    13px;
  --fs-md:    15px;
  --fs-lg:    17px;
  --fs-xl:    20px;
  --fs-xxl:   24px;
  /* Touch targets */
  --touch:    48px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}

body{
  font-family:'IranSans','Segoe UI',sans-serif;
  background:var(--bg);
  min-height:100vh;
  overflow-x:hidden;
  color:var(--text);
  overscroll-behavior:none;
}

/* ── GRADIENT MESH BG ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%,  rgba(120,70,200,.15) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(212,168,67,.09) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(155,109,204,.06) 0%,transparent 70%);
  animation:meshShift 18s ease-in-out infinite alternate;
}
@keyframes meshShift{0%{opacity:.7}100%{opacity:1}}

/* ── FINE GRAIN TEXTURE ── */
body::after{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
}

/* ── PARTICLES ── */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── ORNAMENTAL BORDER LINES ── */
.orb-line-t,.orb-line-b{
  position:fixed;left:0;right:0;height:1px;z-index:2;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(212,168,67,.2) 20%,rgba(180,140,255,.3) 50%,rgba(212,168,67,.2) 80%,transparent 100%);
}
.orb-line-t{top:0;} .orb-line-b{bottom:0;}

/* ── APP ── */
#app{position:relative;z-index:5;max-width:480px;margin:0 auto;padding-bottom:var(--nav-h);min-height:100vh;}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  background:linear-gradient(180deg,rgba(13,10,26,.98),rgba(19,15,37,.9));
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border2);
  padding:max(44px,calc(40px + env(safe-area-inset-top))) 16px 14px;
  overflow:hidden;
}
header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold) 25%,var(--plum2) 55%,var(--gold) 75%,transparent);
  animation:headerBeam 6s ease-in-out infinite alternate;
}
@keyframes headerBeam{0%{opacity:.5;transform:scaleX(.8)}100%{opacity:1;transform:scaleX(1)}}

/* ornamental corners in header */
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(180,140,255,.15),transparent);
}

.header-inner{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}

.logo-block{display:flex;align-items:center;gap:10px;}
.logo-sigil{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,rgba(212,168,67,.18),rgba(155,109,204,.14));
  border:1px solid rgba(212,168,67,.35);
  display:grid;place-items:center;font-size:22px;flex-shrink:0;
  position:relative;overflow:hidden;
  box-shadow:0 0 24px rgba(212,168,67,.12),inset 0 1px 0 rgba(212,168,67,.15);
  animation:sigilPulse 4s ease-in-out infinite;
}
@keyframes sigilPulse{
  0%,100%{box-shadow:0 0 24px rgba(212,168,67,.12),0 0 0 0 rgba(212,168,67,.2)}
  50%{box-shadow:0 0 36px rgba(212,168,67,.2),0 0 0 6px rgba(212,168,67,.0)}
}
.logo-sigil::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(212,168,67,.12),transparent);
  animation:sigilSheen 4s ease-in-out infinite;
}
@keyframes sigilSheen{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}

.logo-name{
  font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:700;
  letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold2),var(--plum2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(212,168,67,.3));
}
.logo-sub{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--muted);margin-top:2px;
}

.xp-gem{
  display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,rgba(212,168,67,.09),rgba(155,109,204,.06));
  border:1px solid rgba(212,168,67,.28);
  border-radius:99px;padding:8px 14px;
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;
  color:var(--gold);white-space:nowrap;
  box-shadow:0 0 18px rgba(212,168,67,.1);
  min-height:var(--touch);
}
.xp-gem-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 8px var(--gold);
  animation:gemBlink 2s ease-in-out infinite;
}
@keyframes gemBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.lvl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.lvl-label{
  font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;
  color:var(--gold);letter-spacing:1px;
}
.lvl-info{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.xp-track{
  height:6px;background:rgba(212,168,67,.07);border-radius:99px;
  border:1px solid rgba(212,168,67,.1);overflow:visible;position:relative;
}
.xp-fill{
  height:100%;
  background:linear-gradient(90deg,var(--plum),var(--gold));
  border-radius:99px;transition:width 1s cubic-bezier(.34,1.56,.64,1);
  position:relative;box-shadow:0 0 12px rgba(212,168,67,.4);
}
.xp-fill::after{
  content:'◆';position:absolute;right:-7px;top:-8px;
  font-size:12px;color:var(--gold);
  filter:drop-shadow(0 0 6px var(--gold));
  animation:diamondSpin .6s ease-in-out infinite alternate;
}
@keyframes diamondSpin{0%{transform:rotate(-15deg) scale(.9)}100%{transform:rotate(15deg) scale(1.1)}}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:min(480px,100%);z-index:50;
  background:rgba(13,10,26,.97);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--border2);
  display:flex;justify-content:space-around;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px));
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  border:none;background:none;color:var(--muted);cursor:pointer;
  font-family:'IranSans',sans-serif;font-size:11px;font-weight:700;
  padding:4px 20px;border-radius:14px;
  transition:.28s cubic-bezier(.34,1.56,.64,1);
  -webkit-user-select:none;user-select:none;
  min-height:var(--touch);
}
.nav-btn .nav-icon{font-size:24px;transition:.28s;}
.nav-icon-wrap{
  border-radius:14px;padding:6px 20px;
  transition:.28s;border:1px solid transparent;
}
.nav-btn.active{color:var(--gold);}
.nav-btn.active .nav-icon-wrap{
  background:rgba(212,168,67,.1);
  border-color:rgba(212,168,67,.3);
  box-shadow:0 0 18px rgba(212,168,67,.15),inset 0 0 10px rgba(212,168,67,.05);
}
.nav-btn.active .nav-icon{
  transform:scale(1.15);
  filter:drop-shadow(0 0 6px var(--gold));
}

/* ── SCREENS ── */
.screen{display:none;padding:16px 14px 12px;overflow-y:auto;max-height:calc(100vh - var(--nav-h));}
.screen.active{display:block;animation:fadeSlideIn .32s cubic-bezier(.34,1.36,.64,1);}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── PRONUNCIATION ── */
.pron-hero{
  background:linear-gradient(135deg,rgba(155,109,204,.12),rgba(93,219,168,.07));
  border:1px solid rgba(155,109,204,.3);border-radius:var(--r-xl);
  padding:20px 22px 18px;margin-bottom:16px;text-align:center;
  position:relative;overflow:hidden;
}
.pron-hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--plum2) 35%,var(--mint) 65%,transparent);
}
.pron-hero-title{
  font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;
  background:linear-gradient(135deg,var(--plum2),var(--mint));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:1px;margin-bottom:5px;
}
.pron-hero-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;}
.pron-streak-row{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:14px;padding-top:14px;
  border-top:1px solid rgba(155,109,204,.15);
}
.pron-streak-fire{font-size:20px;animation:fireWave .9s ease-in-out infinite alternate;}
.pron-streak-count{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--gold2);text-shadow:0 0 12px rgba(212,168,67,.4);}
.pron-streak-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;}
.pron-streak-dots{display:flex;gap:5px;}
.pron-streak-dot{
  width:22px;height:22px;border-radius:50%;font-size:10px;
  display:grid;place-items:center;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:700;transition:.3s;
}
.pron-streak-dot.lit{
  background:linear-gradient(135deg,rgba(212,168,67,.3),rgba(232,90,138,.18));
  border-color:rgba(212,168,67,.6);color:var(--gold2);
  box-shadow:0 0 8px rgba(212,168,67,.3);
}

.pron-word-card{
  background:linear-gradient(135deg,rgba(13,10,26,.9),rgba(19,15,37,.95));
  border:1px solid var(--border2);border-radius:var(--r-xl);
  padding:28px 22px 22px;margin-bottom:18px;
  text-align:center;position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
}
.pron-word-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--plum2) 30%,var(--gold) 70%,transparent);
  animation:headerBeam 5s ease-in-out infinite alternate;
}
.pron-de-word{
  font-family:'Spectral',serif;font-size:38px;font-weight:600;
  color:var(--text);letter-spacing:1px;
  text-shadow:0 0 30px rgba(155,109,204,.25);
  margin-bottom:6px;direction:ltr;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
}
.pron-de-word.speaking{
  color:var(--plum2);
  text-shadow:0 0 40px rgba(155,109,204,.6),0 0 80px rgba(155,109,204,.2);
  transform:scale(1.06);
}
.pron-phonetic{
  font-family:'JetBrains Mono',monospace;font-size:13px;
  color:var(--muted);letter-spacing:1.5px;margin-bottom:8px;direction:ltr;
}
.pron-fa-meaning{
  font-size:15px;color:var(--text2);font-weight:700;
  background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.18);
  border-radius:99px;display:inline-block;padding:6px 18px;margin-top:4px;
}
.pron-category-badge{
  position:absolute;top:14px;right:14px;
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;
  color:var(--plum2);background:rgba(155,109,204,.12);
  border:1px solid rgba(155,109,204,.25);
  border-radius:99px;padding:4px 10px;
}

/* difficulty badge */
.pron-diff-badge{
  position:absolute;top:14px;left:14px;
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;
  border-radius:99px;padding:4px 10px;
}
.pron-diff-badge.easy{color:var(--mint);background:rgba(93,219,168,.1);border:1px solid rgba(93,219,168,.25);}
.pron-diff-badge.medium{color:var(--gold);background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.25);}
.pron-diff-badge.hard{color:var(--rose);background:rgba(232,90,138,.1);border:1px solid rgba(232,90,138,.25);}

/* stars rating */
.pron-stars-row{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:10px;
}
.pron-star{font-size:18px;opacity:.2;transition:.3s cubic-bezier(.34,1.56,.64,1);}
.pron-star.earned{opacity:1;filter:drop-shadow(0 0 6px var(--gold));animation:starPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}70%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}

/* attempt dots */
.pron-attempts-row{
  display:flex;align-items:center;justify-content:center;gap:5px;margin-top:8px;
}
.pron-attempt-dot{
  width:8px;height:8px;border-radius:50%;transition:.3s;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
}
.pron-attempt-dot.wrong{background:rgba(232,90,138,.5);border-color:rgba(232,90,138,.7);}

/* tip box */
.pron-tip-box{
  background:rgba(212,168,67,.05);border:1px solid rgba(212,168,67,.2);
  border-radius:var(--r);padding:12px 16px;margin-bottom:14px;
  display:flex;align-items:flex-start;gap:10px;
}
.pron-tip-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.pron-tip-text{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);line-height:1.7;direction:ltr;text-align:left;}

/* slow speed button */
.pron-speed-btns{display:flex;gap:8px;justify-content:center;margin-top:10px;}
.pron-speed-btn{
  padding:6px 16px;border-radius:99px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  transition:.2s;-webkit-user-select:none;user-select:none;
}
.pron-speed-btn.active{border-color:rgba(155,109,204,.5);background:rgba(155,109,204,.12);color:var(--plum2);}
.pron-speed-btn:active{transform:scale(.92);}

/* score strip */
.pron-score-strip{
  display:flex;gap:10px;margin-bottom:16px;
}
.pron-score-item{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 8px;text-align:center;
}
.pron-score-val{
  font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;
  color:var(--gold2);
}
.pron-score-lbl{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:var(--muted);letter-spacing:1.5px;margin-top:3px;
}
.mic-area{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:8px 0 20px;
}
.mic-ring-outer{
  width:100px;height:100px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;cursor:pointer;
  transition:.3s cubic-bezier(.34,1.56,.64,1);
  -webkit-user-select:none;user-select:none;
}
.mic-ring-outer::before,.mic-ring-outer::after{
  content:'';position:absolute;border-radius:50%;border:1px solid rgba(155,109,204,.2);
  animation:micRipple 2.5s ease-out infinite;
}
.mic-ring-outer::before{width:100%;height:100%;animation-delay:0s;}
.mic-ring-outer::after{width:130%;height:130%;animation-delay:.8s;}
@keyframes micRipple{
  0%{transform:scale(1);opacity:.5}
  100%{transform:scale(1.35);opacity:0}
}
.mic-ring-outer.listening::before,.mic-ring-outer.listening::after{
  border-color:rgba(232,90,138,.5);animation-duration:1.2s;
}
.mic-ring-inner{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,rgba(155,109,204,.15),rgba(93,219,168,.08));
  border:1.5px solid rgba(155,109,204,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  box-shadow:0 0 30px rgba(155,109,204,.15),inset 0 0 20px rgba(155,109,204,.05);
  transition:.3s cubic-bezier(.34,1.56,.64,1);
}
.mic-ring-outer.listening .mic-ring-inner{
  background:linear-gradient(135deg,rgba(232,90,138,.25),rgba(155,109,204,.15));
  border-color:rgba(232,90,138,.6);
  box-shadow:0 0 40px rgba(232,90,138,.3),0 0 0 6px rgba(232,90,138,.08);
  animation:micPulse .8s ease-in-out infinite;
}
@keyframes micPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.07)}
}
.mic-status-label{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;
  color:var(--muted);transition:.3s;
}
.mic-status-label.listening{color:var(--rose);text-shadow:0 0 8px rgba(232,90,138,.4);}
.mic-status-label.success{color:var(--mint);}

/* waveform bars */
.mic-wave{
  display:flex;align-items:center;gap:3px;height:32px;opacity:0;
  transition:opacity .3s;
}
.mic-wave.active{opacity:1;}
.mic-wave span{
  display:block;width:4px;border-radius:3px;
  background:linear-gradient(180deg,var(--rose),rgba(232,90,138,.3));
  height:4px;
  transform-origin:center;
  transition:height .07s ease, opacity .07s ease;
}
/* ambient idle animation when listening but quiet */
.mic-ring-outer.listening ~ * .mic-wave span,
.mic-wave.active span{
  animation:micIdle 1.2s ease-in-out infinite alternate;
}
@keyframes micIdle{
  0%{height:3px;opacity:.2}
  100%{height:8px;opacity:.5}
}
/* JS overrides inline height when real audio data available */

/* success auto-advance overlay */
.pron-celebrate{
  position:fixed;inset:0;z-index:200;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .4s;
}
.pron-celebrate.show{opacity:1;}
.pron-celebrate-inner{
  background:linear-gradient(135deg,rgba(93,219,168,.18),rgba(155,109,204,.14));
  border:1.5px solid rgba(93,219,168,.5);
  border-radius:24px;padding:28px 36px;text-align:center;
  box-shadow:0 0 60px rgba(93,219,168,.25),0 20px 60px rgba(0,0,0,.5);
  animation:celebratePop .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes celebratePop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.pron-celebrate-emoji{font-size:48px;margin-bottom:10px;}
.pron-celebrate-text{
  font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;
  color:var(--mint);letter-spacing:1px;margin-bottom:6px;
}
.pron-celebrate-sub{
  font-family:'IranSans',sans-serif;font-size:13px;color:var(--text2);
}

/* result feedback */
.pron-result{
  border-radius:var(--r);padding:16px 18px;margin:0 0 16px;
  text-align:center;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
  display:none;border:1px solid transparent;
}
.pron-result.show{display:block;}
.pron-result.correct{background:rgba(93,219,168,.07);border-color:rgba(93,219,168,.35);}
.pron-result.wrong{background:rgba(232,90,138,.07);border-color:rgba(232,90,138,.35);}
.pron-result.partial{background:rgba(212,168,67,.07);border-color:rgba(212,168,67,.3);}
.pron-result-emoji{font-size:28px;margin-bottom:6px;}
.pron-result-title{
  font-family:'Cinzel Decorative',serif;font-size:12px;font-weight:700;
  letter-spacing:1.5px;margin-bottom:5px;
}
.pron-result.correct .pron-result-title{color:var(--mint);}
.pron-result.wrong .pron-result-title{color:var(--rose);}
.pron-result.partial .pron-result-title{color:var(--gold2);}
.pron-result-heard{
  font-family:'JetBrains Mono',monospace;font-size:13px;
  color:var(--text2);direction:ltr;margin-top:4px;
}

/* action row */
.pron-actions{display:flex;gap:10px;margin-bottom:14px;}
.pron-btn{
  flex:1;padding:14px 10px;border-radius:14px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);
  font-family:'IranSans',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:.22s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;justify-content:center;gap:7px;
  min-height:var(--touch);-webkit-user-select:none;user-select:none;
}
.pron-btn.primary{
  background:linear-gradient(135deg,rgba(155,109,204,.18),rgba(93,219,168,.1));
  border-color:rgba(155,109,204,.4);color:var(--plum2);
  box-shadow:0 0 20px rgba(155,109,204,.1);
}
.pron-btn:active{transform:scale(.95);}
.pron-btn.primary:active{background:rgba(155,109,204,.25);}

/* category selector */
.pron-cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.pron-cats::-webkit-scrollbar{display:none;}
.pron-cat-btn{
  flex-shrink:0;padding:8px 16px;border-radius:99px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text2);font-family:'IranSans',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:.22s;
  min-height:38px;-webkit-user-select:none;user-select:none;
}
.pron-cat-btn.active{
  background:linear-gradient(135deg,rgba(155,109,204,.2),rgba(93,219,168,.08));
  border-color:rgba(155,109,204,.5);color:var(--plum2);
  box-shadow:0 0 14px rgba(155,109,204,.1);
}

/* ── SECTION TITLE ── */
.sec-title{
  font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;
  color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;
  margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.sec-title::before,.sec-title::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(212,168,67,.3),transparent);
}
.sec-title::before{flex:0 0 18px;background:linear-gradient(90deg,var(--gold),transparent);box-shadow:0 0 6px var(--gold);}

/* ── STREAK BANNER ── */
.streak-banner{
  border-radius:var(--r);padding:16px 18px;margin-bottom:20px;
  background:linear-gradient(135deg,rgba(212,168,67,.07),rgba(232,90,138,.05));
  border:1px solid rgba(212,168,67,.2);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
}
.streak-banner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,67,.5),transparent);
}
.streak-fire{font-size:32px;animation:fireWave .9s ease-in-out infinite alternate;filter:drop-shadow(0 0 10px rgba(255,179,0,.7));}
@keyframes fireWave{0%{transform:scale(1) rotate(-6deg)}100%{transform:scale(1.12) rotate(6deg)}}
.streak-num{font-family:'Cinzel Decorative',serif;font-size:22px;font-weight:700;color:var(--gold2);letter-spacing:1px;text-shadow:0 0 12px rgba(212,168,67,.4);}
.streak-lbl{font-size:11px;color:rgba(212,168,67,.65);font-weight:700;margin-top:2px;}
.streak-dots{display:flex;gap:6px;}
.streak-dot{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  display:grid;place-items:center;font-size:11px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-weight:700;
}
.streak-dot.done{
  background:linear-gradient(135deg,rgba(212,168,67,.25),rgba(232,90,138,.15));
  border-color:rgba(212,168,67,.5);color:var(--gold2);
  box-shadow:0 0 10px rgba(212,168,67,.2);
}

/* ── TOPIC CARDS ── */
.topics-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.topic-card{
  background:var(--surface);border-radius:var(--r);padding:18px 15px;
  cursor:pointer;border:1px solid var(--border);
  transition:.25s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
  -webkit-user-select:none;user-select:none;
  backdrop-filter:blur(12px);
}
.topic-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--tc-tint,rgba(212,168,67,.04)),transparent 65%);
  transition:.3s;
}
.topic-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--tc-line,rgba(212,168,67,.4)),transparent);
}
.topic-card .tc-corner{
  position:absolute;bottom:9px;left:9px;width:11px;height:11px;
  border-bottom:1.5px solid var(--tc-line,rgba(212,168,67,.3));
  border-left:1.5px solid var(--tc-line,rgba(212,168,67,.3));
  opacity:.5;transition:.3s;
}
.topic-card:active{transform:scale(.92);}
.t-icon{font-size:28px;margin-bottom:9px;display:block;position:relative;z-index:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));}
.t-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.5;position:relative;z-index:1;}
.t-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;position:relative;z-index:1;direction:ltr;text-align:right;}
.t-prog{height:3px;background:rgba(255,255,255,.05);border-radius:99px;margin-top:11px;overflow:hidden;position:relative;z-index:1;}
.t-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--tc-line,var(--gold)),transparent);transition:width .7s ease;box-shadow:0 0 6px var(--tc-line,var(--gold));}
.t-pct{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tc-line,var(--gold));font-weight:700;margin-top:5px;position:relative;z-index:1;}
.t-badge{
  position:absolute;top:9px;left:9px;z-index:2;
  background:rgba(93,219,168,.12);color:var(--mint);
  font-size:9px;padding:3px 9px;border-radius:99px;font-weight:700;
  border:1px solid rgba(93,219,168,.3);letter-spacing:.5px;
  font-family:'JetBrains Mono',monospace;
}

/* ── BACK BTN ── */
.back-btn{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid rgba(212,168,67,.25);background:rgba(212,168,67,.08);
  color:var(--gold);cursor:pointer;
  font-family:'IranSans',sans-serif;font-size:13px;font-weight:700;
  margin-bottom:16px;padding:10px 20px;border-radius:99px;
  transition:.22s;-webkit-user-select:none;user-select:none;
  min-height:var(--touch);
}
.back-btn:active{background:rgba(212,168,67,.16);}

/* ── LESSON HEADER ── */
.lesson-header{
  background:linear-gradient(135deg,rgba(212,168,67,.09),rgba(155,109,204,.07));
  border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:22px;margin-bottom:16px;position:relative;overflow:hidden;
}
.lesson-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--plum2) 70%,transparent);
}
.lesson-header::after{
  content:'';position:absolute;top:50%;left:-60px;transform:translateY(-50%);
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,168,67,.07) 0%,transparent 70%);
}
.lesson-header h2{
  font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;
  background:linear-gradient(135deg,var(--gold2),var(--plum2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:.5px;margin-bottom:5px;
}
.lesson-header p{color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:1.5px;}

/* ── EXPLAIN BOX ── */
.explain-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;margin-bottom:13px;
  backdrop-filter:blur(10px);position:relative;overflow:hidden;
}
.explain-box::before{
  content:'';position:absolute;top:0;right:0;bottom:0;width:2px;
  background:linear-gradient(180deg,transparent,rgba(212,168,67,.2),transparent);
}
.explain-box h3{
  font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;color:var(--gold);
  margin-bottom:11px;display:flex;align-items:center;gap:8px;letter-spacing:1.5px;
}
.explain-box h3::before{content:'◈';opacity:.7;color:var(--gold2);}
.explain-box p{color:var(--text2);font-size:14px;line-height:2.1;font-weight:400;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;margin-top:8px;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{
  background:rgba(212,168,67,.07);color:var(--gold);
  padding:11px 13px;text-align:right;font-weight:700;
  font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:1px;
  border-bottom:1px solid var(--border);
}
td{padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text2);font-weight:400;}
td.de{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--plum2);direction:ltr;text-align:left;background:rgba(155,109,204,.04);}
td.fa{color:var(--text2);font-size:13px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(212,168,67,.03);}

/* ── EXAMPLES ── */
.example-row{
  display:flex;flex-direction:column;gap:6px;padding:13px;
  background:rgba(212,168,67,.04);border-radius:13px;margin-top:9px;
  border:1px solid rgba(212,168,67,.12);border-right:3px solid rgba(212,168,67,.3);
}
.example-row .de{font-family:'Spectral',serif;font-size:15px;color:var(--gold2);direction:ltr;text-align:left;font-style:italic;}
.example-row .fa{font-size:13.5px;color:var(--text2);}

.rule-chip{
  display:inline-block;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;
  background:rgba(155,109,204,.08);color:var(--plum2);
  border:1px solid rgba(155,109,204,.22);
  margin:3px 3px 3px 0;font-family:'JetBrains Mono',monospace;
}

.speak-mini{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  border:1px solid rgba(212,168,67,.3);
  background:linear-gradient(135deg,rgba(212,168,67,.12),rgba(155,109,204,.08));
  border-radius:99px;padding:9px 18px 9px 14px;color:var(--gold);
  cursor:pointer;font-size:12px;font-weight:700;
  margin-top:8px;transition:.22s cubic-bezier(.34,1.56,.64,1);
  font-family:'JetBrains Mono',monospace;
  -webkit-user-select:none;user-select:none;
  min-height:40px;position:relative;overflow:hidden;
  box-shadow:0 0 14px rgba(212,168,67,.08);
}
.speak-mini::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,rgba(212,168,67,.15),transparent 70%);
  opacity:0;transition:.3s;
}
.speak-mini:active{transform:scale(.9);background:linear-gradient(135deg,rgba(212,168,67,.22),rgba(155,109,204,.14));}
.speak-mini:active::before{opacity:1;}
.speak-mini.playing{
  border-color:rgba(212,168,67,.6);
  box-shadow:0 0 0 4px rgba(212,168,67,.12),0 0 20px rgba(212,168,67,.2);
  animation:speakPulseRing 1s ease-in-out infinite;
}
@keyframes speakPulseRing{
  0%,100%{box-shadow:0 0 0 0 rgba(212,168,67,.25),0 0 16px rgba(212,168,67,.15)}
  50%{box-shadow:0 0 0 6px rgba(212,168,67,.0),0 0 28px rgba(212,168,67,.25)}
}
.speak-mini-icon{
  width:22px;height:22px;border-radius:50%;
  background:rgba(212,168,67,.2);border:1px solid rgba(212,168,67,.4);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.22s;
}
.speak-mini.playing .speak-mini-icon{
  background:rgba(212,168,67,.35);
}
.speak-mini-waves{
  display:flex;align-items:center;gap:2px;height:14px;
}
.speak-mini-waves span{
  display:block;width:2.5px;border-radius:2px;background:var(--gold);
  opacity:.7;transform-origin:bottom;
}
.speak-mini-waves span:nth-child(1){height:5px;}
.speak-mini-waves span:nth-child(2){height:9px;}
.speak-mini-waves span:nth-child(3){height:13px;}
.speak-mini-waves span:nth-child(4){height:9px;}
.speak-mini-waves span:nth-child(5){height:5px;}
.speak-mini.playing .speak-mini-waves span:nth-child(1){animation:waveBar .7s ease-in-out infinite .0s}
.speak-mini.playing .speak-mini-waves span:nth-child(2){animation:waveBar .7s ease-in-out infinite .1s}
.speak-mini.playing .speak-mini-waves span:nth-child(3){animation:waveBar .7s ease-in-out infinite .2s}
.speak-mini.playing .speak-mini-waves span:nth-child(4){animation:waveBar .7s ease-in-out infinite .1s}
.speak-mini.playing .speak-mini-waves span:nth-child(5){animation:waveBar .7s ease-in-out infinite .0s}
@keyframes waveBar{
  0%,100%{transform:scaleY(.4);opacity:.5}
  50%{transform:scaleY(1);opacity:1}
}

.start-quiz-btn{
  width:100%;padding:18px;border:none;border-radius:var(--r);
  background:linear-gradient(135deg,rgba(212,168,67,.18),rgba(155,109,204,.14));
  border:1px solid rgba(212,168,67,.35);
  color:var(--gold2);font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:700;
  cursor:pointer;margin-top:16px;transition:.22s;letter-spacing:2px;
  box-shadow:0 0 28px rgba(212,168,67,.12),inset 0 0 28px rgba(212,168,67,.04);
  -webkit-user-select:none;user-select:none;
  position:relative;overflow:hidden;
  min-height:var(--touch);
}
.start-quiz-btn::before{
  content:'';position:absolute;top:0;left:-120%;width:80%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(212,168,67,.12),transparent);
  transition:.5s;
}
.start-quiz-btn:hover::before{left:120%;}
.start-quiz-btn:active{transform:scale(.98);}

/* ── QUIZ ── */
.quiz-hud{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
  padding:11px 15px;
  background:var(--surface);border:1px solid var(--border);border-radius:13px;
}
.quiz-track{flex:1;height:5px;background:rgba(212,168,67,.07);border-radius:99px;margin:0 12px;overflow:hidden;}
.quiz-track-fill{height:100%;background:linear-gradient(90deg,var(--plum),var(--gold));border-radius:99px;transition:width .45s ease;box-shadow:0 0 8px var(--gold);}
.quiz-counter{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);font-weight:700;}
.quiz-score-badge{
  font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;color:var(--mint);
  background:rgba(93,219,168,.08);border:1px solid rgba(93,219,168,.22);
  border-radius:99px;padding:5px 13px;letter-spacing:.5px;
}

.quiz-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:20px;margin-bottom:13px;
  position:relative;overflow:hidden;
}
.quiz-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(212,168,67,.35),transparent);
}
.quiz-type-tag{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin-bottom:11px;display:block;
}
.quiz-q{font-size:17px;font-weight:700;color:var(--text);line-height:1.75;}

/* OPTIONS */
.options-grid{display:flex;flex-direction:column;gap:10px;}
.option-btn{
  width:100%;padding:16px 18px;border-radius:14px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-family:'IranSans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;text-align:right;
  transition:.22s cubic-bezier(.34,1.56,.64,1);
  -webkit-user-select:none;user-select:none;position:relative;overflow:hidden;
  min-height:var(--touch);
}
.option-btn::before{
  content:'';position:absolute;right:0;top:0;bottom:0;width:3px;
  background:var(--border2);transition:.22s;
}
.option-btn:active:not(.disabled){
  background:rgba(212,168,67,.1);border-color:rgba(212,168,67,.35);
  transform:scale(.97);
}
.option-btn.correct{
  background:rgba(93,219,168,.08);border-color:rgba(93,219,168,.4);color:var(--mint);
  box-shadow:0 0 18px rgba(93,219,168,.15),inset 0 0 20px rgba(93,219,168,.04);
  animation:correctPop .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes correctPop{0%{transform:scale(.96)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
.option-btn.correct::before{background:var(--mint);}
.option-btn.wrong{
  background:rgba(232,90,138,.08);border-color:rgba(232,90,138,.4);color:var(--rose);
  animation:wrongShake .4s ease;
}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.option-btn.wrong::before{background:var(--rose);}
.option-btn.disabled{cursor:default;pointer-events:none;}

/* SCRAMBLE */
.scramble-sentence{
  min-height:58px;border-radius:13px;padding:11px;
  border:1.5px dashed rgba(212,168,67,.3);background:rgba(212,168,67,.04);
  display:flex;flex-wrap:wrap;gap:7px;align-items:center;
  margin-bottom:13px;direction:ltr;
}
.word-chip{
  padding:10px 15px;border-radius:10px;cursor:pointer;
  font-family:'Spectral',serif;font-size:15px;
  transition:.22s cubic-bezier(.34,1.56,.64,1);
  border:1px solid transparent;font-weight:600;
  -webkit-user-select:none;user-select:none;
  min-height:42px;display:inline-flex;align-items:center;
}
.word-chip.bank{background:var(--surface2);color:var(--text);border-color:var(--border);}
.word-chip.bank:active{transform:scale(.88);background:rgba(212,168,67,.12);}
.word-chip.placed{
  background:linear-gradient(135deg,rgba(212,168,67,.18),rgba(155,109,204,.12));
  color:var(--gold2);border-color:rgba(212,168,67,.35);
  box-shadow:0 0 12px rgba(212,168,67,.18),inset 0 0 8px rgba(212,168,67,.05);
}
.word-bank{display:flex;flex-wrap:wrap;gap:7px;direction:ltr;}

/* FILL */
.fill-input{
  width:100%;padding:15px 17px;border-radius:14px;
  border:1px solid var(--border);background:rgba(212,168,67,.04);
  color:var(--text);font-family:'Spectral',serif;font-size:17px;
  outline:none;margin-top:11px;direction:ltr;text-align:left;transition:.22s;
  min-height:var(--touch);
}
.fill-input:focus{border-color:rgba(212,168,67,.4);box-shadow:0 0 0 4px rgba(212,168,67,.08),0 0 24px rgba(212,168,67,.1);}

/* LISTEN */
.listen-btn{
  width:100%;padding:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(155,109,204,.1),rgba(212,168,67,.07));
  border:1px solid rgba(155,109,204,.3);color:var(--plum2);
  cursor:pointer;margin-bottom:15px;transition:.25s cubic-bezier(.34,1.56,.64,1);
  -webkit-user-select:none;user-select:none;
  box-shadow:0 0 28px rgba(155,109,204,.1);
  position:relative;overflow:hidden;
  min-height:var(--touch);
  display:flex;align-items:center;
}
.listen-btn::before{
  content:'';position:absolute;inset:0;

/* ═══ AUDIO ENGINE ═══ */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getCtx(){ if(!actx) actx=new AudioCtx(); return actx; }

function playTone(freq, type, dur, vol=0.18, attack=0.008, release=0.18){
  try{
    const ctx=getCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type=type; osc.frequency.value=freq;
    const now=ctx.currentTime;
    gain.gain.setValueAtTime(0,now);
    gain.gain.linearRampToValueAtTime(vol,now+attack);
    gain.gain.exponentialRampToValueAtTime(0.0001,now+dur);
    osc.start(now); osc.stop(now+dur+0.05);
  }catch(e){}
}

/* ═══ PARTICLES ═══ */
(function(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  const dots=Array.from({length:40},()=>({
    x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
    r:Math.random()*1.2+.2,
    vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.18,
    alpha:Math.random()*.25+.04,
    clr:Math.random()>.6?'212,168,67':'155,109,204',
    twinkle:Math.random()*Math.PI*2
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    dots.forEach(d=>{
      d.x+=d.vx; d.y+=d.vy; d.twinkle+=.02;
      if(d.x<0)d.x=canvas.width; if(d.x>canvas.width)d.x=0;
      if(d.y<0)d.y=canvas.height; if(d.y>canvas.height)d.y=0;
      const a=d.alpha*(0.6+0.4*Math.sin(d.twinkle));
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${d.clr},${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

function triggerConfetti(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const colors=['rgba(212,168,67,.9)','rgba(155,109,204,.9)','rgba(93,219,168,.9)','rgba(232,90,138,.9)','rgba(240,200,100,.9)'];
  const pieces=Array.from({length:60},()=>({
    x:W/2+(Math.random()*220-110), y:H*.35,
    vx:(Math.random()-.5)*10, vy:Math.random()*-14-5,
    r:Math.random()*4.5+2, color:colors[Math.floor(Math.random()*colors.length)],
    life:1, rot:Math.random()*360, shape:Math.random()>.5?'rect':'circle',
  }));
  function step(){
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=.32; p.life-=.016; p.rot+=5;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      if(p.shape==='rect') ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    if(pieces.some(p=>p.life>0)) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  sfxConfetti();
}

/* ═══ STATE ═══ */
const state={xp:0,level:1,progress:{},currentTopic:null,currentQuizIndex:0,currentQuiz:[],score:0,phase:'lesson',totalXP:0};
TOPICS.forEach(t=>{state.progress[t.id]=0;});

/* ═══ SPEECH ═══ */
function speak(text){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.82;
  speechSynthesis.speak(u);
  return u;
}

function speakWithAnim(btn, text){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.82;
  btn.classList.add('playing');
  u.onend=()=>{ btn.classList.remove('playing'); };
  u.onerror=()=>{ btn.classList.remove('playing'); };
  speechSynthesis.speak(u);
}

function toggleSpeak(btn, text){
  if(!('speechSynthesis' in window))return;
  if(btn.classList.contains('playing')){
    speechSynthesis.cancel();
    btn.classList.remove('playing');
    return;
  }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.82;
  btn.classList.add('playing');
  u.onend=()=>{ btn.classList.remove('playing'); };
  u.onerror=()=>{ btn.classList.remove('playing'); };
  speechSynthesis.speak(u);
}

/* ═══ XP ═══ */
function addXP(n){
  const prevLevel=state.level;
  state.xp+=n; state.totalXP+=n;
  state.level=Math.floor(state.totalXP/100)+1;
  updateXPBar();
  showXPToast(n);
  if(state.level>prevLevel) sfxLevelUp();
}
function updateXPBar(){
  const xpInLevel=state.totalXP%100;
  const pct=(xpInLevel/100)*100;
  document.getElementById('xpFill').style.width=pct+'%';
  const romans=['I','II','III','IV','V','VI','VII','VIII','IX','X'];
  document.getElementById('levelLabel').textContent='LEKTION '+(romans[state.level-1]||state.level);
  document.getElementById('xpLabel').textContent=xpInLevel+' / 100 XP';
  document.getElementById('totalXP').textContent=state.totalXP;
}
function showXPToast(n){
  const t=document.createElement('div');
  t.className='xp-toast'; t.textContent='+ '+n+' XP';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1500);
}

/* ═══ NAVIGATION ═══ */
function showScreen(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  sfxNav();
}

/* ═══ HOME ═══ */
function renderHome(){
  const grid=document.getElementById('topicsGrid');
  grid.innerHTML=TOPICS.map((t,i)=>{
    const pct=state.progress[t.id]||0;
    const done=pct>=90;
    return `<div class="topic-card" style="--tc-line:${t.clr};--tc-tint:${t.tint};"
      onclick="openTopic('${t.id}');sfxTap();" data-idx="${i}"
      style="opacity:0;transform:translateY(18px);">
      ${done?`<div class="t-badge">✦ DONE</div>`:''}
      <span class="t-icon">${t.icon}</span>
      <div class="t-name">${t.name}</div>
      <div class="t-sub">${t.sub}</div>
      <div class="t-prog"><div class="t-prog-fill" style="width:${pct}%"></div></div>
      <div class="t-pct">${pct>0?pct+'%':'──'}</div>
      <div class="tc-corner"></div>
    </div>`;
  }).join('');

  setTimeout(()=>{
    document.querySelectorAll('.topic-card').forEach((c,i)=>{
      setTimeout(()=>{
        c.style.transition='.4s cubic-bezier(.34,1.36,.64,1)';
        c.style.opacity='1'; c.style.transform='translateY(0)';
      },i*55);
    });
  },50);
}

/* ═══ LESSON ═══ */
function openTopic(id){
  sfxTap();
  const topic=TOPICS.find(t=>t.id===id);
  state.currentTopic=topic;
  state.phase='lesson';
  showScreen('lessonScreen');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

  const e=topic.explain;
  const hasH=e.tableHeaders;
  const rows=e.table.map(r=>`<tr>${r.map((c,i)=>`<td class="${i===0?'de':i===r.length-1&&r.length>2?'de':'fa'}">${c}</td>`).join('')}</tr>`).join('');
  const examples=e.examples.map(ex=>`<div class="example-row">
    <div class="de">${ex.de}</div>
    <div class="fa">${ex.fa} <button class="speak-mini" onclick="speakWithAnim(this,'${ex.de.replace(/'/g,"\\'")}');sfxTap();" title="بشنو">
        <span class="speak-mini-icon"><svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M1 1L9 6L1 11V1Z" fill="currentColor"/></svg></span>
        <span class="speak-mini-waves"><span></span><span></span><span></span><span></span><span></span></span>
        بشنو
      </button></div>
  </div>`).join('');

  document.getElementById('lessonContent').innerHTML=`
    <button class="back-btn" onclick="showScreen('homeScreen');renderHome();">← بازگشت</button>
    <div class="lesson-header">
      <h2>${topic.icon} ${e.title}</h2>
      <p>LEKTION · ${topic.id.toUpperCase()}</p>
    </div>
    <div class="explain-box">
      <h3>توضیح</h3>
      <p>${e.body}</p>
    </div>
    <div class="explain-box">
      <h3>جدول</h3>
      <div class="table-wrap">
        <table>
          ${hasH?`<tr>${e.tableHeaders.map(h=>`<th>${h}</th>`).join('')}</tr>`:''}
          ${rows}
        </table>
      </div>
    </div>
    <div class="explain-box">
      <h3>قوانین کلیدی</h3>
      <p>${e.rules.map(r=>`<span class="rule-chip">◈ ${r}</span>`).join(' ')}</p>
    </div>
    <div class="explain-box">
      <h3>مثال‌ها</h3>
      ${examples}
    </div>
    <button class="start-quiz-btn" onclick="startQuiz()">✦ شروع آزمون · ${topic.quiz.length} سوال</button>
  `;
  document.getElementById('lessonScreen').scrollTop=0;
}

/* ═══ QUIZ ═══ */
function startQuiz(){
  sfxTap();
  state.currentQuiz=state.currentTopic.quiz;
  state.currentQuizIndex=0; state.score=0; state.phase='quiz';
  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion(){
  const q=state.currentQuiz[state.currentQuizIndex];
  const total=state.currentQuiz.length;
  const idx=state.currentQuizIndex;
  const progPct=Math.round((idx/total)*100);
  const typeLabel={mcq:'انتخاب چندگزینه‌ای',scramble:'مرتب‌سازی',fill:'پر کردن جای خالی',listen:'گوش دادن'}[q.type]||q.type;

  let bodyHTML='';
  if(q.type==='mcq'||q.type==='listen'){
    if(q.type==='listen'){
      bodyHTML=`<button class="listen-btn" id="listenBtn" onclick="toggleSpeak(this,'${q.text.replace(/'/g,"\\'")}');sfxTap();">
        <div class="listen-btn-play">
          <div class="listen-play-circle"><div class="listen-play-icon"></div></div>
        </div>
        <div class="listen-btn-body">
          <span class="listen-btn-label">بشنو و انتخاب کن</span>
          <div class="listen-btn-bars"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        </div>
      </button>`;
    }
    bodyHTML+=`<div class="options-grid">${q.options.map(o=>`
      <button class="option-btn" onclick="checkMCQ(this,'${o.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}');sfxTap();">${o}</button>
    `).join('')}</div>`;
  } else if(q.type==='scramble'){
    const shuffled=[...q.words].sort(()=>Math.random()-.5);
    bodyHTML=`<div>
      <div class="scramble-sentence" id="scrambleSentence"></div>
      <div class="word-bank">${shuffled.map(w=>`
        <div class="word-chip bank" onclick="placeWord(this,'${w.replace(/'/g,"\\'")}');sfxPlace();">${w}</div>
      `).join('')}</div>
    </div>
    <button class="check-btn" onclick="checkScramble('${q.answer.replace(/'/g,"\\'")}')">✦ تأیید</button>`;
  } else if(q.type==='fill'){
    const hintEsc=q.hint?q.hint.replace(/'/g,"\\'"):'';
    bodyHTML=`${q.hint?`<button class="hint-btn" onclick="showHintModal('${hintEsc}');sfxTap();"><span class="hint-btn-icon">💡</span>راهنما</button>`:''}
      <input class="fill-input" id="fillInput" placeholder="پاسخ را اینجا بنویس..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="check-btn" onclick="checkFill('${q.answer.replace(/'/g,"\\'")}')">✦ تأیید</button>`;
  }

  document.getElementById('quizContent').innerHTML=`
    <div class="quiz-hud">
      <div class="quiz-counter">${idx+1}/${total}</div>
      <div class="quiz-track"><div class="quiz-track-fill" style="width:${progPct}%"></div></div>
      <div class="quiz-score-badge">✦ ${state.score}</div>
    </div>
    <div class="quiz-card">
      <span class="quiz-type-tag">${typeLabel}</span>
      <div class="quiz-q">${q.q}</div>
    </div>
    ${bodyHTML}
    <div class="feedback-box" id="feedbackBox">
      <div class="fb-title" id="fbTitle"></div>
      <div class="fb-text" id="fbText"></div>
    </div>
    <button class="action-btn" id="nextBtn" onclick="nextQuestion()">بعدی ←</button>
  `;
  if(q.type==='listen'){
    setTimeout(()=>{
      const lb=document.getElementById('listenBtn');
      if(lb) toggleSpeak(lb,q.text);
    },350);
  }
  document.getElementById('quizScreen').scrollTop=0;
}

function placeWord(el,word){
  const sentence=document.getElementById('scrambleSentence');
  const chip=document.createElement('div');
  chip.className='word-chip placed'; chip.textContent=word;
  chip.onclick=()=>{sentence.removeChild(chip);el.style.display='';sfxTap();};
  sentence.appendChild(chip); el.style.display='none';
}

function checkMCQ(btn,chosen,answer){
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.add('disabled'));
  if(chosen===answer){
    btn.classList.add('correct');
    showFeedback(true,'✦ RICHTIG · درست!','پاسخ صحیح است. آفرین!');
    state.score++; addXP(10); sfxCorrect();
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.option-btn').forEach(b=>{if(b.textContent===answer)b.classList.add('correct');});
    showFeedback(false,'✗ FALSCH · اشتباه',`پاسخ درست: ${answer}`);
    sfxWrong();
  }
  document.getElementById('nextBtn').style.display='block';
}

function checkScramble(answer){
  const sentence=document.getElementById('scrambleSentence');
  const placed=Array.from(sentence.querySelectorAll('.word-chip')).map(c=>c.textContent).join(' ');
  const correct=placed.trim()===answer.trim();
  if(correct){
    showFeedback(true,'✦ RICHTIG · درست!','ترتیب کلمات صحیح است.');
    state.score++; addXP(15); sfxCorrect();
  } else {
    showFeedback(false,'✗ FALSCH · اشتباه',`پاسخ درست: ${answer}`);
    sfxWrong();
  }
  document.querySelector('.check-btn').disabled=true;
  document.getElementById('nextBtn').style.display='block';
}

function checkFill(answer){
  const input=document.getElementById('fillInput');
  const val=input.value.trim();
  const correct=val.toLowerCase()===answer.toLowerCase();
  input.disabled=true;
  if(correct){
    input.style.borderColor='rgba(93,219,168,.4)'; input.style.boxShadow='0 0 0 4px rgba(93,219,168,.1)';
    showFeedback(true,'✦ RICHTIG · درست!','پاسخ صحیح است.');
    state.score++; addXP(12); sfxCorrect();
  } else {
    input.style.borderColor='rgba(232,90,138,.4)'; input.style.boxShadow='0 0 0 4px rgba(232,90,138,.1)';
    showFeedback(false,'✗ FALSCH · اشتباه',`پاسخ درست: ${answer}`);
    sfxWrong();
  }
  document.querySelector('.check-btn').disabled=true;
  document.getElementById('nextBtn').style.display='block';
}

function showFeedback(correct,title,text){
  const box=document.getElementById('feedbackBox');
  box.className='feedback-box '+(correct?'correct':'wrong');
  box.style.display='block';
  document.getElementById('fbTitle').textContent=title;
  document.getElementById('fbText').textContent=text;
}

function nextQuestion(){
  sfxTap();
  state.currentQuizIndex++;
  if(state.currentQuizIndex>=state.currentQuiz.length) showResult();
  else renderQuestion();
}

/* ═══ RESULT ═══ */
function showResult(){
  const total=state.currentQuiz.length;
  const score=state.score;
  const pct=Math.round((score/total)*100);
  const prev=state.progress[state.currentTopic.id]||0;
  state.progress[state.currentTopic.id]=Math.max(prev,pct);

  let emoji='😅',msg='دوباره تلاش کن!';

  else if(pct>=50){emoji='💪';msg='WEITER SO · ادامه بده!';}

  document.getElementById('resultScreen').innerHTML=`
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <h2>${msg}</h2>
      <p>${state.currentTopic.name}</p>
      <div class="result-stats">

          <div class="rs-val">${score}/${total}</div>
          <div class="rs-label">CORRECT</div>
        </div>
        <div class="result-stat">
          <div class="rs-val">${pct}%</div>
          <div class="rs-label">SCORE</div>
        </div>
        <div class="result-stat">
          <div class="rs-val">+${score*10}</div>
          <div class="rs-label">XP</div>
        </div>
      </div>
      <button class="retry-btn" onclick="startQuiz()">↺ دوباره آزمون بده</button>
      <button class="retry-btn" style="border-color:rgba(155,109,204,.35);background:linear-gradient(135deg,rgba(155,109,204,.12),rgba(212,168,67,.06));" onclick="openTopic('${state.currentTopic.id}')">◈ مرور درس</button>
      <button class="retry-btn" style="border-color:var(--border);background:var(--surface);color:var(--text2);" onclick="showScreen('homeScreen');renderHome();">⌂ بازگشت به خانه</button>
    </div>
  `;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('resultScreen').classList.add('active');
  document.getElementById('resultScreen').scrollTop=0;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

}

function pronSpeak(){
  const w = getActiveWord();
  const wordEl=document.getElementById('pronDeWord');
  if(wordEl) wordEl.classList.add('speaking');
  setMicStatus(pronState.speed<1?'پخش آهسته...':'در حال پخش...','');
  const utt=new SpeechSynthesisUtterance(w.de);
  utt.lang='de-DE';
  utt.rate = pronState.speed < 1 ? 0.45 : 0.82;
  utt.pitch=1.05;
  const deVoice=pronState.voices.find(v=>v.lang==='de-DE')||pronState.voices[0];
  if(deVoice) utt.voice=deVoice;
  utt.onend=()=>{
    if(wordEl) wordEl.classList.remove('speaking');
    setMicStatus('🎙 میکروفون رو بزن و تکرار کن','');
    pronState.phase='idle';
  };
  utt.onerror=()=>{
    if(wordEl) wordEl.classList.remove('speaking');
    setMicStatus('🎙 میکروفون رو بزن و تکرار کن','');
  };
  pronState.synth.cancel();
  pronState.synth.speak(utt);
}

function handleMicClick(){
  if(pronState.phase==='listening'){
    stopListening(); return;
  }
  startListening();
}

function startListening(){
  if(pronState.phase==='listening') return;
  pronState.synth.cancel();
  pronState._alreadyMatched = false;
  pronState.phase = 'listening';
  pronState._lastInterim = '';

  const ring = document.getElementById('micRing');
  if(ring) ring.classList.add('listening');
  setMicStatus('در حال ضبط... 🎤','listening');

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let srSucceeded = false;
  let audioChunks = [];
  let mediaRec = null;

  // Start MediaRecorder immediately as backup
  navigator.mediaDevices.getUserMedia({audio:true,video:false})
  .then(stream=>{
    pronState.micStream = stream;
    const mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
    mediaRec = new MediaRecorder(stream,{mimeType:mt});
    mediaRec.ondataavailable = e=>{ if(e.data.size>0) audioChunks.push(e.data); };
    mediaRec.start(100);
    pronState.mediaRec = mediaRec;
  }).catch(()=>{});

  const stopMR = ()=>{
    if(mediaRec && mediaRec.state!=='inactive') try{mediaRec.stop();}catch(e){}
  };

  // Try Web Speech API
  if(SR){
    const rec = new SR();
    rec.lang = 'de-DE';
    rec.interimResults = true;
    rec.maxAlternatives = 10;
    rec.continuous = false;
    pronState.recognition = rec;

    rec.onresult = (e)=>{
      if(pronState._alreadyMatched) return;
      srSucceeded = true;
      const allT=[];
      for(let ri=0;ri<e.results.length;ri++)
        for(let ai=0;ai<e.results[ri].length;ai++){
          const t=e.results[ri][ai].transcript.trim().toLowerCase();
          if(t) allT.push(t);
        }
      const heard=allT[0]||'';
      if(heard){pronState._lastInterim=heard; setMicStatus('🎤 '+heard,'listening');}
      const target=getActiveWord().de.toLowerCase().trim();
      const ok=allT.some(r=>pronPronMatch(r,target));
      if(ok){
        pronState._alreadyMatched=true;
        clearTimers(); stopMR();
        showPronResult(true,heard); stopListening(); return;
      }
      if(e.results[e.results.length-1].isFinal){
        clearTimers(); stopMR();
        showPronResult(false,heard); stopListening();
      }
    };
    rec.onerror=()=>{};
    rec.onend=()=>{
      if(!srSucceeded && pronState.phase==='listening' && !pronState._alreadyMatched){
        clearTimers(); useClaudeASR();
      }
    };
    try{rec.start();}catch(e){}
  }

  // If SR gives nothing in 6s, use Claude
  pronState._srTimer = setTimeout(()=>{
    if(!srSucceeded && pronState.phase==='listening' && !pronState._alreadyMatched){
      if(pronState.recognition) try{pronState.recognition.abort();}catch(e){}
      useClaudeASR();
    }
  }, 6000);

  const clearTimers = ()=>{
    if(pronState._srTimer){clearTimeout(pronState._srTimer);pronState._srTimer=null;}
    if(pronState._silenceTimer){clearTimeout(pronState._silenceTimer);pronState._silenceTimer=null;}
  };

  const useClaudeASR = async ()=>{
    if(pronState.phase!=='listening') return;
    stopMR();
    setMicStatus('🧠 در حال تشخیص...','listening');
    await new Promise(r=>setTimeout(r,400));

    if(audioChunks.length===0){ showTextInputFallback(); return; }
    const blob = new Blob(audioChunks, {type: audioChunks[0].type||'audio/webm'});
    if(blob.size<500){ showTextInputFallback(); return; }

    const reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onerror = ()=>showTextInputFallback();
    reader.onload = async ()=>{
      const base64 = reader.result.split(',')[1];
      const mimeType = blob.type.split(';')[0];
      const target = getActiveWord().de;
      try{
        const resp = await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            model:'claude-haiku-4-5-20251001',
            max_tokens:50,
            messages:[{
              role:'user',
              content:[
                {type:'text', text:'Transcribe this audio. Only output the spoken words, nothing else. The speaker is saying a German word or phrase.'},
                {type:'document', source:{type:'base64', media_type:mimeType, data:base64}}
              ]
            }]
          })
        });
        const data = await resp.json();
        const heard = (data.content?.[0]?.text||'').trim().toLowerCase().replace(/[.,!?]/g,'');
        if(!heard){showTextInputFallback(); return;}
        setMicStatus('🧠 شنیدم: '+heard,'listening');
        pronState._alreadyMatched=true;
        showPronResult(pronPronMatch(heard, target.toLowerCase().trim()), heard);
        stopListening();
      }catch(err){ showTextInputFallback(); }
    };
  };
}


function stopListening(){
  pronState.phase='idle';
  const ring=document.getElementById('micRing');
  const wave=document.getElementById('micWave');
  if(ring) ring.classList.remove('listening');
  if(wave){ wave.classList.remove('active'); wave.style.opacity='0'; }

  if(pronState._silenceTimer){ clearTimeout(pronState._silenceTimer); pronState._silenceTimer=null; }
  if(pronState.rafId){ cancelAnimationFrame(pronState.rafId); pronState.rafId=null; }
  if(pronState.analyser){ try{pronState.analyser.disconnect();}catch(e){} pronState.analyser=null; }
  if(pronState.audioCtx){ try{pronState.audioCtx.close();}catch(e){} pronState.audioCtx=null; }
  if(pronState.micStream){ pronState.micStream.getTracks().forEach(t=>t.stop()); pronState.micStream=null; }

  if(pronState.recognition){
    try{pronState.recognition.abort();}catch(e){}
    pronState.recognition=null;
  }
}

function pronPronMatch(heard, target){
  const norm = s => s.toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/é/g,'e').replace(/à/g,'a').replace(/è/g,'e')
    .replace(/[^a-z\s]/g,'').trim();

  const pk = s => s
    .replace(/sch/g,'sh').replace(/tsch/g,'tsh').replace(/ch/g,'k')
    .replace(/w/g,'v').replace(/z/g,'ts').replace(/tz/g,'ts')
    .replace(/ei/g,'ai').replace(/ie/g,'i').replace(/eu/g,'oi')
    .replace(/pf/g,'f').replace(/ph/g,'f').replace(/ck/g,'k')
    .replace(/dt\b/g,'t').replace(/(.)\1/g,'$1').trim();

  const stripArt = s => s.replace(/^(der|die|das|ein|eine|dem|den|des|einer|eines)\s+/i,'').trim();

  const h0=norm(heard), t0=norm(target);
  const h=stripArt(h0), t=stripArt(t0);
  const hk=pk(h), tk=pk(t);

  if(h===t||h0===t0||hk===tk) return true;
  if(t.length>3 && (h.includes(t)||hk.includes(tk))) return true;

  const tWords=t.split(/\s+/).filter(Boolean);
  const hWords=h.split(/\s+/).filter(Boolean);
  const tKeys=tWords.map(pk);
  const hKeys=hWords.map(pk);

  const wMatch=(hw,tw,hwk,twk)=>{
    if(hw===tw||hwk===twk) return true;
    if(tw.length>3 && (hw.includes(tw)||hwk.includes(twk))) return true;
    if(twk.length>=3 && hwk.slice(0,3)===twk.slice(0,3)) return true;
    const d=twk.length<=3?1:twk.length<=6?2:3;
    if(levenshtein(hwk,twk)<=d) return true;
    const rd=tw.length<=4?2:tw.length<=7?3:4;
    if(levenshtein(hw,tw)<=rd) return true;
    return false;
  };

  if(tWords.length===1)
    return hWords.some((hw,i)=>wMatch(hw,tWords[0],hKeys[i]||pk(hw),tKeys[0]));

  const matched=tWords.filter((tw,ti)=>hWords.some((hw,hi)=>wMatch(hw,tw,hKeys[hi],tKeys[ti])));
  return matched.length>=Math.ceil(tWords.length*0.5);
}


function levenshtein(a, b){
  if(!a) return b.length;
  if(!b) return a.length;
  const dp=Array.from({length:a.length+1},(_,i)=>
    Array.from({length:b.length+1},(_,j)=> i===0?j : j===0?i : 0)
  );
  for(let i=1;i<=a.length;i++)
    for(let j=1;j<=b.length;j++)
      dp[i][j]=a[i-1]===b[j-1]
        ? dp[i-1][j-1]
        : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}

const CHEER_MSGS = [
  { emoji:'🌟', text:'PERFEKT!', sub:'تلفظت عالی بود!' },
  { emoji:'🏆', text:'AUSGEZEICHNET!', sub:'آفرین، دقیقاً درسته!' },
  { emoji:'✨', text:'WUNDERBAR!', sub:'عجب تلفظی! ادامه بده!' },
  { emoji:'🎯', text:'GENAU RICHTIG!', sub:'درست مثل یه آلمانی!' },
  { emoji:'🔥', text:'FANTASTISCH!', sub:'داری پیشرفت می‌کنی!' },
  { emoji:'💎', text:'BRILLIANT!', sub:'تبریک! یه کلمه دیگه؟' },
];
const STREAK_BONUS=[0,0,0,5,10,20]; // bonus XP at streak 3,4,5

function getActiveWord(){
  if(pronState.wrongQueue.length>0) return pronState.wrongQueue[0];
  return pronState.words[pronState.idx % pronState.words.length];
}

function updateAttemptDots(){
  const el=document.getElementById('pronAttemptDots');
  if(!el) return;
  el.innerHTML=Array.from({length:pronState.attempts},(_,i)=>`<div class="pron-attempt-dot wrong"></div>`).join('');
}

function updateStreakUI(){
  const num=document.getElementById('pronStreakNum');
  if(num) num.textContent=pronState.streak;
  for(let i=1;i<=5;i++){
    const dot=document.getElementById('sd'+i);
    if(dot) dot.classList.toggle('lit', pronState.streak>=i);
  }
}

function updateStarsUI(attempts){
  const stars=document.querySelectorAll('#pronStars .pron-star');
  const earned = attempts<=1?3:attempts<=2?2:attempts<=3?1:0;
  stars.forEach((s,i)=>{
    if(i<earned) setTimeout(()=>s.classList.add('earned'),i*150);
    else s.classList.remove('earned');
  });
}

function showPronResult(correct, heard){
  pronState.total++;
  if(correct) pronState.correct++;
  updatePronScore();

  const box=document.getElementById('pronResult');
  const emoji=document.getElementById('pronResultEmoji');
  const title=document.getElementById('pronResultTitle');
  const heardEl=document.getElementById('pronResultHeard');
  const wordCard=document.getElementById('pronWordCard');
  if(!box) return;

  const w = getActiveWord();

  if(correct){
    pronState.streak++;
    if(pronState.streak>pronState.bestStreak) pronState.bestStreak=pronState.streak;
    updateStreakUI();

    // SRS: remove from wrongQueue if was there
    if(pronState.wrongQueue.length>0 && pronState.wrongQueue[0].de===w.de){
      pronState.wrongQueue.shift();
    }

    // word history for stars
    const thisAttempts = pronState.attempts + 1;
    const prev = pronState.wordHistory[w.de] || {bestAttempt:99};
    pronState.wordHistory[w.de] = {bestAttempt: Math.min(prev.bestAttempt, thisAttempts)};
    updateStarsUI(thisAttempts);

    // XP: base 8 + streak bonus
    const bonus = STREAK_BONUS[Math.min(pronState.streak,5)] || 0;
    addXP(8 + bonus);

    // green card
    if(wordCard){
      wordCard.style.borderColor='rgba(93,219,168,.6)';
      wordCard.style.boxShadow='0 0 40px rgba(93,219,168,.25)';
      const wordEl=document.getElementById('pronDeWord');
      if(wordEl){ wordEl.style.color='var(--mint)'; wordEl.style.textShadow='0 0 40px rgba(93,219,168,.6)'; }
    }
    box.className='pron-result show correct';
    emoji.textContent='✦';
    title.textContent='AUSGEZEICHNET · عالی بود!';
    heardEl.textContent=`شنیدم: "${heard}"`;
    setMicStatus('آفرین! 🎉','success');
    sfxCorrect();

    // streak milestone
    if(pronState.streak===5){
      showStreakMilestone();
      return;
    }

    // celebrate overlay
    const cheer = CHEER_MSGS[Math.floor(Math.random()*CHEER_MSGS.length)];
    showCelebrate(cheer, bonus>0 ? `+${8+bonus} XP · streak x${pronState.streak}` : null);
    setTimeout(()=>{ hideCelebrate(); setTimeout(()=>pronNext(),400); }, 2000);

  } else {
    pronState.streak=0;
    updateStreakUI();
    pronState.attempts++;
    updateAttemptDots();

    // SRS: add to wrongQueue if not already there
    if(!pronState.wrongQueue.find(x=>x.de===w.de)){
      pronState.wrongQueue.push(w);
    }

    box.className='pron-result show wrong';
    emoji.textContent='✗';
    title.textContent='NOCHMAL · دوباره تلاش کن';
    heardEl.textContent=heard ? `شنیدم: "${heard}"` : 'چیزی شنیده نشد';
    setMicStatus('دوباره گوش بده و تکرار کن','');
    sfxWrong();
  }
}

function showCelebrate(cheer, sub2){
  let overlay=document.getElementById('pronCelebrate');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='pronCelebrate';
    overlay.className='pron-celebrate';
    overlay.innerHTML=`<div class="pron-celebrate-inner">
      <div class="pron-celebrate-emoji" id="celebEmoji"></div>
      <div class="pron-celebrate-text" id="celebText"></div>
      <div class="pron-celebrate-sub" id="celebSub"></div>
      <div class="pron-celebrate-sub" id="celebSub2" style="color:var(--gold);margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:11px;"></div>
    </div>`;
    document.body.appendChild(overlay);
  }
  document.getElementById('celebEmoji').textContent=cheer.emoji;
  document.getElementById('celebText').textContent=cheer.text;
  document.getElementById('celebSub').textContent=cheer.sub;
  const s2=document.getElementById('celebSub2');
  if(s2) s2.textContent=sub2||'';
  overlay.classList.add('show');
}
function hideCelebrate(){
  const o=document.getElementById('pronCelebrate');
  if(o) o.classList.remove('show');
}

function showStreakMilestone(){
  showCelebrate(
    {emoji:'🔥',text:'STREAK × 5!',sub:'پنج تا پشت سر هم درست!'},
    '+50 XP · BONUS!'
  );
  addXP(50);
  setTimeout(()=>{ hideCelebrate(); pronState.streak=0; updateStreakUI(); setTimeout(()=>pronNext(),400); }, 2800);
}

function updatePronScore(){
  const c=document.getElementById('pronCorrectCount');
  const t=document.getElementById('pronTotalCount');
  const p=document.getElementById('pronPctDisplay');
  if(c) c.textContent=pronState.correct;
  if(t) t.textContent=pronState.total;
  if(p) p.textContent=pronState.total>0?Math.round((pronState.correct/pronState.total)*100)+'%':'—';
}

function pronNext(){
  pronState.synth.cancel();
  stopListening();

  // If wrongQueue has items, keep showing them (SRS)
  if(pronState.wrongQueue.length>0){
    renderPronCard(); return;
  }

  pronState.idx++;
  if(pronState.idx >= pronState.words.length){
    pronState.idx=0;
    pronState.words=shuffleArr([...getPronWords()]);
  }
  renderPronCard();
}

function setMicStatus(text,cls){
  const el=document.getElementById('micStatus');
  if(!el) return;
  el.textContent=text;
  el.className='mic-status-label'+(cls?' '+cls:'');
}

function shuffleArr(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

renderHome();
updateXPBar();
</script>

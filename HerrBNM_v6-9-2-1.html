<script>
/* ═══════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════ */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function getCtx(){if(!actx)actx=new AudioCtx();return actx;}
function playTone(freq,type,dur,vol=0.18,attack=0.008,release=0.18){try{const ctx=getCtx();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;const now=ctx.currentTime;gain.gain.setValueAtTime(0,now);gain.gain.linearRampToValueAtTime(vol,now+attack);gain.gain.exponentialRampToValueAtTime(0.0001,now+dur);osc.start(now);osc.stop(now+dur+0.05);}catch(e){}}
function sfxCorrect(){playTone(523.25,'sine',.12,.15,.005,.1);setTimeout(()=>playTone(659.25,'sine',.12,.15,.005,.1),80);setTimeout(()=>playTone(783.99,'sine',.2,.12,.005,.18),160);}
function sfxWrong(){playTone(200,'sawtooth',.08,.12,.003,.08);setTimeout(()=>playTone(170,'sawtooth',.12,.1,.003,.12),70);}
function sfxTap(){playTone(880,'sine',.06,.06,.002,.06);}
function sfxNav(){playTone(660,'sine',.08,.07,.003,.07);}
function sfxLevelUp(){[392,523.25,659.25,783.99,1046.50].forEach((f,i)=>{setTimeout(()=>playTone(f,'sine',.22,.18,.005,.2),i*90);});}
function sfxConfetti(){[1047,1175,1319,1568].forEach((f,i)=>{setTimeout(()=>playTone(f,'triangle',.15,.1,.004,.14),i*70);});}

/* ═══════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════ */
(function(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const dots=Array.from({length:40},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.2+.2,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,alpha:Math.random()*.25+.04,clr:Math.random()>.6?'212,168,67':'155,109,204',twinkle:Math.random()*Math.PI*2}));
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);dots.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.twinkle+=.02;if(d.x<0)d.x=canvas.width;if(d.x>canvas.width)d.x=0;if(d.y<0)d.y=canvas.height;if(d.y>canvas.height)d.y=0;const a=d.alpha*(0.6+0.4*Math.sin(d.twinkle));ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=`rgba(${d.clr},${a})`;ctx.fill();});requestAnimationFrame(draw);}
  draw();
})();
function triggerConfetti(){const canvas=document.getElementById('particles');const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;const colors=['rgba(212,168,67,.9)','rgba(155,109,204,.9)','rgba(93,219,168,.9)','rgba(232,90,138,.9)'];const pieces=Array.from({length:60},()=>({x:W/2+(Math.random()*220-110),y:H*.35,vx:(Math.random()-.5)*10,vy:Math.random()*-14-5,r:Math.random()*4.5+2,color:colors[Math.floor(Math.random()*colors.length)],life:1,rot:Math.random()*360,shape:Math.random()>.5?'rect':'circle'}));function step(){pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.32;p.life-=.016;p.rot+=5;ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;if(p.shape==='rect')ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}ctx.restore();});if(pieces.some(p=>p.life>0))requestAnimationFrame(step);}requestAnimationFrame(step);sfxConfetti();}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const state={xp:0,level:1,totalXP:0,progress:{},currentTopic:null,currentQuizIndex:0,currentQuiz:[],score:0,dictQuery:'',dictCat:'همه'};

/* ═══════════════════════════════════════════
   SPEECH
═══════════════════════════════════════════ */
function speak(text){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=0.82;speechSynthesis.speak(u);}
function speakWithAnim(btn,text){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=0.82;if(btn){btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');u.onerror=()=>btn.classList.remove('playing');}speechSynthesis.speak(u);}
function toggleSpeak(btn,text){if(!('speechSynthesis' in window))return;if(btn&&btn.classList.contains('playing')){speechSynthesis.cancel();btn.classList.remove('playing');return;}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=0.82;if(btn){btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');u.onerror=()=>btn.classList.remove('playing');}speechSynthesis.speak(u);}

/* ═══════════════════════════════════════════
   XP
═══════════════════════════════════════════ */
function addXP(n){const prev=state.level;state.xp+=n;state.totalXP+=n;state.level=Math.floor(state.totalXP/100)+1;updateXPBar();showXPToast(n);if(state.level>prev)sfxLevelUp();}
function updateXPBar(){const p=state.totalXP%100;document.getElementById('xpFill').style.width=p+'%';const r=['I','II','III','IV','V','VI','VII','VIII','IX','X'];document.getElementById('levelLabel').textContent='LEKTION '+(r[state.level-1]||state.level);document.getElementById('xpLabel').textContent=p+' / 100 XP';document.getElementById('totalXP').textContent=state.totalXP;}
function showXPToast(n){const t=document.createElement('div');t.className='xp-toast';t.textContent='+ '+n+' XP';document.body.appendChild(t);setTimeout(()=>t.remove(),1500);}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function showScreen(id,btn){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(btn){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}sfxNav();}

/* ═══════════════════════════════════════════
   GRAMMAR DATA & QUIZ GENERATORS
═══════════════════════════════════════════ */
function generatePronounQuiz(){return[
  {type:'mcq',q:'«Ich liebe ___» - جای خالی را با ضمیر Akkusativ «تو» پر کن:',options:['du','dir','dich','dein'],answer:'dich'},
  {type:'mcq',q:'«Er gibt ___ das Buch.» - ضمیر Dativ «من» چیست؟',options:['mich','ich','mir','mein'],answer:'mir'},
  {type:'mcq',q:'«Sie sieht ___» - ضمیر Akkusativ «او (مرد)» چیست؟',options:['er','ihm','ihn','sein'],answer:'ihn'},
  {type:'fill',q:'Kannst du ___ helfen? (به من - Dativ)',answer:'mir',hint:'ich → mir در Dativ'},
  {type:'mcq',q:'«Ich danke ___» - ضمیر Dativ «او (زن)» چیست؟',options:['sie','ihr','ihn','ihnen'],answer:'ihr'},
  {type:'mcq',q:'«Wir treffen ___» - ضمیر Akkusativ «شما» چیست؟',options:['ihr','euch','ihnen','Sie'],answer:'euch'},
  {type:'fill',q:'Er liebt ___. (او را - مؤنث - Akkusativ)',answer:'sie',hint:'sie در Akkusativ تغییر نمی‌کند'},
  {type:'scramble',q:'مرتب کن:',words:['dich','Ich','liebe'],answer:'Ich liebe dich'},
  {type:'mcq',q:'«Ich helfe ___» - ضمیر Dativ «شما (رسمی)» چیست؟',options:['Sie','Ihnen','Ihre','Ihr'],answer:'Ihnen'},
  {type:'mcq',q:'ضمیر Akkusativ «ما» چیست؟',options:['wir','uns','unser','ihr'],answer:'uns'},
  {type:'fill',q:'Sie sieht ___ nicht. (او (مرد) را - Akkusativ)',answer:'ihn',hint:'er → ihn در Akkusativ'},
  {type:'mcq',q:'«Gefällt ___ das Buch?» - Dativ «تو» چیست؟',options:['du','dich','dir','dein'],answer:'dir'}
];}
function generatePraesensQuiz(){return[{type:'mcq',q:'صرف «machen» برای «du»:',options:['mache','machst','macht','machen'],answer:'machst'},{type:'fill',q:'Er ___ Deutsch. (sprechen - نامنظم)',answer:'spricht',hint:'نامنظم: a → i'},{type:'mcq',q:'کدام صرف «gehen» برای «wir» درست است؟',options:['geht','gehst','gehen','gehe'],answer:'gehen'},{type:'scramble',q:'جمله را مرتب کن:',words:['du','Hausaufgaben','machst'],answer:'du machst Hausaufgaben'},{type:'mcq',q:'پسوند منظم برای «ich» چیست؟',options:['-st','-t','-e','-en'],answer:'-e'},{type:'listen',q:'بشنو - کدام صرف درست است؟',text:'Sie gehen in die Schule.',options:['geht','gehst','gehen','gehe'],answer:'gehen'},{type:'fill',q:'Ihr ___ sehr gut. (arbeiten)',answer:'arbeitet',hint:'ihr → -et'},{type:'mcq',q:'کدام فعل نامنظم است؟',options:['machen','spielen','sprechen','lernen'],answer:'sprechen'}];}
function generateSeparableQuiz(){return[{type:'mcq',q:'«aufstehen» یعنی چه؟',options:['خرید کردن','بیدار شدن','رفتن','دیدن'],answer:'بیدار شدن'},{type:'mcq',q:'«anrufen» یعنی چه؟',options:['بیدار شدن','خرید کردن','تلفن زدن','رفتن'],answer:'تلفن زدن'},{type:'scramble',q:'جمله را مرتب کن:',words:['auf','er','macht','die Tür'],answer:'er macht die Tür auf'},{type:'mcq',q:'پیشوند در جمله کجا می‌رود؟',options:['اول جمله','بعد از فعل','آخر جمله','قبل از موضوع'],answer:'آخر جمله'},{type:'listen',q:'بشنو - کدام فعل جداشدنی است؟',text:'Ich sehe heute fern.',options:['sehen','fernsehen','stehen','gehen'],answer:'fernsehen'},{type:'fill',q:'Er ___ seine Mutter ___. (anrufen)',answer:'ruft an',hint:'پیشوند «an» جدا می‌شود'},{type:'mcq',q:'«mitkommen» در جمله - پیشوند کجاست؟',options:['اول','وسط','آخر','بعد از Sie'],answer:'آخر'}];}
function generateQuestionsQuiz(){return[{type:'mcq',q:'«کجا زندگی می‌کنی؟» به آلمانی:',options:['Was wohnst du?','Wer wohnst du?','Wo wohnst du?','Wie wohnst du?'],answer:'Wo wohnst du?'},{type:'mcq',q:'در سؤال Ja/Nein، فعل در کجاست؟',options:['جایگاه اول','جایگاه دوم','آخر جمله','بعد از موضوع'],answer:'جایگاه اول'},{type:'fill',q:'___ heißt du? (اسمت چیه؟)',answer:'Wie',hint:'کلمه پرسشی چگونه/چه'},{type:'scramble',q:'سؤال را مرتب کن:',words:['du','Kommst','heute'],answer:'Kommst du heute'},{type:'mcq',q:'«warum» یعنی چه؟',options:['کِی','چرا','کجا','چه کسی'],answer:'چرا'},{type:'listen',q:'بشنو - چه نوع سؤالی است؟',text:'Wann kommst du nach Hause?',options:['Ja/Nein Frage','W-Frage'],answer:'W-Frage'},{type:'mcq',q:'«wer» پرسش از چیست؟',options:['مکان','زمان','شخص','دلیل'],answer:'شخص'},{type:'fill',q:'___ viel kostet das?',answer:'Wie',hint:'ترکیب Wie + viel'}];}
function generateArticlesQuiz(){return[
  {type:'mcq',q:'«der Mann» در Akkusativ چه می‌شود؟',options:['der Mann','dem Mann','den Mann','des Mannes'],answer:'den Mann'},
  {type:'mcq',q:'«die Frau» در Dativ چه می‌شود؟',options:['die Frau','der Frau','dem Frau','den Frau'],answer:'der Frau'},
  {type:'fill',q:'Ich gebe ___ Kind die Milch. (das Kind - Dativ)',answer:'dem',hint:'das → dem در Dativ'},
  {type:'mcq',q:'«ein Mann» در Akkusativ چه می‌شود؟',options:['ein Mann','einem Mann','einen Mann','einer Mann'],answer:'einen Mann'},
  {type:'mcq',q:'آرتیکل نامعرفه Dativ برای مؤنث:',options:['eine','einen','einem','einer'],answer:'einer'},
  {type:'fill',q:'Er wohnt mit ___ Frau zusammen. (Dativ مؤنث)',answer:'einer',hint:'مؤنث Dativ: eine→einer'},
  {type:'scramble',q:'مرتب کن:',words:['den','sieht','Sie','Mann'],answer:'Sie sieht den Mann'},
  {type:'mcq',q:'«das Buch» در Akkusativ:',options:['des Buches','dem Buch','das Buch','den Buch'],answer:'das Buch'},
  {type:'fill',q:'Ich kaufe ___ Apfel. (نامعرفه مذکر Akkusativ)',answer:'einen',hint:'مذکر Akk: ein→einen'},
  {type:'mcq',q:'«den Leuten» - کدام حالت و جنسیت است؟',options:['مذکر Nominativ','جمع Dativ','مؤنث Akkusativ','خنثی Dativ'],answer:'جمع Dativ'},
  {type:'fill',q:'Er hilft ___ alten Mann. (Dativ مذکر)',answer:'dem',hint:'مذکر Dativ: der→dem'},
  {type:'listen',q:'بشنو - کدام حالت است؟',text:'Ich sehe den Hund.',options:['Nominativ','Akkusativ','Dativ'],answer:'Akkusativ'}

{id:'adjectives',icon:'🎨',name:'صفت‌ها (Adjektive)',sub:'صرف صفت · پسوندها · معرفه/نامعرفه',clr:'rgba(93,219,168,.45)',tint:'rgba(93,219,168,.05)',explain:{title:'صرف صفت‌ها در آلمانی (Adjektivdeklination)',body:'در آلمانی، وقتی صفت قبل از اسم می‌آید باید با آن صرف شود. پسوند صفت به جنسیت، حالت دستوری و نوع آرتیکل (معرفه/نامعرفه) بستگی دارد.',table:[['Nominativ مذکر','der alt-e Mann | ein alt-er Mann','پسوند: -e با معرفه | -er بدون/نامعرفه'],['Nominativ مؤنث','die schön-e Frau | eine schön-e Frau','پسوند: -e در هر دو'],['Nominativ خنثی','das neu-e Haus | ein neu-es Haus','پسوند: -e معرفه | -es نامعرفه'],['Akkusativ مذکر','den alt-en Mann | einen alt-en Mann','پسوند: -en در هر دو'],['Akkusativ مؤنث','die schön-e Frau | eine schön-e Frau','پسوند: -e در هر دو'],['Akkusativ خنثی','das neu-e Haus | ein neu-es Haus','مثل Nominativ'],['Dativ مذکر','dem alt-en Mann | einem alt-en Mann','پسوند: -en در هر دو'],['Dativ مؤنث','der schön-en Frau | einer schön-en Frau','پسوند: -en در هر دو'],['جمع با آرتیکل','die alten Männer | keine alten Männer','همیشه -en'],['بدون آرتیکل (Nom m)','alt-er Wein | kalt-er Kaffee','صفت خودش آرتیکل می‌شود']],tableHeaders:['حالت','مثال','نکته'],rules:['قاعده کلی: با آرتیکل معرفه → اغلب -e یا -en','با آرتیکل نامعرفه → Nom m = -er | Nom/Akk n = -es | بقیه -en','بدون آرتیکل → صفت پسوند آرتیکل را می‌گیرد','Dativ همیشه -en (با هر نوع آرتیکل)','جمع همیشه -en (با آرتیکل)'],examples:[{de:'Das ist ein schönes Haus in einer ruhigen Straße.',fa:'این یک خانه زیبا در یک خیابان آرام است. (schönes=n.Nom نامعرفه | ruhigen=f.Dat)'},{de:'Ich trinke gern heißen Kaffee ohne Milch.',fa:'دوست دارم قهوه داغ بدون شیر بنوشم. (heißen=m.Akk بدون آرتیکل → پسوند آرتیکل)'},{de:'Er fährt mit dem alten roten Auto seiner Mutter.',fa:'با ماشین قدیمی قرمز مادرش می‌رود. (alten roten=Dat → همه پسوند -en)'},{de:'Die junge Frau kauft einen blauen Pullover und eine weiße Jacke.',fa:'زن جوان یک پلیور آبی و یک ژاکت سفید می‌خرد. (junge=f.Nom | blauen=m.Akk | weiße=f.Akk)'},{de:'Guten Morgen! {id:'wordorder',icon:'📐',name:'ترتیب کلمات V2',sub:'Verb-Zweit · قید زمان · وارونگی',clr:'rgba(212,168,67,.45)',tint:'rgba(212,168,67,.06)',explain:{title:'ترتیب کلمات در آلمانی (Wortstellung)',body:'مهم‌ترین قانون آلمانی: فعل اصلی همیشه در جایگاه دوم جمله (V2) است - نه دومین کلمه، بلکه دومین «بخش» جمله. اگر چیز دیگری اول بیاید، فاعل به بعد از فعل می‌رود (وارونگی).',table:[['جمله معمولی','Ich gehe heute in die Schule.','فاعل[1] - فعل[2] - بقیه'],['وارونگی با قید زمان','Heute gehe ich in die Schule.','قید[1] - فعل[2] - فاعل[3] - بقیه'],['وارونگی با مفعول','Den Mann sehe ich.','مفعول[1] - فعل[2] - فاعل[3]'],['سؤال بله/خیر','Gehst du heute in die Schule?','فعل[1] - فاعل[2] - بقیه'],['با Modal','Ich kann heute nicht kommen.','فاعل[1]-Modal[2]-...-Infinitiv[آخر]'],['با Perfekt','Ich habe heute viel gelernt.','فاعل[1]-haben[2]-...-Partizip[آخر]'],['با Nebensatz','Ich weiß, dass er kommt.','...dass + فاعل - بقیه - فعل[آخر]']],tableHeaders:['نوع جمله','مثال','ترتیب'],rules:['قانون V2: فعل اصلی همیشه جایگاه دوم است','وارونگی (Inversion): وقتی چیزی غیر از فاعل اول بیاید','TeKaMoLo: زمان→علت→نحوه→مکان ترتیب قیدها','Modal/haben/sein در V2، فعل اصلی/Partizip آخر','در Nebensatz (dass/weil/obwohl): فعل به آخر می‌رود'],examples:[

{id:'modal',icon:'💪',name:'افعال Modal',sub:'können · müssen · wollen · dürfen · sollen · mögen',clr:'rgba(155,109,204,.55)',tint:'rgba(155,109,204,.06)',explain:{title:'افعال وجهی (Modalverben) - کامل',body:'افعال Modal در جایگاه دوم می‌آیند و فعل اصلی به صورت مصدر به آخر جمله می‌رود. صرف Modal ها نامنظم است!',table:[['können (می‌توانم)','ich kann | du kannst | er kann','Ich kann schwimmen.'],['müssen (باید/مجبورم)','ich muss | du musst | er muss','Du musst lernen.'],['wollen (می‌خواهم)','ich will | du willst | er will','Er will schlafen.'],['sollen (قرار است/باید)','ich soll | du sollst | er soll','Du sollst kommen.'],['dürfen (اجازه دارم)','ich darf | du darfst | er darf','Ihr dürft spielen.'],['mögen (دوست دارم/دوست دارد)','ich mag | du magst | er mag','Sie mag Kaffee.'],['möchten (می‌خواهم - مؤدبانه)','ich möchte | du möchtest | er möchte','Ich möchte Wasser, bitte.']],tableHeaders:['فعل Modal','صرف (ich/du/er)','مثال'],rules:['ساختار: Modal (V2) + ... + Infinitiv (آخر)','مثال: Ich kann heute nicht kommen.','müssen + nicht = نیازی نیست (nicht نفی müssen نمی‌کند Pflicht را)','dürfen + nicht = نباید (ممنوع است)','möchten = شکل مؤدبانه wollen | خیلی رایج در گفتگو'],examples:[

{id:'welch',icon:'❔',name:'welch- و dieser-',sub:'welcher · welche · welches · welchem · welchen',clr:'rgba(155,109,204,.55)',tint:'rgba(155,109,204,.06)',explain:{title:'کلمات پرسشی welch- و اشاره‌ای dieser-',body:'welch- (کدام؟) مثل آرتیکل معرفه صرف می‌شود. dieser- (این) هم همینطور. هر دو باید با جنسیت و حالت دستوری اسم هماهنگ شوند.',table:[['welcher (m Nom)','Welcher Film läuft heute?','کدام فیلم امروز پخش می‌شود؟'],['welche (f Nom/Akk)','Welche Farbe magst du?','کدام رنگ دوست داری؟'],['welches (n Nom/Akk)','Welches Buch liest du?','کدام کتاب می‌خوانی؟'],['welchen (m Akk)','Welchen Kaffee möchtest du?','کدام قهوه می‌خواهی؟'],['welchem (m/n Dat)','Mit welchem Bus fährst du?','با کدام اتوبوس می‌روی؟'],['welcher (f Dat)','In welcher Stadt wohnst du?','در کدام شهر زندگی می‌کنی؟'],['dieser (m Nom)','Dieser Mann ist nett.','این مرد مهربان است.'],['diesen (m Akk)','Ich sehe diesen Mann.','این مرد را می‌بینم.'],['diesem (m/n Dat)','Mit diesem Auto fahre ich.','با این ماشین می‌روم.'],['dieser (f Dat)','Ich helfe dieser Frau.','به این زن کمک می‌کنم.']],tableHeaders:['فرم','مثال','معنی'],rules:['welch- مثل der/die/das صرف می‌شود','welcher=m.Nom | welche=f.Nom/Akk | welches=n.Nom/Akk','welchen=m.Akk | welchem=m/n.Dat | welcher=f.Dat','dieser/diese/dieses هم همینطور صرف می‌شوند','jeder (هر) هم مثل dieser صرف می‌شود'],examples:[{de:'Welchen Film siehst du heute Abend? — Diesen neuen Actionfilm.',fa:'امشب کدام فیلم می‌بینی؟ — این فیلم اکشن جدید را. (welchen/diesen=m.Akk)'},{de:'Mit welchem Bus fährst du? — Mit diesem hier.',fa:'با کدام اتوبوس می‌روی؟ — با این اینجا. (welchem/diesem=m/n.Dat)'},{de:'In welcher Stadt wohnst du? — In dieser großen Stadt.',fa:'در کدام شهر زندگی می‌کنی؟ — در این شهر بزرگ. (welcher/dieser=f.Dat)'},{de:'Welches Buch liest du gerade? — Dieses hier ist sehr interessant!',fa:'الان کدام کتاب می‌خوانی؟ — این اینجا خیلی جالب است! (welches/dieses=n.Nom)'},{de:'Welche Sprachen sprichst du? — Ich spreche diese drei Sprachen.',fa:'چه زبان‌هایی صحبت می‌کنی؟ — این {id:'prepositions',icon:'📍',name:'حروف اضافه پایه',sub:'in · auf · mit · nach · seit · von · zu · bei',clr:'rgba(93,219,168,.45)',tint:'rgba(93,219,168,.05)',explain:{title:'حروف اضافه پایه (Grundpräpositionen)',body:'هر حرف اضافه یک حالت دستوری مشخص می‌سازد. مهم‌ترین دسته‌بندی: همیشه Dativ، همیشه Akkusativ، یا هر دو (Wechselpräpositionen).',table:[['mit','با','Dativ','Ich fahre mit dem Zug.'],['bei','پیش / هنگام / در کنار','Dativ','Sie wohnt bei ihrer Mutter.'],['von','از / توسط','Dativ','Der Brief ist von meinem Chef.'],['nach','به (شهر/کشور) / بعد از','Dativ','Ich fahre nach Berlin. / Nach der Arbeit...'],['seit','از (زمانی که) - هنوز ادامه دارد','Dativ','Ich lerne seit einem Jahr Deutsch.'],['aus','از داخل / اهل','Dativ','Er kommt aus dem Iran.'],['zu','به سمت (مکان/شخص)','Dativ','Ich gehe zum Arzt. (zu+dem=zum)'],['gegenüber','روبرو','Dativ','Die Bank ist gegenüber dem Bahnhof.'],['durch','از میان / توسط','Akkusativ','Er geht durch den Park.'],['für','برای','Akkusativ','Das ist für dich.'],['gegen','علیه / در برابر / حدود','Akkusativ','Gegen 5 Uhr komme ich.'],['ohne','بدون','Akkusativ','Ohne einen Plan geht das nicht.'],['um','دور / ساعت / درباره','Akkusativ','Um 8 Uhr. / um den Tisch.'],['bis','تا (زمان/مکان)','Akkusativ','Bis nächsten Montag.']],tableHeaders:['حرف اضافه','معنی','حالت','مثال'],rules:['همیشه Dativ: mit, bei, von, nach, seit, aus, zu, gegenüber','همیشه Akkusativ: durch, für, gegen, ohne, um, bis, entlang','zu+dem=zum | zu+der=zur | von+dem=vom | in+dem=im | in+das=ins','seit: برای اتفاقی که در گذشته شروع شده و ادامه دارد','nach: برای شهر/کشور بدون آرتیکل | zu: برای مکان با آرتیکل'],examples:[

{id:'seit',icon:'⏳',name:'seit و vor',sub:'از کِی · چه مدت · گذشته ادامه‌دار',clr:'rgba(212,168,67,.45)',tint:'rgba(212,168,67,.06)',explain:{title:'seit (از ... که) و vor (قبل از)',body:'«seit» برای کاری که در گذشته شروع شده و هنوز ادامه دارد استفاده می‌شود - همیشه با Präsens! «vor» برای نقطه زمانی در گذشته که دیگر ادامه ندارد.',table:[['seit + Dativ + Präsens','از...که (ادامه دارد)','Ich lerne seit einem Jahr.','هنوز دارم یاد می‌گیرم'],['vor + Dativ + Perfekt/Prät.','... پیش (تمام شد)','Ich habe vor einem Jahr gelernt.','آن موقع یاد گرفتم'],['seit wann?','از کِی؟','Seit wann lernst du Deutsch?','پرسش از seit'],['wie lange?','چه مدت؟','Wie lange lernst du schon?','پرسش از مدت'],['seit + زمان مشخص','از یک تاریخ','Seit 2022 wohne ich hier.','از سال ۲۰۲۲'],['seit + دوره','از یک مدت','Seit drei Jahren...','از سه سال پیش (هنوز)'],['vor + دوره','... پیش','Vor drei Jahren...','سه سال پیش (تمام شد)'],['schon + seit','دیگر مدتی است','Ich warte schon seit einer Stunde.','تأکید بر مدت']],tableHeaders:['ساختار','معنی','مثال','نکته'],rules:['seit → همیشه Präsens (حال) | vor → Perfekt یا Präteritum','seit + Dativ: seit einem Jahr / seit drei Monaten','vor + Dativ: vor einem Jahr / vor drei Monaten','تفاوت کلیدی: seit = هنوز ادامه دارد | vor = تمام شده','seit wann? = از کی؟ (سؤال از نقطه شروع)','wie lange ... schon? = چه مدت است؟ (پرسش از مدت)'],examples:[{de:'Ich lerne seit zwei Jahren Deutsch. (Präsens - هنوز ادامه دارد!)',fa:'دو سال است دارم آلمانی یاد می‌گیرم. (seit+Dativ+Präsens)'},{de:'Vor zwei Jahren habe ich angefangen, Deutsch zu lernen.',fa:'دو سال پیش شروع کردم. (vor+Dat+Perfekt = نقطه در گذشته)'},{de:'Seit wann wohnst du in Deutschland? — Seit 2020.',fa:'از کی در آلمان زندگی می‌کنی؟ — از ۲۰۲۰. (seit wann? = پرسش)'},{de:'Ich warte schon seit einer Stunde auf dich!',fa:'یک ساعته منتظرتم! (schon seit = تأکید بر طولانی بودن)'},{de:'Er arbeitet seit drei Monaten bei Siemens. Vor drei Monaten hat er angefangen.',fa:'سه ماهه در زیمنس کار می‌کند. سه ماه پیش شروع کرد. (seit vs. vor مقایسه)'},{de:'Seit dem Sommer bin ich viel glücklicher. Seitdem lache ich mehr.',fa:'از تابستان خیلی شادترم. از آن وقت بیشتر می‌خندم. (seit dem / seitdem)'},{de:'Wie lange lernst du schon Deutsch? — Schon seit einem halben Jahr.',fa:'چه مدت است آلمانی یاد می‌گیری؟ — یه نیم سالیه. (wie lange...schon?)'}]},quiz:generateSeitQuiz()},
{id:'perfekt',icon:'⏰',name:'زمان Perfekt',sub:'haben/sein + Partizip II · گذشته مکالمه',clr:'rgba(232,90,138,.5)',tint:'rgba(232,90,138,.05)',explain:{title:'زمان گذشته محاوره‌ای (Perfekt)',body:'Perfekt رایج‌ترین زمان گذشته در مکالمه روزانه است. ساختار: haben یا sein (در جایگاه دوم) + Partizip II (در آخر). انتخاب بین haben و sein مهم‌ترین چالش است!',table:[['مصدر','Partizip II','کمکی','مثال'],['machen (کردن)','gemacht','haben','Ich habe gemacht.'],['lernen (یاد گرفتن)','gelernt','haben','Du hast Deutsch gelernt.'],['essen (خوردن)','gegessen','haben','Er hat Pizza gegessen.'],['sehen (دیدن)','gesehen','haben','Wir haben ihn gesehen.'],['schreiben (نوشتن)','geschrieben','haben','Ich habe einen Brief geschrieben.'],['gehen (رفتن)','gegangen','sein','Sie ist nach Hause gegangen.'],['kommen (آمدن)','gekommen','sein','Er ist gekommen.'],['fahren (رانندگی/سفر)','gefahren','sein','Wir sind nach Berlin gefahren.'],['fliegen (پرواز کردن)','geflogen','sein','Ich bin geflogen.'],['sein (بودن)','gewesen','sein','Wo bist du gewesen?'],['werden (شدن)','geworden','sein','Er ist Arzt geworden.']],tableHeaders:['مصدر','Partizip II','کمکی','مثال'],rules:['Partizip II منظم: ge- + ریشه + -t (machen→gemacht)','Partizip II نامنظم: ge- + ریشه متفاوت + -en (gehen→gegangen)','افعال با پیشوند غیرجداشدنی (be-,er-,ver-,ge-): بدون ge- (besuchen→besucht)','افعال -ieren: بدون ge- (studieren→studiert)','sein برای: حرکت از A به B | تغییر حالت | sein/bleiben/werden'],examples:[
{de:'Heute habe ich viel gelernt. Bist du auch zur Schule gegangen?',fa:'امروز خیلی یاد گرفتم. تو هم مدرسه رفتی؟ (haben/sein)'},
{de:'Wohin bist du am Wochenende gefahren? — Ich bin nach Wien gefahren.',fa:'آخر هفته کجا رفتی؟ — به وین رفتم. (sein چون حرکت از A به B)'},
{de:'Er hat drei Jahre in Berlin studiert. (studiert - بدون ge-!)',fa:'سه سال در برلین تحصیل کرد. (افعال -ieren بدون ge-)'},
{de:'Sie hat das Fenster geöffnet und dann ist sie ausgegangen.',fa:'پنجره را باز کرد و بعد بیرون رفت. (öffnen→geöffnet | ausgehen→ausgegangen)'},
{de:'Ich habe ihn nicht besucht, weil ich krank gewesen bin.',fa:'دیدارش نرفتم چون مریض بودم. (besucht بدون ge- | gewesen=sein Partizip II)'},
{de:'Wir haben heute eingekauft, gekocht und gegessen!',fa:'امروز خرید کردیم، پختیم و خوردیم! (جداشدنی: eingekauft=ein+ge+kauf+t)'},
{de:'Bist du je in Deutschland gewesen? — Ja, ich bin letztes Jahr geflogen.',fa:'تا به حال در آلمان بوده‌ای؟ — بله، سال پیش پرواز کردم.'}
]},quiz:generatePerfektQuiz()},
{id:'conjunctions',icon:'🔗',name:'حروف ربط',sub:'und · aber · oder · denn · sondern · koordinierend',clr:'rgba(155,109,204,.55)',tint:'rgba(155,109,204,.06)',explain:{title:'حروف ربط هماهنگ‌کننده (Koordinierende Konjunktionen)',body:'این حروف ربط دو جمله مستقل را وصل می‌کنند. ترتیب کلمات جمله دوم تغییر نمی‌کند (V2 حفظ می‌شود). با حروف ربط تبعی (weil, dass, obwohl) اشتباه نگیرید!',table:[['und','و','Ich lerne und er schläft.','بدون تغییر ترتیب'],['aber','اما / ولی','Er ist müde, aber er lernt.','تضاد، ویرگول قبل'],['oder','یا','Kommst du oder gehst du?','انتخاب'],['denn','چون / زیرا','Ich lerne, denn ich will gut sein.','دلیل، V2 در هر دو'],['sondern','بلکه','Er ist nicht groß, sondern klein.','بعد از نفی، ویرگول'],['sowohl...als auch','هم...هم','Ich mag sowohl Kaffee als auch Tee.','دو چیز'],['weder...noch','نه...نه','Er trinkt weder Kaffee noch Tee.','نفی هر دو'],['entweder...oder','یا...یا','Entweder kommst du, oder ich gehe.','انتخاب اجباری']],tableHeaders:['حرف ربط','معنی','مثال','نکته'],rules:['und/aber/oder/denn/sondern: V2 در جمله دوم حفظ می‌شود','با weil/dass/obwohl اشتباه نگیرید (آن‌ها فعل را آخر می‌برند!)','قبل از aber, sondern, oder معمولاً ویرگول می‌آید','denn vs. weil: denn = بین دو جمله مستقل | weil = Nebensatz'],examples:[
{de:'Ich trinke Kaffee, aber sie trinkt lieber Tee und er trinkt Wasser.',fa:'من قهوه، او چای و او آب می‌نوشد. (aber=ولی | und=و - V2 حفظ)'},
{de:'Er ist nicht müde, sondern krank. Er braucht Ruhe, oder er muss zum Arzt.',fa:'خسته نیست بلکه مریض است. باید استراحت کند یا به دکتر برود. (sondern/oder)'},
{de:'Ich lerne Deutsch, denn ich will in Deutschland arbeiten.',fa:'آلمانی یاد می‌گیرم چون می‌خواهم در آلمان کار کنم. (denn=V2! vs. weil=Neb.)'},
{de:'Ich mag sowohl Kaffee als auch Tee. Ich trinke weder Alkohol noch Cola.',fa:'هم قهوه هم چای دوست دارم. نه الکل می‌نوشم نه کولا. (sowohl/weder)'},

]},quiz:generateConjunctionsQuiz()},

{id:'nebensatz',icon:'🔀',name:'جمله پیرو (Nebensatz)',sub:'dass · ob · weil · wenn · obwohl · فعل آخر',clr:'rgba(93,219,168,.55)',tint:'rgba(93,219,168,.06)',badge:'A2',explain:{title:'جمله پیرو (Nebensatz) - قانون فعل آخر',body:'جمله پیرو با یک حرف ربط تبعی شروع می‌شود. مهم‌ترین قانون: فعل به آخر جمله پیرو می‌رود! با Modal دو فعل آخر می‌آیند.',table:[['dass','که','Ich weiß, dass er kommt.','فکر/احساس/گفتن'],['ob','آیا (سؤال غیرمستقیم)','Ich frage, ob er kommt.','سؤال غیرمستقیم'],['weil','چون (دلیل ناشناخته)','Er bleibt, weil er krank ist.','دلیل'],['da','چون (دلیل شناخته)','Da es regnet, bleibe ich.','دلیل - اول جمله'],['wenn','وقتی/اگر (حال/آینده)','Wenn ich Zeit habe, komme ich.','شرط و زمان'],['als','وقتی که (گذشته یک‌بار)','Als ich jung war, ...','گذشته یک‌بار'],['obwohl','اگرچه','Er kommt, obwohl er müde ist.','تضاد'],['damit','تا اینکه (هدف)','Ich lerne, damit ich Arbeit finde.','هدف'],['bevor','قبل از اینکه','Ruf an, bevor du kommst.','ترتیب زمانی']],tableHeaders:['حرف ربط','معنی','مثال','کاربرد'],rules:['قانون طلایی Nebensatz: حرف ربط تبعی → فاعل → بقیه → فعل (آخر)','Modal + Infinitiv: هر دو آخر می‌آیند → weil er kommen muss','Perfekt: haben/sein هم آخر → weil er gegangen ist','اگر Nebensatz اول بیاید: Nebensatz, + فعل + فاعل + ...','ob برای سؤال غیرمستقیم: Ich weiß nicht, ob er kommt.'],examples:[

]},quiz:generateNebensatzQuiz()},
{id:'weilDa',icon:'💡',name:'دلیل: weil و da',sub:'weil · da · Nebensatz · تفاوت با denn',clr:'rgba(232,90,138,.55)',tint:'rgba(232,90,138,.05)',badge:'A2',explain:{title:'بیان دلیل با weil، da و denn',body:'سه راه برای گفتن «چون»: weil و da جمله پیرو می‌سازند (فعل آخر)، ولی denn دو جمله مستقل را وصل می‌کند (V2 حفظ می‌شود)!',table:[['weil','چون - دلیل ناشناخته/جدید','Ich schlafe, weil ich müde bin.','فعل آخر - رایج‌تر'],['da','چون - دلیل شناخته/واضح','Da es regnet, bleibe ich zu Hause.','فعل آخر - رسمی‌تر'],['denn','چون - دو جمله مستقل','Ich schlafe, denn ich bin müde.','V2 حفظ می‌شود!'],['weil بعد از Modal','فعل Modal آخر','Er kommt nicht, weil er kommen muss.','modal آخر'],['weil بعد از Perfekt','haben/sein آخر','Sie kommt nicht, weil sie gegangen ist.','Partizip+sein آخر']],tableHeaders:['ابزار','کاربرد','مثال','تفاوت'],rules:['weil/da = Nebensatz → فعل به آخر می‌رود','denn = Hauptsatz → V2 حفظ می‌شود','da اغلب اول جمله می‌آید، weil در وسط','تفاوت weil/da: da = دلیل از قبل می‌دانیم','در زبان گفتاری: weil خیلی رایج‌تر از da'],examples:[

{id:'obwohl',icon:'⚡',name:'obwohl و trotzdem',sub:'اگرچه · با اینکه · trotzdem · dennoch',clr:'rgba(212,168,67,.55)',tint:'rgba(212,168,67,.06)',badge:'A2',explain:{title:'جمله تنازلی: obwohl و trotzdem',body:'«obwohl» (اگرچه) جمله پیرو می‌سازد. «trotzdem» (با این حال / با این وجود) یک قید است و V2 می‌سازد. هر دو تضاد بین انتظار و واقعیت را نشان می‌دهند.',table:[['obwohl + Nebensatz','اگرچه → فعل آخر','Er arbeitet, obwohl er krank ist.','جمله پیرو'],['Obwohl... → وارونگی','Nebensatz اول','Obwohl er krank ist, arbeitet er.','وارونگی Hauptsatz'],['trotzdem + V2','با این حال → V2','Er ist krank. Trotzdem arbeitet er.','قید، دو جمله'],['aber','اما (تضاد ساده)','Er ist müde, aber er kommt.','ضعیف‌تر از obwohl'],['dennoch','با این وجود (رسمی‌تر)','Er war müde, dennoch kam er.','رسمی‌تر']],tableHeaders:['ابزار','کاربرد','مثال','نوع'],rules:['obwohl = Nebensatz → فعل به آخر','trotzdem = قید → در جمله دوم یا اول می‌آید','trotzdem اول جمله → وارونگی: Trotzdem kommt er.','obwohl تضاد قوی‌تر از aber را نشان می‌دهد','Obwohl/Trotzdem می‌توانند جایگزین هم شوند اما ساختار فرق دارد'],examples:[
{de:'Sie besteht das Examen, obwohl sie wenig gelernt hat.',fa:'امتحان قبول می‌شود اگرچه کم درس خوانده. (obwohl→فعل آخر: hat)'},
{de:'Das Wetter ist schlecht. Trotzdem gehen wir spazieren.',fa:'هوا بد است. با این حال پیاده‌روی می‌کنیم. (trotzdem=قید → V2: gehen wir)'},
{de:'Obwohl er sehr müde ist, arbeitet er weiter. (Nebensatz اول→وارونگی!)',fa:'اگرچه خیلی خسته است ادامه می‌دهد. (obwohl اول→وارونگی: arbeitet er)'},
{de:'Er kommt, obwohl er eigentlich keine Zeit hat.',fa:'می‌آید اگرچه واقعاً وقت ندارد. (اگرچه=تضاد انتظار)'},
{de:'Trotzdem ist er gekommen. = Obwohl er müde war, ist er gekommen.',fa:'با این حال آمد. = اگرچه خسته بود آمد. (دو راه یک معنا)'},
{de:'Ich verstehe ihn, obwohl er sehr schnell spricht.',fa:'می‌فهمم‌اش اگرچه خیلی تند حرف می‌زند.'},
{de:'Obwohl das teuer ist, kaufe ich es. Es ist ein Geschenk für sie.',fa:'اگرچه گران است می‌خرم. هدیه‌ای برای اوست.'}
]},quiz:generateObwohlQuiz()},
{id:'wennAls',icon:'⏱️',name:'wenn و als',sub:'شرط · زمان · تکرار گذشته vs. یک‌بار',clr:'rgba(155,109,204,.55)',tint:'rgba(155,109,204,.06)',badge:'A2',explain:{title:'wenn (وقتی/اگر) و als (وقتی که) - تفاوت کامل',body:'هر دو یعنی «وقتی که» ولی کاربرد کاملاً متفاوت است: wenn برای حال/آینده و تکرار گذشته - als فقط برای یک اتفاق خاص در گذشته.',table:[['wenn + حال','وقتی/اگر (شرط)','Wenn ich Zeit habe, komme ich.','شرط یا حال/آینده'],['wenn + آینده','وقتی (آینده)','Wenn du kommst, rufe mich an.','آینده'],['wenn + گذشته (تکرار)','هر وقت که (قدیم)','Wenn ich Kind war, spielte ich.','چند بار/عادت گذشته'],['als + گذشته (یک‌بار)','وقتی که (یک‌بار)','Als ich 10 war, zog ich um.','یک لحظه/دوره خاص'],['als + Plusquamperfekt','وقتی که (قبل از)','Als er gegessen hatte, schlief er.','یک عمل قبل از دیگری'],['falls','در صورتی که (احتمال کم)','Falls es regnet, bleibe ich.','شرطی‌تر از wenn']],tableHeaders:['ابزار','معنی','مثال','کاربرد'],rules:['wenn = حال/آینده/تکرار گذشته','als = گذشته یک‌بار/خاص','هر دو Nebensatz می‌سازند → فعل آخر','Als ich jung war = وقتی جوان بودم (دوره خاص)','Wenn ich jung war = هر وقت جوان بودم (تکرار)'],examples:[
{de:'Als ich Kind war, wohnten wir in Teheran. Das war eine schöne Zeit.',fa:'وقتی بچه بودم در تهران زندگی می‌کردیم. دوره زیبایی بود. (als=یک دوره خاص)'},
{de:'Wenn ich Zeit habe, lese ich gerne. Wenn das Wetter gut ist, gehe ich raus.',fa:'وقتی وقت دارم کتاب می‌خوانم. وقتی هوا خوب است بیرون می‌روم. (wenn=حال عادی)'},
{de:'Immer wenn es geregnet hat, sind wir ins Kino gegangen.',fa:'هر وقت باران می‌آمد به سینما می‌رفتیم. (wenn=تکرار گذشته - هر بار)'},
{de:'Als er ankam, war das Essen schon fertig.',fa:'وقتی رسید غذا آماده بود. (als=یک لحظه خاص در گذشته)'},
{de:'Wenn ich Deutsch kann, will ich in Deutschland arbeiten.',fa:'وقتی آلمانی بلد شدم می‌خواهم در آلمان کار کنم. (wenn=آینده)'},
{de:'Als wir jung waren, haben wir zusammen gespielt. Wenn wir Zeit hatten, gingen wir schwimmen.',fa:'وقتی جوان بودیم با هم بازی می‌کردیم. هر وقت وقت داشتیم شنا می‌رفتیم. (als=دوره | wenn=هر بار)'},
{de:'Falls es morgen regnet, bleiben wir zu Hause.',fa:'اگر فردا باران بیاید خانه می‌مانیم. (falls=شرط با احتمال کمتر)'}
]},quiz:generateWennAlsQuiz()},
{id:'akkusativ',icon:'🎯',name:'Akkusativ - کامل',sub:'den·einen·mich·dich·ihn·meinen·deinen',clr:'rgba(93,219,168,.55)',tint:'rgba(93,219,168,.06)',badge:'A2',explain:{title:'حالت مفعول مستقیم (Akkusativ) - کامل',body:'Akkusativ جواب «wen?» (که را؟) یا «was?» (چه را؟) است. آرتیکل، ضمیر شخصی، و ضمیر ملکی در Akkusativ تغییر می‌کنند.',table:[['آرتیکل: مذکر','der→den | ein→einen | kein→keinen','Ich sehe den Mann. / Ich kaufe einen Apfel.','فقط مذکر تغییر می‌کند'],['آرتیکل: مؤنث','die→die | eine→eine','Ich liebe die Musik.','تغییر نمی‌کند'],['آرتیکل: خنثی','das→das | ein→ein','Er kauft das Buch.','تغییر نمی‌کند'],['ضمایر شخصی','ich→mich | du→dich | er→ihn | sie→sie | es→es | wir→uns | ihr→euch | sie→sie','Ich liebe dich. / Er sieht ihn.','ihn = مذکر مهم!'],['ضمایر ملکی: مذکر','mein→meinen | dein→deinen | sein→seinen | ihr→ihren','Ich nehme meinen Mantel.','+ en برای مذکر'],['ضمایر ملکی: مؤنث','mein→meine | dein→deine','Er liebt seine Mutter.','تغییر نمی‌کند'],['ضمایر ملکی: خنثی','mein→mein | dein→dein','Sie kauft ihr Kind ein Eis.','تغییر نمی‌کند'],['حروف اضافه Akk','durch, für, gegen, ohne, um, bis, entlang','durch den Park / für meinen Vater','همیشه Akkusativ!']],tableHeaders:['نوع','تغییر','مثال','نکته'],rules:['Akkusativ: wen? / was?','فقط مذکر آرتیکل تغییر می‌کند: der→den, ein→einen','ضمیر شخصی مذکر: er→ihn (مهم!)','ضمیر ملکی مذکر: mein→meinen, dein→deinen, sein→seinen','حروف اضافه همیشه Akk: durch, für, gegen, ohne, um, bis, entlang','es gibt + Akkusativ: Es gibt einen Park hier.'],examples:[
{de:'Ich liebe dich und du liebst mich. Siehst du mich?',fa:'من تو را دوست دارم و تو مرا. مرا می‌بینی؟ (dich/mich=Akk ضمیر)'},
{de:'Er besucht seinen Vater jeden Sonntag und kauft ihm Blumen.',fa:'هر یکشنبه پدرش را ملاقات می‌کند و برایش گل می‌خرد. (seinen=Akk | ihm=Dat)'},
{de:'Es gibt hier keinen Supermarkt, aber einen kleinen Laden.',fa:'اینجا سوپرمارکتی نیست ولی یک مغازه کوچک هست. (es gibt+Akk | keinen/einen=m.Akk)'},
{de:'Ich nehme meinen Mantel, meine Tasche und mein Handy.',fa:'کتم، کیفم و موبایلم را برمی‌دارم. (meinen=m | meine=f | mein=n)'},
{de:'Wen liebst du? — Ich liebe ihn! Er liebt mich aber nicht.',fa:'که را دوست داری؟ — من او را! ولی او مرا دوست ندارد. (ihn=m.Akk)'},
{de:'Durch den Park gehe ich täglich für meine Gesundheit.',fa:'هر روز برای سلامتیم از پارک رد می‌شوم. (durch/für=Akk حروف اضافه)'},
{de:'Hast du einen Plan? — Ohne einen guten Plan geht gar nichts!',fa:'برنامه داری؟ — بدون یک برنامه خوب هیچ چیز نمی‌شود! (ohne=Akk)'}
]},quiz:generateAkkusativQuiz()},
{id:'dativ',icon:'📌',name:'Dativ - کامل',sub:'wem? · dem·der·einem·mir·dir·ihm·ihr',clr:'rgba(212,168,67,.55)',tint:'rgba(212,168,67,.06)',badge:'A2',explain:{title:'حالت مفعول غیرمستقیم (Dativ) - کامل',body:'Dativ جواب «wem?» (به چه کسی؟) است. آرتیکل، ضمیر شخصی، و ضمیر ملکی همه تغییر می‌کنند.',table:[['آرتیکل: مذکر','der→dem | ein→einem | kein→keinem','Ich gebe dem Mann das Buch.','dem = مذکر Dativ'],['آرتیکل: مؤنث','die→der | eine→einer','Ich helfe der Frau.','der = مؤنث Dativ!'],['آرتیکل: خنثی','das→dem | ein→einem','Er gibt dem Kind Milch.','dem = خنثی هم!'],['آرتیکل: جمع','die→den + اسم+n','Mit den Kindern spielen.','+n به اسم جمع'],['ضمایر شخصی','ich→mir | du→dir | er→ihm | sie→ihr | es→ihm | wir→uns | ihr→euch | sie→ihnen','Er gibt mir das Buch. / Ich helfe dir.','mir/dir/ihm/ihr حفظ شود!'],['ضمایر ملکی: مذکر/خنثی','mein→meinem | dein→deinem | sein→seinem','Ich gehe mit meinem Vater.','+ em برای m/n'],['ضمایر ملکی: مؤنث','mein→meiner | dein→deiner | sein→seiner','Er hilft seiner Mutter.','+ er برای مؤنث'],['حروف اضافه Dat','mit, bei, von, nach, seit, aus, zu, gegenüber','mit meinem Freund / seit einem Jahr','همیشه Dativ!']],tableHeaders:['نوع','تغییر','مثال','نکته'],rules:['Dativ: wem? - به چه کسی؟','مذکر/خنثی: dem/einem | مؤنث: der/einer','ضمیر شخصی Dativ: mir, dir, ihm, ihr, uns, euch, ihnen','ضمیر ملکی Dativ مذکر/خنثی: meinem/deinem/seinem','ضمیر ملکی Dativ مؤنث: meiner/deiner/seiner','جمع در Dativ: اسم + n (Kinder→Kindern)','افعال مهم همیشه Dativ: helfen, danken, gehören, gefallen, glauben'],examples:[
{de:'Kannst du mir bitte helfen? Ich helfe dir auch!',fa:'می‌توانی به من کمک کنی لطفاً؟ من هم به تو کمک می‌کنم! (mir/dir=Dat)'},
{de:'Das Buch gehört meiner Schwester. Ich gebe es ihr.',fa:'کتاب مال خواهرم است. آن را به او می‌دهم. (meiner=Dat | ihr=Dat ضمیر)'},
{de:'Wie geht es dir? — Mir geht es nicht so gut. Ich habe Kopfschmerzen.',fa:'حالت چطور است؟ — زیاد خوب نیست. سردرد دارم. (dir/mir=Dat)'},
{de:'Ich danke dir für deine Hilfe! Das gefällt mir sehr.',fa:'برای کمکت ممنونم! این خیلی به دلم می‌نشیند. (danken/gefallen=همیشه Dativ)'},
{de:'Mit meinem Freund fahre ich zu seiner Mutter. Sie wohnt in München.',fa:'با دوستم به پیش مادرش می‌رویم. او در مونیخ زندگی می‌کند. (meinem/seiner=Dat)'},
{de:'Er spielt seit Jahren mit den Kindern im Park.',fa:'سال‌هاست با بچه‌ها در پارک بازی می‌کند. (mit den Kindern=جمع Dativ - n!)'},
{de:'Ich glaube dir, aber ich glaube ihnen nicht.',fa:'به تو باور دارم ولی به آن‌ها باور ندارم. (glauben=همیشه Dativ)'}
]},quiz:generateDativQuiz()},
{id:'twoWayPrep',icon:'↔️',name:'حروف اضافه دوگانه',sub:'in/auf/an/über/unter/vor/hinter/neben/zwischen',clr:'rgba(232,90,138,.55)',tint:'rgba(232,90,138,.05)',badge:'A2',explain:{title:'حروف اضافه مکانی دوگانه (Wechselpräpositionen) - کامل',body:'۹ حرف اضافه هستند که بسته به معنی Dativ (مکان - wo?) یا Akkusativ (جهت - wohin?) می‌سازند. کلید: افعال وضعیت → Dativ، افعال حرکت → Akkusativ.',table:[['in','در/توی (مکان) ↔ به داخل (حرکت)','im Zimmer (Dat) / ins Zimmer (Akk)','im=in dem | ins=in das'],['auf','روی (مکان) ↔ روی (حرکت)','auf dem Tisch (Dat) / auf den Tisch (Akk)',''],['an','کنار/به (مکان) ↔ کنار (حرکت)','an der Wand (Dat) / an die Wand (Akk)','ans=an das'],['über','بالای (مکان) ↔ بالای (حرکت)','über dem Bett (Dat) / über das Bett (Akk)',''],['unter','زیر (مکان) ↔ زیر (حرکت)','unter dem Tisch (Dat) / unter den Tisch (Akk)',''],['vor','جلوی (مکان) ↔ جلوی (حرکت)','vor der Tür (Dat) / vor die Tür (Akk)',''],['hinter','پشت (مکان) ↔ پشت (حرکت)','hinter dem Haus (Dat) / hinter das Haus (Akk)',''],['neben','کنار (مکان) ↔ کنار (حرکت)','neben dem Auto (Dat) / neben das Auto (Akk)',''],['zwischen','بین (مکان) ↔ بین (حرکت)','zwischen den Stühlen (Dat) / zwischen die Stühle (Akk)','']],tableHeaders:['حرف اضافه','معنی','Dativ (wo?) / Akkusativ (wohin?)','ترکیب'],rules:['wo? (کجاست؟) → Dativ - مکان ثابت','wohin? (به کجا؟) → Akkusativ - جهت/حرکت','افعال وضعیت (مکان): liegen, stehen, sitzen, hängen, sein → Dativ','افعال حرکت (تغییر مکان): legen, stellen, setzen, hängen, gehen, fahren → Akkusativ','ترکیب‌های رایج: im(in+dem) | ins(in+das) | am(an+dem) | ans(an+das)','جمله تستی: Das Buch liegt auf dem Tisch.(Dat) Er legt das Buch auf den Tisch.(Akk)'],examples:[
{de:'Das Poster hängt an der Wand. (wo?) → Ich hänge das Poster an die Wand. (wohin?)',fa:'پوستر به دیوار آویزان است. → پوستر را به دیوار می‌آویزم. (an+Dat/Akk)'},
{de:'Das Buch liegt auf dem Tisch. (wo?) → Er legt das Buch auf den Tisch. (wohin?)',fa:'کتاب روی میز است. → کتاب را روی میز می‌گذارد. (auf+Dat/Akk)'},
{de:'Die Katze schläft unter dem Bett. → Sie läuft unter das Bett.',fa:'گربه زیر تخت می‌خوابد. → زیر تخت می‌دود. (liegen=Dat | laufen=Akk)'},
{de:'Er sitzt vor dem Computer. → Er setzt sich vor den Computer.',fa:'جلوی کامپیوتر نشسته. → می‌نشیند جلوی کامپیوتر. (sitzen=Dat | setzen=Akk)'},
{de:'Das Bild hängt zwischen den Fenstern. → Ich hänge es zwischen die Fenster.',fa:'تصویر بین پنجره‌هاست. → آن را بین پنجره‌ها می‌آویزم. (zwischen+Dat/Akk)'},
{de:'Stell die Vase auf den Tisch! — Sie steht doch schon auf dem Tisch.',fa:'گلدان را روی میز بگذار! — که روی میز است! (stellen=Akk | stehen=Dat)'},
{de:'Im Zimmer = in dem Zimmer. Ins Zimmer = in das Zimmer. (ترکیب‌های رایج)',fa:'در اتاق = im Zimmer | به اتاق = ins Zimmer. (im/ins ترکیب)'}
]},quiz:generateTwoWayPrepQuiz()},
{id:'komparativ',icon:'📊',name:'مقایسه صفات',sub:'Komparativ · Superlativ · als · so wie · Umlaut',clr:'rgba(93,219,168,.45)',tint:'rgba(93,219,168,.05)',badge:'A2',explain:{title:'مقایسه صفات (Komparativ & Superlativ) - کامل',body:'سه درجه صفت در آلمانی. مقایسه برتری با als، مقایسه برابری با so...wie. برخی صفات Umlaut می‌گیرند و برخی کاملاً نامنظمند.',table:[['schnell / schneller / am schnellsten','تند / تندتر / سریع‌ترین','schneller als - so schnell wie'],['groß / größer / am größten','بزرگ / بزرگ‌تر / بزرگ‌ترین','Umlaut! g→ö'],['alt / älter / am ältesten','قدیم / قدیمی‌تر / قدیمی‌ترین','Umlaut! a→ä'],['jung / jünger / am jüngsten','جوان / جوان‌تر / جوان‌ترین','Umlaut! u→ü'],['warm / wärmer / am wärmsten','گرم / گرم‌تر / گرم‌ترین','Umlaut! a→ä'],['gut / besser / am besten','خوب / بهتر / بهترین','نامنظم! حفظ شود'],['viel / mehr / am meisten','زیاد / بیشتر / بیشترین','نامنظم! حفظ شود'],['gern / lieber / am liebsten','با میل / ترجیحاً / بیشتر از همه','نامنظم! حفظ شود'],['hoch / höher / am höchsten','بلند / بلندتر / بلندترین','hoch→höh'],['nah / näher / am nächsten','نزدیک / نزدیک‌تر / نزدیک‌ترین','nah→näh']],tableHeaders:['positiv / Komparativ / Superlativ','معنی','نکته'],rules:['Komparativ: صفت + -er (schnell→schneller)','Superlativ با am: am schnell-sten','Superlativ صفتی: das schnellste Auto','برتری: A ist größer als B','برابری: A ist so groß wie B','کمتری: A ist weniger groß als B','Umlaut: groß, alt, jung, warm, kalt, kurz, lang, arm, klug'],examples:[
{de:'Deutsch ist schwerer als Englisch, aber leichter als Chinesisch!',fa:'آلمانی سخت‌تر از انگلیسی است ولی آسان‌تر از چینی! (schwerer/leichter als)'},
{de:'Er ist genauso groß wie sein Vater, aber jünger als sein Bruder.',fa:'به همان اندازه پدرش قد دارد ولی از برادرش جوان‌تر است.'},
{de:'Das war das beste Essen, das ich je gegessen habe!',fa:'این بهترین غذایی بود که تا به حال خوردم! (best- = صفتی با -e)'},
{de:'Je mehr ich schlafe, desto müder werde ich!',fa:'هر چقدر بیشتر می‌خوابم خسته‌تر می‌شوم! (je...desto)'},
{de:'Berlin ist größer als München, aber kleiner als Shanghai.',fa:'برلین از مونیخ بزرگ‌تر است ولی از شانگهای کوچک‌تر. (größer/kleiner als)'},
{de:'Ich trinke lieber Tee als Kaffee. — Ich am liebsten Wasser!',fa:'چای را ترجیح می‌دهم تا قهوه. — من بیشتر از همه آب! (lieber/am liebsten=نامنظم)'},
{de:'Das neue Restaurant ist nicht so teuer wie das alte.',fa:'رستوران جدید نه به گرانی قدیمی است. (nicht so...wie)'}
]},quiz:generateKomparativQuiz()},

{id:'prateritum',icon:'📜',name:'Präteritum',sub:'war · hatte · wurde · منظم · نامنظم',clr:'rgba(155,109,204,.5)',tint:'rgba(155,109,204,.06)',badge:'A2',explain:{title:'زمان گذشته ساده (Präteritum) - کامل',body:'Präteritum در نوشتار رسمی، اخبار، داستان‌ها و گزارش‌ها استفاده می‌شود. در مکالمه برای sein، haben و Modalها رایج است. بقیه افعال را در مکالمه با Perfekt می‌گویند.',table:[['sein (بودن)','war | warst | war | waren | wart | waren','Präteritum رایج‌ترین - حفظ شود!'],['haben (داشتن)','hatte | hattest | hatte | hatten | hattet | hatten','در مکالمه هم رایج'],['werden (شدن)','wurde | wurdest | wurde | wurden | wurdet | wurden','مهم برای Passiv'],['können','konnte | konntest | konnte | konnten','Modal در Präteritum - بدون Umlaut!'],['müssen','musste | musstest | musste | mussten','Modal - بدون ß!'],['wollen','wollte | wolltest | wollte | wollten','Modal منظم'],['منظم: sagen','sagte | sagtest | sagte | sagten','ریشه + te | sagten'],['منظم: machen','machte | machtest | machte | machten','ریشه + te'],['نامنظم: gehen','ging | gingst | ging | gingen','ریشه کاملاً تغییر می‌کند'],['نامنظم: schreiben','schrieb | schriebst | schrieb | schrieben','ie → ie']],tableHeaders:['فعل','صرف (ich|du|er|wir)','نکته'],rules:['sein → war (مکالمه هم استفاده می‌شود)','haben → hatte (مکالمه هم رایج)','Modalها در Präteritum: konnte/musste/wollte/durfte/sollte','منظم Präteritum: ریشه + te + پسوند','نامنظم: ریشه کاملاً عوض می‌شود (Ablautreihen)','Perfekt vs Präteritum: در مکالمه Perfekt، در نوشتار Präteritum'],examples:[

انم) روی میز است. (einer Freundin=f.Genitiv نامعرفه)'},{de:'Statt des Busses nehme ich das Fahrrad. Trotz des Regens gehe ich raus.',fa:'به جای اتوبوس دوچرخه. علیرغم باران بیرون. (statt/trotz + Genitiv)'}]},quiz:generateGenitivQuiz()},

  {type:'mcq',q:'Akkusativ جواب کدام سؤال است؟',options:['wer? (که)','wem? (به که)','wen/was? (که/چه را)','wessen? (مال که)'],answer:'wen/was? (که/چه را)'},
  {type:'mcq',q:'«der Mann» در Akkusativ:',options:['der Mann','dem Mann','den Mann','des Mannes'],answer:'den Mann'},
  {type:'fill',q:'Ich sehe ___ Mann. (مذکر معرفه - Akkusativ)',answer:'den',hint:'مذکر Akk: der → den'},

  {type:'mcq',q:'«einen Mann» - «einen» کدام حالت است؟',options:['Nominativ','Akkusativ','Dativ','Genitiv'],answer:'Akkusativ'},
  {type:'mcq',q:'ضمیر ملکی مذکر Akkusativ «من» چیست؟',options:['mein','meinen','meinem','meine'],answer:'meinen'},
  {type:'fill',q:'Er kauft ___ Apfel. (نامعرفه مذکر Akkusativ)',answer:'einen',hint:'ein → einen برای مذکر Akk'},
  {type:'scramble',q:'مرتب کن:',words:['kauft','Er','Kaffee','einen'],answer:'Er kauft einen Kaffee'},
  {type:'mcq',q:'«für» کدام حالت می‌سازد؟',options:['Nominativ','Dativ','Akkusativ','Genitiv'],answer:'Akkusativ'},
  {type:'fill',q:'Das Geschenk ist ___ meinen Vater. (für + Akk)',answer:'für',hint:'für + Akkusativ'},
  {type:'mcq',q:'«Siehst du ___?» - ضمیر Akkusativ «ما»:',options:['wir','uns','unser','ihr'],answer:'uns'},
  {type:'fill',q:'Er nimmt ___ Mantel. (کتش - مذکر معرفه)',answer:'den',hint:'مذکر Akk: der → den'},
  {type:'mcq',q:'«ohne» کدام حالت می‌سازد؟',options:['Nominativ','Dativ','Akkusativ','Genitiv'],answer:'Akkusativ'},
  {type:'fill',q:'Sie liebt ___ Bruder. (برادرش - seinen/ihren?)',answer:'ihren',hint:'ihr = مال او(زن) | مذکر Akk: ihr → ihren'}

// Build fast lookup indices once from DICT_WORDS
var _dictByDe=null, _dictByForm=null, _dictByPartizip=null, _dictByPlural=null, _dictByKomp=null;
function _buildDictIndices(){
  if(_dictByDe) return;
  _dictByDe=new Map();_dictByForm=new Map();_dictByPartizip=new Map();_dictByPlural=new Map();_dictByKomp=new Map();
  DICT_WORDS.forEach(d=>{
    if(d.de) _dictByDe.set(d.de.toLowerCase(),d);
    if(d.forms){
      Object.values(d.forms).forEach(f=>{
        if(f && !_dictByForm.has(f.toLowerCase())) _dictByForm.set(f.toLowerCase(),d);
      });
    }
    if(d.partizip && !_dictByPartizip.has(d.partizip.toLowerCase())) _dictByPartizip.set(d.partizip.toLowerCase(),d);
    if(d.pl && !_dictByPlural.has(d.pl.toLowerCase())) _dictByPlural.set(d.pl.toLowerCase(),d);
    if(d.komp && !_dictByKomp.has(d.komp.toLowerCase())) _dictByKomp.set(d.komp.toLowerCase(),d);
    if(d.sup && !_dictByKomp.has(d.sup.toLowerCase())) _dictByKomp.set(d.sup.toLowerCase(),d);
  });
}

// Look up a (cleaned) German word's Persian meaning. Returns {de, fa, phonetic} or null.
function lookupWordMeaning(rawWord){
  if(!rawWord) return null;
  // strip punctuation, keep umlauts/ß
  let w=rawWord.replace(/^[„"'«»(),.!?;:]+|[„"'«»(),.!?;:]+$/g,'').trim();
  if(!w) return null;
  if(!/[a-zA-ZäöüÄÖÜß]/.test(w)) return null;

  _buildDictIndices();
  const wl=w.toLowerCase();

  // 1) mini-dict (function words, pronouns, common irregular forms)
  const lower=w.charAt(0).toLowerCase()+w.slice(1);
  const upper=w.charAt(0).toUpperCase()+w.slice(1);
  if(MINI_WORD_DICT[w]) return {de:w,fa:MINI_WORD_DICT[w]};
  if(MINI_WORD_DICT[lower]) return {de:w,fa:MINI_WORD_DICT[lower]};
  if(MINI_WORD_DICT[upper]) return {de:w,fa:MINI_WORD_DICT[upper]};

  // 2) exact dictionary entry (infinitive / noun / adjective base form)
  let hit=_dictByDe.get(wl);
  if(hit) return {de:w,fa:hit.fa.split('/')[0].trim(),phonetic:hit.phonetic};

  // 3) conjugated verb form (e.g. "spricht" -> sprechen)
  hit=_dictByForm.get(wl);
  if(hit) return {de:w,fa:hit.fa.split('/')[0].trim()+' (از '+hit.de+')',phonetic:hit.phonetic};

  // 4) Partizip II (e.g. "gesprochen" -> sprechen)
  hit=_dictByPartizip.get(wl);
  if(hit) return {de:w,fa:hit.fa.split('/')[0].trim()+' (Partizip II از '+hit.de+')',phonetic:hit.phonetic};

  // 5) plural noun (e.g. "Bücher" -> Buch)
  hit=_dictByPlural.get(wl);
  if(hit) return {de:w,fa:'جمع «'+hit.de+'» — '+hit.fa.split('/')[0].trim(),phonetic:hit.phonetic};

  // 6) komparativ/superlativ adjective (e.g. "besser" -> gut)
  hit=_dictByKomp.get(wl);
  if(hit) return {de:w,fa:hit.fa.split('/')[0].trim()+' (مقایسه‌ای از '+hit.de+')',phonetic:hit.phonetic};

  // 7) strip common verb endings and retry on the base dictionary (covers most regular conjugations)
  const stems=[];
  if(wl.endsWith('est')) stems.push(wl.slice(0,-3)+'en',wl.slice(0,-3)+'eln',wl.slice(0,-2));
  if(wl.endsWith('st')) stems.push(wl.slice(0,-2)+'en',wl.slice(0,-1));
  if(wl.endsWith('et')) stems.push(wl.slice(0,-2)+'en');
  if(wl.endsWith('te')) stems.push(wl.slice(0,-2)+'en');
  if(wl.endsWith('ten')) stems.push(wl.slice(0,-3)+'en');
  if(wl.endsWith('end')) stems.push(wl.slice(0,-3)+'en');
  if(wl.endsWith('e')||wl.endsWith('t')) stems.push(wl+'n',wl.slice(0,-1)+'en');
  if(wl.endsWith('n')) stems.push(wl);
  if(wl.endsWith('e')) stems.push(wl.slice(0,-1));
  if(wl.endsWith('er')||wl.endsWith('en')) stems.push(wl.slice(0,-2));
  // umlaut-back conversions for stem vowel changes (ä/ö/ü -> a/o/u) e.g. fährt->fahren, läuft->laufen
  const deUmlaut=s=>s.replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u');
  [...stems].forEach(s=>{const d=deUmlaut(s);if(d!==s)stems.push(d);});
  for(const s of stems){
    hit=_dictByDe.get(s);
    if(hit) return {de:w,fa:hit.fa.split('/')[0].trim()+(s!==wl?' (از '+hit.de+')':''),phonetic:hit.phonetic};
    if(MINI_WORD_DICT[s]) return {de:w,fa:MINI_WORD_DICT[s]+(s!==wl?' (از '+s+')':'')};
  }

  // 8) compound word: match the longest known dictionary word that the input ends with
  //    (covers e.g. "Hausaufgaben" -> "Aufgaben"/"Aufgabe", "Wohnzimmer" -> "Zimmer")
  if(w.length>=5){
    let best=null,bestLen=0;
    _dictByDe.forEach((d,key)=>{
      if(key.length>=4 && key.length<w.length && wl.endsWith(key) && key.length>bestLen){
        best=d;bestLen=key.length;
      }
    });
    if(best) return {de:w,fa:'(بخشی از کلمه) '+best.fa.split('/')[0].trim(),phonetic:null};
  }

  return null;
}

let _wmpEl=null;
function showWordMeaning(el,word){
  const info=lookupWordMeaning(word);
  if(!info) return;
  if(!_wmpEl){
    _wmpEl=document.createElement('div');
    _wmpEl.className='word-meaning-popup';
    document.body.appendChild(_wmpEl);
  }
  _wmpEl.classList.remove('show');
  const safeSpeak=info.de.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  _wmpEl.innerHTML=`<div class="wmp-row"><span class="wmp-de">${info.de}</span><button class="wmp-speak" onclick="event.stopPropagation();speak('${safeSpeak}');">🔊</button></div><div class="wmp-fa">${info.fa}</div>`;
  _wmpEl.style.pointerEvents='auto';
  const rect=el.getBoundingClientRect();
  _wmpEl.style.left=Math.min(Math.max(rect.left+rect.width/2,50),window.innerWidth-50)+'px';
  requestAnimationFrame(()=>{
    const h=_wmpEl.offsetHeight;
    _wmpEl.style.top=Math.max(8,rect.top-h-10)+'px';
    _wmpEl.classList.add('show');
  });
  clearTimeout(_wmpEl._hideTimer);
  _wmpEl._hideTimer=setTimeout(()=>{_wmpEl.classList.remove('show');},2600);
  sfxTap();
}

/* ═══════════════════════════════════════════
   DICTIONARY RENDER FUNCTIONS
═══════════════════════════════════════════ */
const DICT_CATS=['همه','A1','A2','اسم','فعل','صفت','مشاغل','احساسات','بدن','غذا','خانه','لباس','رنگ‌ها','آب و هوا','سفر','شهری','خانواده','آموزش','کار','تکنولوژی','طبیعت','فرهنگ','اجتماعی','مکان','زمان','ادب','مالی','بهداشت','رستوران','ورزش','ناسزا'];

function getArtClass(art){
  if(art==='der') return 'art-der';
  if(art==='die') return 'art-die';
  if(art==='das') return 'art-das';
  if(art==='verb') return 'art-verb';
  if(art==='adj') return 'art-adj';
  return 'art-other';
}
function getArtLabel(art){
  if(art==='der') return 'der · مذکر';
  if(art==='die') return 'die · مؤنث';
  if(art==='das') return 'das · خنثی';
  if(art==='verb') return 'فعل';
  if(art==='adj') return 'صفت';
  if(art==='-') return 'عبارت';
  return art;
}
function getArtColor(art){
  if(art==='der') return 'rgba(64,160,240,.4)';
  if(art==='die') return 'rgba(232,90,138,.35)';
  if(art==='das') return 'rgba(80,210,130,.4)';
  if(art==='verb') return 'rgba(212,168,67,.4)';
  if(art==='adj') return 'rgba(240,200,100,.35)';
  return 'rgba(180,140,255,.2)';
}

let dictFiltered=[];

function renderDict(){
  const el=document.getElementById('dictContent');
  el.innerHTML=`
    <div class="dict-search-bar">
      <span class="dict-search-icon">🔍</span>
      <input class="dict-search-input" id="dictSearchInput" placeholder="جستجو در واژه‌نامه..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="filterDict()"/>
    </div>
    <div class="dict-filters" id="dictFilters">
      ${DICT_CATS.map(c=>`<button class="dict-filter-btn${c===state.dictCat?' active':''}" onclick="setDictCat('${c}')">${c}</button>`).join('')}
    </div>
    <div class="dict-count-bar">
      <span class="dict-count-txt" id="dictCountTxt"></span>
    </div>
    <div class="dict-word-list" id="dictWordList"></div>
  `;
  filterDict();
}

function setDictCat(cat){
  sfxTap();
  state.dictCat=cat;
  document.querySelectorAll('.dict-filter-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent===cat);
  });
  filterDict();
}

function filterDict(){
  var _dsi=document.getElementById('dictSearchInput');const q=((_dsi&&_dsi.value)||state.dictQuery).trim().toLowerCase();
  state.dictQuery=q;
  const cat=state.dictCat;

  dictFiltered=DICT_WORDS.filter(w=>{
    const matchQ=!q || w.de.toLowerCase().includes(q) || w.fa.includes(q) || (w.phonetic&&w.phonetic.toLowerCase().includes(q));
    let matchCat=true;
    if(cat==='اسم') matchCat=['der','die','das'].includes(w.art);
    else if(cat==='فعل') matchCat=w.art==='verb';
    else if(cat==='صفت') matchCat=w.art==='adj';
    else if(cat==='A1') matchCat=w.tags&&w.tags.includes('A1')&&!(w.tags.includes('A2'));
    else if(cat==='A2') matchCat=w.tags&&w.tags.includes('A2');
    else if(cat!=='همه') matchCat=w.tags&&w.tags.includes(cat);
    return matchQ && matchCat;
  });

  const list=document.getElementById('dictWordList');
  const countTxt=document.getElementById('dictCountTxt');
  if(countTxt) countTxt.textContent=dictFiltered.length+' کلمه';

  if(!dictFiltered.length){

// Wrap each word of a German sentence in a tappable span for meaning popups
function wrapWordsForTap(sentence){
  return sentence.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok) || tok==='') return tok;
    // Only wrap tokens containing Latin letters (German words) — skip Persian text,
    // pure punctuation, blanks (___), and standalone symbols.
    if(!/[a-zA-ZäöüÄÖÜß]/.test(tok)) return tok;
    const safe=tok.replace(/'/g,"\\'");
    return `<span class="tappable-word" onclick="event.stopPropagation();showWordMeaning(this,'${safe}');">${tok}</span>`;
  }).join('');
}

function startListening(){

    rec.onerror=e=>{cleanup();if(e.error==='not-allowed'){setMicStatus('اجازه میکروفون داده نشده');return;}showTextFallback();};

function levenshtein(a,b){if(!a)return b.length;if(!b)return a.length;const dp=Array.from({length:a.length+1},(_,i)=>Array.from({length:b.length+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[a.length][b.length];}

function pronScore(heard,target){
  const norm=s=>s.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z\s]/g,'').trim();
  const pk=s=>s.replace(/sch/g,'sh').replace(/ch/g,'k').replace(/w/g,'v').replace(/z/g,'ts').replace(/ei/g,'ai').replace(/ie/g,'i').replace(/eu/g,'oi').replace(/(.)\\1/g,'$1').trim();
  const stripArt=s=>s.replace(/^(der|die|das|ein|eine)\\s+/i,'').trim();
  const h=stripArt(norm(heard)),t=stripArt(norm(target));
  const hk=pk(h),tk=pk(t);
  if(h===t||hk===tk)return 1.0;
  const maxLen=Math.max(hk.length,tk.length);
  if(maxLen===0)return 1.0;
  const pkScore=1-(levenshtein(hk,tk)/maxLen);
  const rawMax=Math.max(h.length,t.length);
  const rawScore=rawMax===0?1:1-(levenshtein(h,t)/rawMax);
  return Math.max(pkScore,rawScore);
}
function pronPronMatch(heard,target){return pronScore(heard,target)>=0.78;}

function showPronResult(correct,heard){
  pronState.total++;if(correct)pronState.correct++;
  updatePronScore();
  const box=document.getElementById('pronResult');
  if(!box)return;
  box.className='pron-result show '+(correct?'correct':'wrong');
  document.getElementById('pronResultEmoji').textContent=correct?'🎉':'❌';

  document.getElementById('pronResultHeard').textContent='شنیدم: '+heard;
  if(correct){
    pronState.streak++;updateStreakUI();
    if(pronState.wrongQueue.length>0&&pronState.wrongQueue[0].de===getActiveWord().de)pronState.wrongQueue.shift();
    const thisAttempts=pronState.attempts+1;
    const prev=pronState.wordHistory[getActiveWord().de]||{bestAttempt:99};
    pronState.wordHistory[getActiveWord().de]={bestAttempt:Math.min(prev.bestAttempt,thisAttempts)};
    addXP(8+Math.min(pronState.streak*2,12));sfxCorrect();
    setTimeout(()=>pronNext(),1800);
  }else{
    pronState.streak=0;updateStreakUI();pronState.attempts++;
    const w=getActiveWord();if(!pronState.wrongQueue.find(x=>x.de===w.de))pronState.wrongQueue.push(w);
    sfxWrong();
  }
}

function pronNext(){

function updatePronScore(){

/* ═══════════════════════════════════════════
   LERNBOX ENGINE v2 — هوشمند
═══════════════════════════════════════════ */
const LB_KEY='herrbnm_lernbox_v3';
const LB_INTERVALS=[1,2,5,10,21]; // days per box
const LB_WORDS_PER_SESSION=15;
const LB_NEW_PER_DAY=12;
// Quiz type weights per box level
// box1=new/unknown → mostly cards+spelling
// box3+=review → more quiz variety

function lbLoad(){
  try{const d=localStorage.getItem(LB_KEY);if(d)return JSON.parse(d);}catch(e){}
  return {wordMap:{},todayDate:'',todayNew:0,todayReviewed:0,totalCorrect:0,totalSeen:0,streak:0,lastStudyDate:'',wrongList:[]};
}
function lbSave(data){try{localStorage.setItem(LB_KEY,JSON.stringify(data));}catch(e){}}
function lbTodayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

function lbResetDay(data){
  const today=lbTodayStr();
  if(data.todayDate===today)return;
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yStr=yesterday.getFullYear()+'-'+(yesterday.getMonth()+1)+'-'+yesterday.getDate();
  if(data.lastStudyDate===yStr)data.streak=(data.streak||0)+1;
  else if(data.lastStudyDate!==today)data.streak=0;
  data.todayDate=today;data.todayNew=0;data.todayReviewed=0;
  data.lastStudyDate=today;
}

function lbGetDueWords(data){
  const now=Date.now();
  const due=[];
  Object.entries(data.wordMap).forEach(([de,info])=>{
    // mastered: فقط اگه خیلی overdue باشه (مرور ۳۰ روزه)
    if(info.mastered&&info.nextReview>now)return;
    if(info.box>=1&&info.nextReview<=now)due.push(de);
  });
  due.sort((a,b)=>{
    const ia=data.wordMap[a],ib=data.wordMap[b];
    if(ia.box!==ib.box)return ia.box-ib.box;
    return ia.nextReview-ib.nextReview;
  });
  return due;
}

function lbGetNewCandidates(data){
  const known=new Set(Object.keys(data.wordMap));
  // prioritize A1 words, then A2, then others
  const priority=(w)=>{
    if(w.tags&&w.tags.includes('A1'))return 0;
    if(w.tags&&w.tags.includes('A2'))return 1;
    return 2;
  };
  return DICT_WORDS
    .filter(w=>!known.has(w.de)&&w.de&&w.de.length>=2)
    .sort((a,b)=>priority(a)-priority(b));
}

function lbScheduleNext(data,de,knew,quality){
  const info=data.wordMap[de]||{box:0,nextReview:Date.now(),seenCount:0,correctCount:0,streakCorrect:0};
  info.seenCount=(info.seenCount||0)+1;
  if(knew){
    info.correctCount=(info.correctCount||0)+1;
    info.streakCorrect=(info.streakCorrect||0)+1;
    if(quality==='good')info.box=Math.min(5,(info.box||0)+1);
    else if(quality==='ok')info.box=Math.min(5,(info.box||0)+1);
    else info.box=Math.max(1,info.box||1); // hard → stay
    // MASTERED: box 5 و ۳ بار متوالی درست
    if(info.box>=5&&info.streakCorrect>=3&&!info.mastered){
      info.mastered=true;info.masteredDate=lbTodayStr();
    }
  }else{
    info.box=1; // wrong → back to box 1
    info.streakCorrect=0;
    info.mastered=false; // از mastered خارج می‌شه اگه اشتباه بزنه
    if(!data.wrongList)data.wrongList=[];
    if(!data.wrongList.includes(de))data.wrongList.push(de);
  }
  const box=Math.max(1,info.box);
  const days=LB_INTERVALS[box-1]||1;
  // mastered words: مرور ۳۰ روز یکبار
  info.nextReview=info.mastered
    ? Date.now()+30*24*60*60*1000
    : Date.now()+days*24*60*60*1000;
  data.wordMap[de]=info;
}

// ── build session items ──
// Each word gets multiple quiz types in a session (smart)
function lbBuildSession(data,mode){
  lbResetDay(data);
  const items=[];

  if(mode==='wrong'){
    // Wrong-session: only words from wrongList
    const wrongs=(data.wrongList||[]).slice(0,20);
    wrongs.forEach(de=>{
      const w=DICT_WORDS.find(x=>x.de===de);
      if(!w)return;
      items.push({word:w,isNew:false,sessionMode:'card'});
      items.push({word:w,isNew:false,sessionMode:lbPickQuizType(w,data)});
      if(lbCanSpell(w))items.push({word:w,isNew:false,sessionMode:'spelling'});
    });
    return shuffle(items);
  }

  const due=lbGetDueWords(data);
  const newCandidates=lbGetNewCandidates(data);
  const newLeft=Math.max(0,LB_NEW_PER_DAY-(data.todayNew||0));

  // Add due (review) words
  const reviewWords=due.slice(0,Math.ceil(LB_WORDS_PER_SESSION*0.6));
  reviewWords.forEach(de=>{
    const w=DICT_WORDS.find(x=>x.de===de);
    if(!w)return;
    // Each review word: quiz first (test), then card if wrong
    items.push({word:w,isNew:false,sessionMode:lbPickQuizType(w,data)});
    // higher box → also spelling
    const info=data.wordMap[de];
    if(info&&info.box>=3&&lbCanSpell(w))items.push({word:w,isNew:false,sessionMode:'spelling'});
  });

  // Add new words
  const newSlots=Math.min(newLeft,LB_WORDS_PER_SESSION-reviewWords.length);
  newCandidates.slice(0,newSlots).forEach(w=>{
    items.push({word:w,isNew:true,sessionMode:'card'}); // show card first
    items.push({word:w,isNew:true,sessionMode:'meaning'}); // then quiz meaning
  });

  // interleave: shuffle but keep card before quiz for same word
  return smartShuffle(items);
}

function lbCanSpell(word){
  return word.de.length>=3&&word.de.length<=12&&!word.de.includes(' ');
}

function lbPickQuizType(word,data){
  const isVerb=word.art==='verb';
  const isNoun=['der','die','das'].includes(word.art);
  const isAdj=word.art==='adj';
  const info=data.wordMap[word.de];
  const box=info?info.box:1;
  const hasEx=word.ex&&word.ex.length&&word.ex[0].de.split(' ').length>=3;
  const r=Math.random();

  // box 3+ می‌تونه sentence scramble هم داشته باشه
  if(box>=3&&hasEx&&r<0.35)return 'sentence';

  if(isNoun){
    if(r<0.55)return 'article';
    return 'meaning';
  }
  if(isVerb){
    if(box>=2&&r<0.5)return 'conj';
    return 'meaning';
  }
  if(isAdj){
    if(box>=3&&r<0.4)return 'komparativ';
    return 'meaning';
  }
  return 'meaning';
}

function shuffle(arr){return arr.slice().sort(()=>Math.random()-.5);}

function smartShuffle(items){
  // Group by word, keep card before quiz per word
  const byWord={};
  items.forEach(item=>{
    const key=item.word.de;
    if(!byWord[key])byWord[key]=[];
    byWord[key].push(item);
  });
  // Interleave words
  const words=shuffle(Object.keys(byWord));
  const result=[];
  let maxLen=Math.max(...words.map(w=>byWord[w].length));
  for(let i=0;i<maxLen;i++){
    words.forEach(w=>{if(byWord[w][i])result.push(byWord[w][i]);});
  }
  return result;
}

// ── State ──
const lbState={
  data:null,sessionQueue:[],sessionIdx:0,
  phase:'home',revealed:false,
  sessionCorrect:0,sessionWrong:0,sessionTotal:0,
  quizAnswered:false,correctAnswer:null,
  newSeenThisSession:0,
  currentMode:'normal' // 'normal' | 'wrong'
};

// ── Judge (card mode) ──
function lbJudge(knew,quality){
  sfxTap();
  const item=lbState.sessionQueue[lbState.sessionIdx];
  const word=item.word;const data=lbState.data;
  if(!data.wordMap[word.de])data.wordMap[word.de]={box:0,nextReview:Date.now(),seenCount:0,correctCount:0};
  lbScheduleNext(data,word.de,knew,quality);
  data.totalSeen=(data.totalSeen||0)+1;
  if(knew){data.totalCorrect=(data.totalCorrect||0)+1;lbState.sessionCorrect++;}
  else{lbState.sessionWrong++;}
  if(item.isNew&&!item.isRetry){data.todayNew=(data.todayNew||0)+1;lbState.newSeenThisSession++;}
  else if(!item.isNew)data.todayReviewed=(data.todayReviewed||0)+1;
  data.lastStudyDate=lbTodayStr();
  lbState.sessionTotal++;
  lbSave(data);
  if(knew)addXP(quality==='good'?10:quality==='ok'?7:4);
  // if wrong → re-insert card 3 slots later
  if(!knew){
    const retry={word,isNew:false,sessionMode:'card',isRetry:true};
    const at=Math.min(lbState.sessionIdx+3,lbState.sessionQueue.length);
    lbState.sessionQueue.splice(at,0,retry);
  }
  lbState.sessionIdx++;
  setTimeout(()=>lbShowCurrent(),140);
}

function lbGetBoxColor(box){return['var(--rose)','var(--gold)','var(--plum2)','var(--mint)','#c8a8ff'][(box||1)-1]||'var(--rose)';}
function lbGetBoxLabel(box){return['جعبه ۱','جعبه ۲','جعبه ۳','جعبه ۴','جعبه ۵'][(box||1)-1]||'جعبه ۱';}

// ── Show current item ──
function lbShowCurrent(){
  if(lbState.sessionIdx>=lbState.sessionQueue.length){lbSessionDone();return;}
  const item=lbState.sessionQueue[lbState.sessionIdx];
  const mode=item.sessionMode||'card';
  if(mode==='card')lbRenderCard(item.word,item.isNew,item.isRetry);
  else if(mode==='spelling')lbRenderSpellingQuiz(item.word);
  else if(mode==='sentence')lbRenderSentenceQuiz(item.word);
  else lbRenderQuiz(item.word,mode);
}

// ── CARD ──
function lbRenderCard(word,isNew,isRetry){
  lbState.phase='card';lbState.revealed=false;
  const data=lbState.data;const info=data.wordMap[word.de]||{box:1};
  const boxColor=lbGetBoxColor(info.box);const boxLabel=lbGetBoxLabel(info.box);
  const progress=lbState.sessionIdx;const total=lbState.sessionQueue.length;
  const isNoun=['der','die','das'].includes(word.art);
  const artBadge=isNoun?`<div class="lb-art-badge art-${word.art}" style="margin-bottom:8px;">${word.art}</div>`:
    word.art==='verb'?`<div class="lb-art-badge art-verb" style="margin-bottom:8px;">Verb</div>`:
    word.art==='adj'?`<div class="lb-art-badge art-adj" style="margin-bottom:8px;">Adjektiv</div>`:'';
  const safeDE=word.de.replace(/'/g,"\\'");
  const safeEx=word.ex&&word.ex.length?word.ex[0].de.replace(/'/g,"\\'"):'';
  const statusBadge=isRetry
    ?`<span style="font-size:10px;font-weight:700;color:var(--rose);background:rgba(232,90,138,.12);border:1px solid rgba(232,90,138,.3);border-radius:99px;padding:3px 10px;font-family:JetBrains Mono,monospace;">🔁 دوباره</span>`
    :isNew?`<span style="font-size:10px;font-weight:700;color:var(--mint);background:rgba(93,219,168,.12);border:1px solid rgba(93,219,168,.25);border-radius:99px;padding:3px 10px;font-family:JetBrains Mono,monospace;">NEW</span>`
    :`<span style="font-size:10px;font-weight:700;color:var(--gold);background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.25);border-radius:99px;padding:3px 10px;font-family:JetBrains Mono,monospace;">مرور</span>`;
  const el=document.getElementById('lernboxContent');
  el.innerHTML=`
    <div class="lb-progress-bar"><div class="lb-progress-fill" style="width:${Math.round((progress/total)*100)}%"></div></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <span style="font-family:var(--ff-mono);font-size:11px;color:var(--muted);">${progress+1} / ${total}</span>
      ${statusBadge}
      <span style="font-family:var(--ff-mono);font-size:10px;color:${boxColor};background:rgba(255,255,255,.05);border:1px solid ${boxColor};border-radius:99px;padding:3px 10px;opacity:.8;">${boxLabel}</span>
    </div>
    <div class="lb-card">
      ${artBadge}
      <div class="lb-de-word">${word.de}</div>
      ${word.phonetic?`<div class="lb-phonetic">${word.phonetic}</div>`:''}
      <button style="background:rgba(155,109,204,.1);border:1px solid rgba(155,109,204,.3);color:var(--plum2);border-radius:99px;padding:8px 20px;font-size:16px;cursor:pointer;margin-bottom:8px;" onclick="speak('${safeDE}');sfxTap();">🔊 بشنو</button>

function sentPlaceWord(el){
  if(el.classList.contains('used'))return;
  const widx=parseInt(el.dataset.widx);
  const word=window._sentShuffled[widx];
  const ph=document.getElementById('sentPlaceholder');
  if(ph)ph.style.display='none';
  const ans=document.getElementById('sentAnswer');
  const chip=document.createElement('div');
  chip.className='word-chip placed';
  chip.dataset.widx=widx;
  chip.style.cssText='padding:8px 14px;border-radius:10px;font-family:var(--ff-de);font-size:15px;direction:ltr;cursor:pointer;';
  chip.textContent=word;
  chip.onclick=()=>{
    ans.removeChild(chip);
    const src=document.getElementById('sWord_'+widx);
    if(src)src.classList.remove('used');
    if(!ans.querySelector('.word-chip.placed')){const p=document.getElementById('sentPlaceholder');if(p)p.style.display='';}
    sfxTap();
  };

function lbMakeQuiz(word,forcedType){
  const isVerb=word.art==='verb';
  const isNoun=['der','die','das'].includes(word.art);
  const isAdj=word.art==='adj';
  let qType=forcedType||'meaning';
  let correctAns='',qText='',wordDisplay='';
  let options=[];

  const wordBase=`<div style="font-family:var(--ff-de);font-size:26px;font-weight:600;color:var(--text);direction:ltr;text-align:center;margin:12px 0;letter-spacing:.5px;">${word.de}</div>`;
  const faBase=`<div style="font-size:22px;font-weight:700;color:var(--text);text-align:center;margin:12px 0;direction:rtl;">${word.fa}</div>`;

  // ─── ARTICLE quiz ───────────────────────────────────────────
  if(qType==='article'&&isNoun){
    // 50/50: آلمانی→آرتیکل  یا  فارسی→آلمانی کامل
    const variant=Math.random()<0.5?'art_de':'art_reverse';
    if(variant==='art_de'){
      correctAns=word.art;
      qText=`آرتیکل صحیح «${word.de}» کدام است؟`;
      wordDisplay=`<div style="font-family:var(--ff-de);font-size:22px;color:var(--text2);direction:ltr;text-align:center;margin:10px 0;">${word.de}<div style="font-size:13px;color:var(--muted);margin-top:4px;">${word.fa}</div></div>`;
      options=shuffle(['der','die','das']);
    }else{
      // ترجمه معکوس: فارسی → آلمانی کامل (آرتیکل+کلمه)
      correctAns=`${word.art} ${word.de}`;
      qText=`معادل آلمانی «${word.fa}» کدام است؟`;
      wordDisplay=faBase;
      // گزینه‌های اشتباه: اسم‌های مشابه از دیکشنری
      const pool=DICT_WORDS.filter(w=>['der','die','das'].includes(w.art)&&w.de!==word.de&&w.fa!==word.fa);
      shuffle(pool);
      const wrong=pool.slice(0,3).map(w=>`${w.art} ${w.de}`);
      options=shuffle([correctAns,...wrong]);
    }

  // ─── CONJ quiz ──────────────────────────────────────────────
  }else if(qType==='conj'&&isVerb&&word.forms){
    const pronouns=['ich','du','er','wir','ihr','sie'];
    const pron=pronouns[Math.floor(Math.random()*pronouns.length)];
    correctAns=word.forms[pron]||'';
    if(!correctAns||correctAns===word.fa){qType='meaning';}else{
      qText=`فعل «${word.de}» برای ضمیر «${pron}» چیست؟`;
      wordDisplay=`<div style="font-family:var(--ff-de);font-size:20px;direction:ltr;text-align:center;margin:10px 0;"><span style="color:var(--gold);font-weight:700;">${pron}</span> <span style="color:var(--muted)">___</span><div style="font-size:12px;color:var(--muted);margin-top:4px;">${word.fa}</div></div>`;
      const allForms=Object.values(word.forms).filter(f=>f&&f!==correctAns);
      const verbPool=DICT_WORDS.filter(w=>w.art==='verb'&&w.forms&&w.forms[pron]&&w.forms[pron]!==correctAns);
      const wrongSet=[...new Set([...allForms,...verbPool.map(w=>w.forms[pron])])].filter(Boolean);
      shuffle(wrongSet);
      const wrong=wrongSet.slice(0,3);
      while(wrong.length<3)wrong.push(word.de+'e');
      options=shuffle([correctAns,...wrong.slice(0,3)]);
    }

  // ─── KOMPARATIV quiz ────────────────────────────────────────
  }else if(qType==='komparativ'&&isAdj&&word.komp){
    const r=Math.random();
    if(r<0.5){
      correctAns=word.komp;
      qText=`Komparativ (تر) از «${word.de}» چیست؟`;
    }else{
      correctAns=word.sup||word.komp;
      qText=`Superlativ (ترین) از «${word.de}» چیست؟`;
    }
    wordDisplay=wordBase;
    const adjPool=DICT_WORDS.filter(w=>w.art==='adj'&&w.komp&&w.komp!==correctAns&&w.sup!==correctAns);
    adjPool.sort(()=>Math.random()-.5);
    const wrong=adjPool.slice(0,3).map(w=>r<0.5?w.komp:(w.sup||w.komp)).filter(Boolean);
    while(wrong.length<3)wrong.push('—');
    options=shuffle([correctAns,...wrong.slice(0,3)]);
  }

  // ─── MEANING fallback ────────────────────────────────────────
  if(qType==='meaning'||options.length===0){
    // 40% شانس: ترجمه معکوس (فارسی→آلمانی)
    const doReverse=Math.random()<0.4;
    if(doReverse){
      qType='reverse';
      correctAns=word.de;
      qText=`معادل آلمانی «${word.fa}» کدام است؟`;
      wordDisplay=faBase;
      const pool=DICT_WORDS.filter(w=>w.de!==word.de&&w.fa!==word.fa);
      pool.sort(()=>Math.random()-.5);
      const wrong=pool.slice(0,3).map(w=>w.de);
      options=shuffle([correctAns,...wrong]);
    }else{
      qType='meaning';
      correctAns=word.fa;
      qText=`معنی فارسی «${word.de}» چیست؟`;
      wordDisplay=wordBase;
      const pool=DICT_WORDS.filter(w=>w.de!==word.de&&w.fa&&w.fa!==correctAns);
      pool.sort(()=>Math.random()-.5);
      const wrong=pool.slice(0,3).map(w=>w.fa);
      options=shuffle([correctAns,...wrong]);
    }
  }

  return {options,correctAns,qType,qText,wordDisplay};
}

function lbCheckQuiz(btn){
  if(lbState.quizAnswered)return;lbState.quizAnswered=true;
  const chosen=btn.dataset.opt;const answer=btn.dataset.ans;
  document.querySelectorAll('#lbQuizOptions .option-btn').forEach(b=>b.classList.add('disabled'));
  const correct=(chosen===answer);
  const word=lbState.sessionQueue[lbState.sessionIdx].word;
  if(correct){
    btn.classList.add('correct');lbState.sessionCorrect++;
    lbScheduleNext(lbState.data,word.de,true,'ok');
    lbSave(lbState.data);addXP(10);sfxCorrect();
    const fb=document.getElementById('lbFeedback');
    if(fb){fb.className='feedback-box correct';fb.style.display='block';fb.innerHTML='<div class="fb-title" style="color:var(--mint);">✦ RICHTIG · درست!</div>';}
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('#lbQuizOptions .option-btn').forEach(b=>{if(b.dataset.opt===answer)b.classList.add('correct');});
    lbScheduleNext(lbState.data,word.de,false,'hard');

    const retry={word,isNew:false,sessionMode:'card',isRetry:true};
    const at=Math.min(lbState.sessionIdx+3,lbState.sessionQueue.length);
    lbState.sessionQueue.splice(at,0,retry);
  }
  lbState.sessionTotal++;
  document.getElementById('lbNextBtn').style.display='block';
}

function lbRenderSpellingQuiz(word){
  lbState.phase='spelling';lbState.quizAnswered=false;lbState.correctAnswer=word.de;
  const progress=lbState.sessionIdx;const total=lbState.sessionQueue.length;
  const isNoun=['der','die','das'].includes(word.art);

  // Shuffle letters - guaranteed different order
  const origLetters=word.de.split('');
  let indices=origLetters.map((_,i)=>i);
  let tries=0;
  do{
    for(let i=indices.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [indices[i],indices[j]]=[indices[j],indices[i]];
    }
    tries++;
  }while(tries<30&&indices.map(i=>origLetters[i]).join('')===word.de&&origLetters.length>1);

  const shuffledLetters=indices.map(i=>origLetters[i]);

  // lbSpellLetters: global array برای track کردن حروف

  window._spellLetters=shuffledLetters;

      ${isNoun?`<div style="font-size:12px;color:var(--gold);font-family:var(--ff-mono);margin-bottom:4px;">(${word.art} ___)</div>`:''}
      ${word.phonetic?`<div style="font-size:11px;color:var(--muted);font-family:var(--ff-mono);">${word.phonetic}</div>`:''}
      <button onclick="speak('${word.de.replace(/'/g,"\\'")}');sfxTap();" style="margin-top:8px;background:rgba(155,109,204,.1);border:1px solid rgba(155,109,204,.3);color:var(--plum2);border-radius:99px;padding:6px 16px;font-size:13px;cursor:pointer;">🔊 بشنو</button>

      <span style="color:var(--muted);font-size:12px;" id="spellingPlaceholder">← حروف رو از پایین انتخاب کن</span>
    </div>

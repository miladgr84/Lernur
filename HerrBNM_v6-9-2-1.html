function spellingPlaceLetter(el){
  if(el.classList.contains('used'))return;
  const sidx=parseInt(el.dataset.sidx);
  const letter=window._spellLetters[sidx];
  const ph=document.getElementById('spellingPlaceholder');
  if(ph)ph.style.display='none';
  const ans=document.getElementById('spellingAnswer');
  const chip=document.createElement('div');
  chip.className='word-chip placed';
  chip.dataset.sidx=sidx;
  chip.style.cssText='min-width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono,monospace;font-size:22px;font-weight:700;border-radius:12px;cursor:pointer;';
  chip.textContent=letter;
  chip.onclick=()=>{
    ans.removeChild(chip);
    const src=document.getElementById('sLetter_'+sidx);
    if(src)src.classList.remove('used');
    if(!ans.querySelector('.word-chip.placed')){const ph2=document.getElementById('spellingPlaceholder');if(ph2)ph2.style.display='';}
    sfxTap();
  };
  ans.appendChild(chip);
  el.classList.add('used');
}

function spellingSkip(){
  if(lbState.quizAnswered)return;lbState.quizAnswered=true;
  const word=lbState.sessionQueue[lbState.sessionIdx].word;
  const fb=document.getElementById('lbFeedback');
  if(fb){fb.className='feedback-box wrong';fb.style.display='block';fb.innerHTML=`<div class="fb-title" style="color:var(--gold);">کلمه: <span style="font-family:JetBrains Mono,monospace;">${word.de}</span></div>`;}
  document.getElementById('lbNextBtn').style.display='block';
  lbState.sessionTotal++;lbState.sessionWrong++;
}

function spellingCheck(){
  if(lbState.quizAnswered)return;lbState.quizAnswered=true;
  const answer=window._spellWord||lbState.correctAnswer;
  const ans=document.getElementById('spellingAnswer');
  // از dataset.sidx بخون و حروف واقعی رو بساز
  const placed=Array.from(ans.querySelectorAll('.word-chip.placed')).map(c=>{
    const sidx=parseInt(c.dataset.sidx);
    return(window._spellLetters&&sidx>=0)?window._spellLetters[sidx]:c.textContent;
  }).join('');
  const correct=placed===answer;
  const fb=document.getElementById('lbFeedback');
  const word=lbState.sessionQueue[lbState.sessionIdx].word;
  if(correct){
    fb.className='feedback-box correct';fb.style.display='block';
    fb.innerHTML=`<div class="fb-title" style="color:var(--mint);">✦ RICHTIG · درست! <span style="font-family:var(--ff-mono);">${answer}</span></div>`;
    lbScheduleNext(lbState.data,word.de,true,'good');
    lbSave(lbState.data);lbState.sessionCorrect++;lbState.sessionTotal++;addXP(15);sfxCorrect();
  }else{
    fb.className='feedback-box wrong';fb.style.display='block';
    fb.innerHTML=`<div class="fb-title" style="color:var(--rose);">✗ پاسخ درست: <span style="font-family:var(--ff-mono);color:var(--gold);">${answer}</span></div><div style="font-size:11px;color:var(--muted);margin-top:4px;">جواب تو: ${placed||'—'}</div>`;
    lbScheduleNext(lbState.data,word.de,false,'hard');
    lbSave(lbState.data);lbState.sessionWrong++;lbState.sessionTotal++;sfxWrong();
    const retry={word,isNew:false,sessionMode:'card',isRetry:true};
    const at=Math.min(lbState.sessionIdx+3,lbState.sessionQueue.length);
    lbState.sessionQueue.splice(at,0,retry);
  }
  document.getElementById('lbNextBtn').style.display='block';
}

function lbStartSession(mode){
  const data=lbState.data;
  lbState.currentMode=mode||'normal';

    el.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--text2);">

      <div style="font-family:var(--ff-display);font-size:13px;color:var(--mint);">${mode==='wrong'?'هیچ کلمه اشتباهی نداری!':'ALLES ERLEDIGT · همه چیز تمومه!'}</div>

}

// ── SESSION DONE ──
function lbSessionDone(){
  lbState.phase='done';const data=lbState.data;

function chGetTodayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function chLoad(){
  try{const d=localStorage.getItem(CH_KEY);return d?JSON.parse(d):{};}catch(e){return {};}
}
function chSave(data){
  try{localStorage.setItem(CH_KEY,JSON.stringify(data));}catch(e){}
}

function chShuffleQuestions(){
  const pool=[...CH_QUESTIONS];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  return pool.slice(0,10);
}

function chShuffleOpts(opts){
  const a=[...opts];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function chSetName(){

function chStart(){
  chState={

    todayKey:chGetTodayKey()
  };
  chState.timerInterval=setInterval(chTick,1000);
  chRenderQuestion();
}

function chTick(){
  chState.timer--;
  if(chState.timer<=0){chState.timer=0;chTimeUp();}
  const fillEl=document.getElementById('chTimerFill');
  const timerEl=document.getElementById('chTimer');
  if(fillEl) fillEl.style.width=`${(chState.timer/CH_DURATION)*100}%`;
  if(timerEl){
    const m=Math.floor(chState.timer/60).toString().padStart(2,'0');
    const s=(chState.timer%60).toString().padStart(2,'0');
    timerEl.textContent=`${m}:${s}`;
    if(chState.timer<=10) timerEl.classList.add('urgent');
  }
}

function chTimeUp(){
  clearInterval(chState.timerInterval);
  chState.done=true;
  chFinish();
}

function chAnswer(chosen,correct){
  if(chState.answered)return;
  chState.answered=true;
  const btns=document.querySelectorAll('.ch-opt');
  btns.forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
    else if(b.textContent===chosen&&chosen!==correct)b.classList.add('wrong');
  });
  if(chosen===correct){chState.score++;sfxCorrect();}else sfxWrong();
  setTimeout(()=>{
    chState.current++;
    chState.answered=false;
    if(chState.current>=10){clearInterval(chState.timerInterval);chFinish();}
    else chRenderQuestion();
  },700);
}

function chFinish(){
  clearInterval(chState.timerInterval);
  chState.active=false;
  const data=chLoad();
  const todayKey=chState.todayKey;
  data[todayKey]={score:chState.score,name:data.name||'کاربر',ts:Date.now()};
  // add to leaderboard
  if(!data.lb) data.lb={};
  if(!data.lb[todayKey]) data.lb[todayKey]=[];
  // update own entry
  const myName=data.name||'کاربر';
  data.lb[todayKey]=data.lb[todayKey].filter(e=>e.n!==myName);
  data.lb[todayKey].push({n:myName,s:chState.score,t:Date.now()});
  data.lb[todayKey].sort((a,b)=>b.s-a.s||(a.t-b.t));
  chSave(data);
  addXP(chState.score*5);
  const el=document.getElementById('challengeContent');
  el.innerHTML=`
    <div class="sec-title">⚔️ نتیجه چالش</div>
    <div class="challenge-banner" style="cursor:default;">
      <div class="ch-result">
        <div style="font-size:36px;margin-bottom:6px;">${chState.score>=8?'🏆':chState.score>=5?'⭐':'💪'}</div>
        <div class="ch-result-score">${chState.score} / 10</div>
        <div class="ch-result-msg">${chScoreMsg(chState.score)}</div>
        <div style="font-size:12px;color:var(--gold);margin-top:4px;">+${chState.score*5} XP</div>
      </div>
      ${chRenderLeaderboard(data,todayKey,myName)}
    </div>`;
  showXPToast(`+${chState.score*5} XP`);
}

function chScoreMsg(s){
  if(s>=9)return 'عالی! Ausgezeichnet! 🌟';
  if(s>=7)return 'خوب! Sehr gut! 🎉';
  if(s>=5)return 'قابل قبوله! Gut! 👍';
  return 'ادامه بده! Weiter so! 💪';
}

function chRenderLeaderboard(data,todayKey,myName){
  const lb=(data.lb&&data.lb[todayKey])||[];
  if(lb.length===0)return `<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px;">اولین نفر باش! ⚔️</div>`;
  const top=lb.slice(0,10);
  const medals=['🥇','🥈','🥉'];
  return `
    <div class="ch-lb">
      <div class="ch-lb-title">🏆 جدول امتیازات امروز</div>
      ${top.map((e,i)=>`
        <div class="ch-lb-row ${e.n===myName?'me':''}">
          <div class="ch-lb-rank ${i<3?'gold':''}">${medals[i]||`${i+1}.`}</div>
          <div class="ch-lb-name">${e.n===myName?'<span style="color:var(--gold)">'+e.n+' (تو)</span>':e.n}</div>
          <div class="ch-lb-pts">${e.s}/10</div>
        </div>`).join('')}
    </div>`;
}

function openTopic(id){
  const t=TOPICS.find(x=>x.id===id);
  if(!t)return;
  state.currentTopic=t;
  const ex=t.explain||{};
  let html=`
    <button class="back-btn" onclick="showScreen('homeScreen');renderHome();sfxTap();">‹ بازگشت</button>
    <div class="lesson-header">
      <div class="lesson-header-top">
        <div class="lesson-topic-icon">${t.icon||'📘'}</div>
        <div>
          <div class="lesson-title">${ex.title||t.name}</div>
          <div class="lesson-sub">${t.sub||''}</div>
        </div>
      </div>
    </div>
    <div class="lesson-divider"></div>
  `;
  if(ex.body){
    html+=`
    <div class="lesson-section">
      <div class="lesson-section-label">توضیح</div>
      <div class="lesson-body">${ex.body}</div>
    </div>`;
  }
  if(ex.table&&ex.table.length){
    const headers=ex.tableHeaders||[];
    html+=`
    <div class="lesson-section">
      <div class="lesson-section-label">جدول</div>
      <div class="gram-cards">
        ${ex.table.map(row=>{
          const main=row[0]||'';
          const rest=row.slice(1);
          return `<div class="gram-card">
            <div class="gram-card-head">
              <div class="gram-card-de">${main}</div>
              ${headers[0]?`<div class="gram-card-fa">${headers[0]}</div>`:''}
            </div>
            <div class="gram-card-body">
              ${rest.map((cell,i)=>{
                const isLast=i===rest.length-1;
                const cls=isLast?'note':(i%2===0?'':'mint');
                return `<span class="gram-chip ${cls}">${cell}</span>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  if(ex.rules&&ex.rules.length){
    html+=`
    <div class="lesson-section">
      <div class="lesson-section-label">قواعد کلیدی</div>
      <div class="rules-list">
        ${ex.rules.map(r=>`<div class="rule-item"><span class="rule-dot">◆</span><span class="rule-text">${r}</span></div>`).join('')}
      </div>
    </div>`;
  }
  if(ex.examples&&ex.examples.length){
    html+=`
    <div class="lesson-section">
      <div class="lesson-section-label">مثال‌ها</div>
      ${ex.examples.map(e=>`
        <div class="example-row">
          <div class="example-de">${wrapWordsForTap(e.de)}</div>
          <div class="example-fa-row">
            <div class="example-fa">${e.fa}</div>
            <button class="speak-mini" onclick="toggleSpeak(this,'${e.de.replace(/'/g,"\\'")}');sfxTap();"></button>
          </div>
        </div>
      `).join('')}
    </div>`;
  }
  html+=`
    <button class="lb-start-btn" style="margin-top:10px;" onclick="startTopicQuiz('${id}');sfxTap();">▶ شروع تمرین</button>
    <div style="height:16px;"></div>
  `;
  document.getElementById('lessonContent').innerHTML=html;
  showScreen('lessonScreen');
  document.getElementById('lessonScreen').scrollTop=0;
}

function startTopicQuiz(id){
  const t=TOPICS.find(x=>x.id===id);
  if(!t)return;
  const gen=QUIZ_GENERATORS[id];
  if(!gen){showHintModal('تمرین این درس هنوز آماده نیست.');return;}
  state.currentTopic=t;
  state.currentQuiz=gen();
  state.currentQuizIndex=0;
  state.score=0;
  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion(){


  const q=state.currentQuiz[state.currentQuizIndex];
  const total=state.currentQuiz.length,idx=state.currentQuizIndex;
  const typeLabel={mcq:'انتخاب چندگزینه‌ای',scramble:'مرتب‌سازی',fill:'پر کردن جای خالی',listen:'گوش دادن'}[q.type]||q.type;
  let bodyHTML='';
  if(q.type==='mcq'||q.type==='listen'){
    if(q.type==='listen'){bodyHTML=`<button class="listen-btn" onclick="toggleSpeak(this,'${q.text.replace(/'/g,"\\'")}');sfxTap();">
      <div class="listen-btn-play"><div class="listen-play-circle"><div class="listen-play-icon"></div></div></div>
      <div class="listen-btn-body"><span class="listen-btn-label">بشنو و انتخاب کن</span><div class="listen-btn-bars"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
    </button>`;}
    bodyHTML+=`<div class="options-grid" id="mcqOptionsGrid">${q.options.map(o=>`<button class="option-btn" data-opt="${o.replace(/"/g,'&quot;')}" data-ans="${q.answer.replace(/"/g,'&quot;')}" onclick="checkMCQ(this);sfxTap();">${o}</button>`).join('')}</div>`;
  }else if(q.type==='scramble'){
    const shuffled=[...q.words].sort(()=>Math.random()-.5);
    const chipsHTML=shuffled.map((w,i)=>`<div class="word-chip bank" id="bankChip_${i}" data-word="${w.replace(/"/g,'&quot;')}" onclick="placeWord(this);sfxTap();"><span class="wc-text">${w}</span><span class="wc-info" onclick="event.stopPropagation();showWordMeaning(this.parentElement,'${w.replace(/'/g,"\\'")}');">ⓘ</span></div>`).join('');
    bodyHTML=`<div class="scramble-sentence" id="scrambleSentence"></div>
    <div class="word-bank" id="wordBank">${chipsHTML}</div>
    <input type="hidden" id="scrambleAnswer" value="${q.answer.replace(/"/g,'&quot;')}"/>
    <button class="check-btn" onclick="checkScramble();sfxTap();">✦ تأیید</button>`;
  }else if(q.type==='fill'){
    bodyHTML=`${q.hint?`<button class="hint-btn" onclick="showHintModal('${q.hint.replace(/'/g,"\\'")}');sfxTap();">💡 راهنما</button>`:''}
    <input class="fill-input" id="fillInput" placeholder="پاسخ را اینجا بنویس..." autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="check-btn" onclick="checkFill('${q.answer.replace(/'/g,"\\'")}')">✦ تأیید</button>`;
  }
  document.getElementById('quizContent').innerHTML=`
    <div class="quiz-hud">
      <div class="quiz-counter">${idx+1}/${total}</div>
      <div class="quiz-track"><div class="quiz-track-fill" style="width:${Math.round((idx/total)*100)}%"></div></div>
      <div class="quiz-score-badge">✦ ${state.score}</div>
    </div>
    <div class="quiz-card">
      <span class="quiz-type-tag">${typeLabel}</span>
      <div class="quiz-q">${q.q}</div>
    </div>
    ${bodyHTML}
    <div class="feedback-box" id="feedbackBox"><div class="fb-title" id="fbTitle"></div><div class="fb-text" id="fbText"></div></div>
    <button class="action-btn" id="nextBtn" onclick="nextQuestion()">بعدی ←</button>
  `;
  if(q.type==='listen'){setTimeout(()=>{const lb=document.querySelector('.listen-btn');if(lb)toggleSpeak(lb,q.text);},350);}
  document.getElementById('quizScreen').scrollTop=0;
}
function placeWord(el){
  const word=el.dataset.word;
  const srcId=el.id;
  const s=document.getElementById('scrambleSentence');
  const c=document.createElement('div');
  c.className='word-chip placed';
  c.dataset.word=word;
  c.dataset.srcId=srcId;
  const textSpan=document.createElement('span');
  textSpan.className='wc-text';
  textSpan.textContent=word;
  textSpan.onclick=()=>{
    s.removeChild(c);
    const src=document.getElementById(srcId);
    if(src)src.classList.remove('used');
    sfxTap();
  };
  const infoSpan=document.createElement('span');
  infoSpan.className='wc-info';
  infoSpan.textContent='ⓘ';
  infoSpan.onclick=(e)=>{e.stopPropagation();showWordMeaning(c,word);};
  c.appendChild(textSpan);
  c.appendChild(infoSpan);
  s.appendChild(c);
  el.classList.add('used');
}
function checkMCQ(btn){const chosen=btn.dataset.opt;const answer=btn.dataset.ans;document.querySelectorAll('#mcqOptionsGrid .option-btn').forEach(b=>b.classList.add('disabled'));if(chosen===answer){btn.classList.add('correct');showFeedback(true,'✦ RICHTIG · درست!','پاسخ صحیح است. آفرین!');state.score++;addXP(10);sfxCorrect();}else{btn.classList.add('wrong');document.querySelectorAll('#mcqOptionsGrid .option-btn').forEach(b=>{if(b.dataset.opt===answer)b.classList.add('correct');});showFeedback(false,'✗ FALSCH · اشتباه',`پاسخ درست: ${answer}`);sfxWrong();}document.getElementById('nextBtn').style.display='block';}
function checkScramble(){
  const s=document.getElementById('scrambleSentence');
  const answerEl=document.getElementById('scrambleAnswer');
  if(!answerEl)return;
  const answerRaw=answerEl.value;
  const chips=Array.from(s.querySelectorAll('.word-chip'));
  if(chips.length===0){showFeedback(false,'✗ جمله خالی است','کلمات را مرتب کن');return;}
  // Reconstruct placed sentence from dataset.word (preserves multi-word chips like "zu Hause")
  const placedWords=chips.map(c=>c.dataset.word||c.textContent.trim());
  const placed=placedWords.join(' ').replace(/\s+/g,' ').trim();
  const ans=answerRaw.replace(/\s+/g,' ').trim();
  if(placed===ans){
    showFeedback(true,'✦ RICHTIG · درست!','ترتیب کلمات صحیح است.');
    state.score++;addXP(15);sfxCorrect();
  }else{
    showFeedback(false,'✗ FALSCH · اشتباه',`پاسخ درست: ${ans}`);
    sfxWrong();
  }
  document.querySelector('.check-btn').disabled=true;
  document.getElementById('nextBtn').style.display='block';
}
function checkFill(answer){const input=document.getElementById('fillInput');const val=input.value.trim();const correct=val.toLowerCase()===answer.toLowerCase();input.disabled=true;if(correct){input.style.borderColor='rgba(93,219,168,.4)';input.style.boxShadow='0 0 0 4px rgba(93,219,168,.1)';showFeedback(true,'✦ RICHTIG · درست!','پاسخ صحیح است.');state.score++;addXP(12);sfxCorrect();}else{input.style.borderColor='rgba(232,90,138,.4)';input.style.boxShadow='0 0 0 4px rgba(232,90,138,.1)';showFeedback(false,'✗ FALSCH · اشتباه',`پاسخ درست: ${answer}`);sfxWrong();}document.querySelector('.check-btn').disabled=true;document.getElementById('nextBtn').style.display='block';}
function showFeedback(ok,title,text){const box=document.getElementById('feedbackBox');box.className='feedback-box '+(ok?'correct':'wrong');box.style.display='block';document.getElementById('fbTitle').textContent=title;document.getElementById('fbText').textContent=text;}
function nextQuestion(){sfxTap();state.currentQuizIndex++;if(state.currentQuizIndex>=state.currentQuiz.length)showResult();else renderQuestion();}

function showResult(){
  const total=state.currentQuiz.length,score=state.score,pct=Math.round((score/total)*100);
  const prev=state.progress[state.currentTopic.id]||0;
  state.progress[state.currentTopic.id]=Math.max(prev,pct);
  let emoji='😅',msg='دوباره تلاش کن!';
  if(pct>=90){emoji='🏆';msg='MEISTER · استاد شدی!';}
  else if(pct>=70){emoji='🎉';msg='SEHR GUT · خوب بود!';}
  else if(pct>=50){emoji='💪';msg='WEITER SO · ادامه بده!';}
  document.getElementById('resultScreen').innerHTML=`
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <h2>${msg}</h2>
      <p>${state.currentTopic.name}</p>
      <div class="result-stats">

        <div class="result-stat"><div class="rs-val">${pct}%</div><div class="rs-label">SCORE</div></div>
        <div class="result-stat"><div class="rs-val">+${score*10}</div><div class="rs-label">XP</div></div>
      </div>

      <button class="retry-btn" style="border-color:rgba(155,109,204,.35);background:linear-gradient(135deg,rgba(155,109,204,.12),rgba(212,168,67,.06));" onclick="openTopic('${state.currentTopic.id}')">◈ مرور درس</button>

  `;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

  document.getElementById('resultScreen').scrollTop=0;

}

const PARTNER_KEY='herrbnm_partner_chat_v1';
const APIKEY_STORE='herrbnm_api_key_v1';

/* ── API KEY MANAGEMENT ── */
function getApiKey(){try{return localStorage.getItem(APIKEY_STORE)||'';}catch(e){return '';}}
function setApiKey(k){try{localStorage.setItem(APIKEY_STORE,k);}catch(e){}}
function clearApiKey(){try{localStorage.removeItem(APIKEY_STORE);}catch(e){}}

function updateKeyBadge(){
  const badge=document.getElementById('keyBadge');
  if(!badge)return;
  const k=getApiKey();
  if(k){
    badge.className='key-badge set';
    badge.textContent='🔑 API KEY · تنظیم شده';
  }else{
    badge.className='key-badge unset';
    badge.textContent='🔑 API KEY · لازم است';
  }
}

function openApiKeyModal(){
  // remove old if exists
  const old=document.getElementById('apikeyOverlay');if(old)old.remove();
  const k=getApiKey();
  const overlay=document.createElement('div');
  overlay.className='apikey-overlay';
  overlay.id='apikeyOverlay';
  overlay.innerHTML=`
<div class="apikey-modal">
  <div class="apikey-title">🔑 کلید API آنتروپیک</div>
  <div class="apikey-sub">برای استفاده از یاور روی GitHub Pages، به کلید API آنتروپیک نیاز داری.<br>از <a class="apikey-link" href="https://console.anthropic.com/keys" target="_blank">console.anthropic.com</a> کلید بساز.</div>
  <div class="apikey-error" id="apikeyErr">کلید معتبر نیست. دوباره بررسی کن.</div>
  <div class="apikey-input-wrap">
    <input class="apikey-field" id="apikeyField" type="password" placeholder="sk-ant-api03-…" value="${k}" dir="ltr" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <button class="apikey-toggle" onclick="var f=document.getElementById('apikeyField');f.type=f.type==='password'?'text':'password';">👁</button>
  </div>
  <button class="apikey-save" onclick="saveApiKeyFromModal()">ذخیره و شروع چت ✓</button>
  ${k?`<button class="apikey-save" style="background:rgba(232,90,138,.1);border-color:rgba(232,90,138,.3);color:var(--rose);margin-bottom:12px;" onclick="clearApiKey();updateKeyBadge();document.getElementById('apikeyOverlay').remove();">🗑 حذف کلید</button>`:''}
  <div class="apikey-note">کلید فقط در همین مرورگر (localStorage) ذخیره می‌شه و هیچ‌جا ارسال نمی‌شه.</div>
</div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
  setTimeout(()=>{const f=document.getElementById('apikeyField');if(f){f.focus();f.select();}},100);
}

function saveApiKeyFromModal(){
  const f=document.getElementById('apikeyField');
  const err=document.getElementById('apikeyErr');
  const val=(f.value||'').trim();
  if(!val||(!val.startsWith('sk-ant-')&&val.length<20)){
    if(err){err.style.display='block';}return;
  }
  setApiKey(val);
  updateKeyBadge();
  document.getElementById('apikeyOverlay').remove();
}
const PARTNER_SYSTEM_PROMPT_BASE=`You are "Yâvar" (یاور) — a warm, encouraging German conversation partner and tutor, living inside the HerrBNM app, for a Persian-speaking (Farsi) learner studying German starting from A1.

PERSONALITY:
- You're like a friendly study buddy: curious, supportive, a little playful, never robotic or repetitive.
- Vary your sentence openers and reactions — don't start every message the same way.

CORE RULES:
1. LEVEL ADAPTATION: Use the learner's topic progress (given to you as context) to gauge their level. If they're early (mostly pronouns, present tense, articles), keep German very simple: short present-tense sentences, basic vocabulary, simple questions. If they've progressed further (Perfekt, modal verbs, conjunctions, word order), you may use slightly more varied tenses and connectors (weil, aber, dann, deshalb), still keeping sentences short (max ~2-3 clauses).
2. Keep each German reply to 1-4 short sentences so it's not overwhelming.
3. After your German reply, on a new line, give a natural Persian (Farsi) translation/explanation, prefixed exactly with "FA:" (nothing before it on that line).
4. ERROR CORRECTION (important): Carefully check the learner's last German message for grammar, spelling, word-order, case (Akkusativ/Dativ/Genitiv), conjugation, article (der/die/das), preposition, or separable-verb mistakes.
   - If there ARE mistakes: add a new line starting exactly with "CORRECTION:" followed by a short, kind, teacher-style explanation IN PERSIAN — quote the wrong part, show the corrected form, and briefly explain WHY (the grammar rule), in 1-3 sentences. Be specific but not overwhelming — focus on the 1-2 most important mistakes if there are many.
   - If there are NO mistakes, do NOT include a CORRECTION line. Occasionally (not every time) you can add a brief genuine compliment about their German inside the FA line instead.
5. If the learner writes in Persian or English, respond warmly in Persian (via FA:) and gently nudge them to try in German — offer the German phrase they could use, but don't be pushy every single time.
6. CONVERSATION FLOW: Ask natural follow-up questions about daily life, family, hobbies, food, weather, routines, work/school, travel, feelings — typical A1/A2 topics. Occasionally introduce a small new word or phrase naturally in context (and explain it briefly in the FA line) to gently expand vocabulary.
7. Plain text only — no markdown, no asterisks, no headers, no emoji overuse (at most one emoji occasionally).
8. Output format, always exactly:
[German reply]
FA: [Persian translation/explanation, and compliments/encouragement if relevant]
CORRECTION: [Persian explanation of mistakes — ONLY if mistakes exist, otherwise omit this line entirely]`;

function buildPartnerSystemPrompt(){
  let progressNote='';
  try{
    const lines=TOPICS.map(t=>{
      const pct=state.progress[t.id]||0;
      return `${t.name}: ${pct}%`;
    });
    const avg=Math.round(TOPICS.reduce((a,t)=>a+(state.progress[t.id]||0),0)/TOPICS.length);
    progressNote=`\n\nLEARNER PROGRESS CONTEXT (use this to calibrate difficulty, don't mention these numbers directly):\nOverall progress: ${avg}%\n${lines.join('\\n')}`;
  }catch(e){}
  return PARTNER_SYSTEM_PROMPT_BASE+progressNote;
}

let partnerHistory=[];
let partnerSending=false;

function loadPartnerHistory(){
  try{const d=localStorage.getItem(PARTNER_KEY);if(d)return JSON.parse(d);}catch(e){}
  return [];
}
function savePartnerHistory(){try{localStorage.setItem(PARTNER_KEY,JSON.stringify(partnerHistory));}catch(e){}}

function renderPartner(){
  updateKeyBadge();
  partnerHistory=loadPartnerHistory();
  const chatEl=document.getElementById('partnerChat');
  const chips=document.getElementById('starterChips');
  if(partnerHistory.length===0){
    chatEl.innerHTML=`<div class="chat-date-divider">HEUTE · امروز</div><div class="pmsg ai"><div class="pmsg-ai-header"><span class="pmsg-ai-owl">🦉</span>YÂVAR · یاور</div><div class="pmsg-de"><button class="pmsg-speak" onclick="toggleSpeak(this,'Hallo! Schön, dass du da bist. Ich bin Yâvar, dein Deutschlernpartner. Wie geht es dir heute?')">🔊</button>Hallo! Schön, dass du da bist. Ich bin Yâvar, dein Deutschlernpartner. Wie geht es dir heute?</div><div class="pmsg-fa">سلام! خوشحالم که اینجایی. من یاور هستم، پارتنر آلمانیت. امروز حالت چطوره؟</div></div>`;
    if(chips)chips.style.display='flex';
  }else{
    chatEl.innerHTML=partnerHistory.map(renderPartnerMsg).join('');
    if(chips)chips.style.display='none';
  }
  chatEl.scrollTop=chatEl.scrollHeight;
}

function useStarter(text){
  const input=document.getElementById('partnerInput');
  input.value=text;
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,100)+'px';
  const chips=document.getElementById('starterChips');
  if(chips)chips.style.display='none';
  sendPartnerMessage();
}

function renderPartnerMsg(msg){
  if(msg.role==='user'){
    return `<div class="pmsg user"><div class="pmsg-user-label">DU · شما</div>${escapeHtml(msg.content)}</div>`;
  }
  const parsed=parsePartnerReply(msg.content);
  let html=`<div class="pmsg ai"><div class="pmsg-ai-header"><span class="pmsg-ai-owl">🦉</span>YÂVAR · یاور</div><div class="pmsg-de"><button class="pmsg-speak" onclick="toggleSpeak(this,'${escapeHtml(parsed.de).replace(/'/g,"\\'")}')">🔊</button>${escapeHtml(parsed.de)}</div>`;
  if(parsed.fa)html+=`<div class="pmsg-fa">${escapeHtml(parsed.fa)}</div>`;
  html+=`</div>`;
  if(parsed.correction){
    html+=`<div class="pmsg correction"><div class="pmsg-title">✦ نکته اصلاحی · KORREKTUR</div><div class="pmsg-fa">${escapeHtml(parsed.correction)}</div></div>`;
  }
  return html;
}

function parsePartnerReply(text){
  let de=text,fa='',correction='';
  const corIdx=text.indexOf('CORRECTION:');
  let main=text;
  if(corIdx!==-1){
    correction=text.slice(corIdx+'CORRECTION:'.length).trim();
    main=text.slice(0,corIdx).trim();
  }
  const faIdx=main.indexOf('FA:');
  if(faIdx!==-1){
    fa=main.slice(faIdx+3).trim();
    de=main.slice(0,faIdx).trim();
  }else{
    de=main.trim();
  }
  return {de,fa,correction};
}

function escapeHtml(s){
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

function resetPartnerChat(){
  if(!confirm('گفتگوی فعلی پاک شود و یک گفتگوی جدید شروع شود؟'))return;
  partnerHistory=[];
  savePartnerHistory();
  const chips=document.getElementById('starterChips');
  if(chips)chips.style.display='flex';
  renderPartner();
  sfxTap();
}

async function sendPartnerMessage(){
  if(partnerSending)return;
  const input=document.getElementById('partnerInput');
  const text=input.value.trim();
  if(!text)return;
  sfxTap();
  partnerSending=true;
  const sendBtn=document.getElementById('partnerSendBtn');
  sendBtn.disabled=true;
  input.value='';input.style.height='auto';

  partnerHistory.push({role:'user',content:text});
  savePartnerHistory();
  const chips=document.getElementById('starterChips');
  if(chips)chips.style.display='none';
  const chatEl=document.getElementById('partnerChat');
  chatEl.innerHTML+=renderPartnerMsg({role:'user',content:text});
  chatEl.innerHTML+=`<div class="pmsg typing" id="partnerTyping"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatEl.scrollTop=chatEl.scrollHeight;

  try{
    const userKey=getApiKey();
    let data=null;
    let lastErr=null;
    let lastStatus=null;

    if(userKey){
      /* ── Direct Anthropic API with user key ── */
      let res;
      try{
        res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "x-api-key":userKey,
            "anthropic-version":"2023-06-01",
            "anthropic-dangerous-direct-browser-access":"true"
          },
          body:JSON.stringify({
            model:"claude-sonnet-4-6",
            max_tokens:1000,
            system:buildPartnerSystemPrompt(),
            messages:partnerHistory.map(m=>({role:m.role,content:m.content}))
          })
        });
      }catch(networkErr){
        // Network error / CORS preflight block
        throw new Error('❌ خطای شبکه: '+String(networkErr.message||networkErr)+'\n\nاگر CORS error هست: کلید API باید معتبر باشه و header درست ارسال شده باشه.');
      }
      lastStatus=res.status;
      if(res.ok){
        data=await res.json();
      }else{
        lastErr=await res.text().catch(()=>'(no body)');
        if(lastStatus===401){
          clearApiKey();updateKeyBadge();
          throw new Error('❌ کلید API نامعتبر است (401) — روی 🔑 کلیک کن و کلید رو دوباره وارد کن');
        }
        throw new Error(`❌ خطای API (${lastStatus}): ${String(lastErr).slice(0,200)}`);
      }
    }else{
      /* ── Fallback: claude.ai proxy (only works inside Claude.ai) ── */
      const PROXY_URLS=[
        "https://api.anthropic.com/v1/messages",
        "https://claude.ai/api/v1/messages"
      ];
      for(const url of PROXY_URLS){
        try{
          const res=await fetch(url,{
            method:"POST",
            headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
            body:JSON.stringify({
              model:"claude-sonnet-4-6",
              max_tokens:1000,
              system:buildPartnerSystemPrompt(),
              messages:partnerHistory.map(m=>({role:m.role,content:m.content}))
            })
          });
          lastStatus=res.status;
          if(res.ok){data=await res.json();break;}
          lastErr=await res.text();
        }catch(e){lastErr=e?.message||String(e);}
      }
    }

    if(!data){
      let errMsg;
      if(!lastStatus){
        errMsg='❌ اتصال برقرار نشد — کلید API تنظیم نشده. روی 🔑 کلیک کن.';
      }else if(lastStatus===401){
        clearApiKey();updateKeyBadge();
        errMsg='❌ کلید API نامعتبر است (401) — روی 🔑 کلیک کن و کلید رو دوباره وارد کن';
      }else if(lastStatus===403){
        errMsg='❌ دسترسی رد شد (403) — کلید API داره ولی دسترسی نداره';
      }else{
        errMsg=`❌ خطای سرور (${lastStatus}): ${String(lastErr).slice(0,150)}`;
      }
      throw new Error(errMsg);
    }
    const reply=(data.content||[]).map(b=>b.text||'').join('').trim()||'متاسفم، نتوانستم پاسخ بدهم. دوباره تلاش کن.';
    partnerHistory.push({role:'assistant',content:reply});
    savePartnerHistory();
    var _pt1=document.getElementById('partnerTyping');if(_pt1)_pt1.remove();
    chatEl.innerHTML+=renderPartnerMsg({role:'assistant',content:reply});
    sfxCorrect();
  }catch(e){
    var _pt2=document.getElementById('partnerTyping');if(_pt2)_pt2.remove();
    chatEl.innerHTML+=`<div class="partner-error">⚠️ ${e.message||'خطا در اتصال. دوباره تلاش کن.'}</div>`;
    sfxWrong();
  }finally{
    partnerSending=false;
    sendBtn.disabled=false;
    chatEl.scrollTop=chatEl.scrollHeight;
  }
}


function showHintModal(text){const overlay=document.createElement('div');overlay.className='hint-overlay';overlay.innerHTML=`<div class="hint-modal"><div class="hint-modal-header"><div class="hint-modal-title">◈ راهنما</div><button class="hint-modal-close" onclick="this.closest('.hint-overlay').remove();sfxTap();">✕</button></div><div class="hint-modal-body">${text}</div></div>`;overlay.addEventListener('click',e=>{if(e.target===overlay){overlay.remove();sfxTap();}});document.body.appendChild(overlay);}

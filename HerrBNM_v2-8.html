/* ═══════════════════════════════════════════
   DICTIONARY RENDER FUNCTIONS
═══════════════════════════════════════════ */
const DICT_CATS=['همه','اسم','فعل','صفت','مشاغل','احساسات','بدن','غذا','خانه','لباس','رنگ‌ها','آب و هوا','سفر','شهری','خانواده','آموزش','کار','تکنولوژی','طبیعت','فرهنگ','اجتماعی','مکان','زمان','ادب','مالی'];

function getArtClass(art){
  if(art==='der') return 'art-der';
  if(art==='die') return 'art-die';
  if(art==='das') return 'art-das';
  if(art==='verb') return 'art-verb';
  if(art==='adj') return 'art-adj';
  return 'art-other';
}
function getArtLabel(art){
  if(art==='der') return 'der · مذکر';
  if(art==='die') return 'die · مؤنث';
  if(art==='das') return 'das · خنثی';
  if(art==='verb') return 'فعل';
  if(art==='adj') return 'صفت';
  if(art==='-') return 'عبارت';
  return art;
}
function getArtColor(art){
  if(art==='der') return 'rgba(64,160,240,.4)';
  if(art==='die') return 'rgba(232,90,138,.35)';
  if(art==='das') return 'rgba(80,210,130,.4)';
  if(art==='verb') return 'rgba(212,168,67,.4)';
  if(art==='adj') return 'rgba(240,200,100,.35)';
  return 'rgba(180,140,255,.2)';
}

let dictFiltered=[];

function renderDict(){
  const el=document.getElementById('dictContent');
  el.innerHTML=`
    <div class="dict-search-bar">
      <span class="dict-search-icon">🔍</span>
      <input class="dict-search-input" id="dictSearchInput" placeholder="جستجو در واژه‌نامه..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="filterDict()"/>
    </div>
    <div class="dict-filters" id="dictFilters">
      ${DICT_CATS.map(c=>`<button class="dict-filter-btn${c===state.dictCat?' active':''}" onclick="setDictCat('${c}')">${c}</button>`).join('')}
    </div>
    <div class="dict-count-bar">
      <span class="dict-count-txt" id="dictCountTxt"></span>
    </div>
    <div class="dict-word-list" id="dictWordList"></div>
  `;
  filterDict();
}

function setDictCat(cat){
  sfxTap();
  state.dictCat=cat;
  document.querySelectorAll('.dict-filter-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent===cat);
  });
  filterDict();
}

function filterDict(){
  const q=(document.getElementById('dictSearchInput')?.value||state.dictQuery).trim().toLowerCase();
  state.dictQuery=q;
  const cat=state.dictCat;

  dictFiltered=DICT_WORDS.filter(w=>{
    const matchQ=!q || w.de.toLowerCase().includes(q) || w.fa.includes(q) || (w.phonetic&&w.phonetic.toLowerCase().includes(q));
    let matchCat=true;
    if(cat==='اسم') matchCat=['der','die','das'].includes(w.art);
    else if(cat==='فعل') matchCat=w.art==='verb';
    else if(cat==='صفت') matchCat=w.art==='adj';
    else if(cat!=='همه') matchCat=w.tags&&w.tags.includes(cat);
    return matchQ && matchCat;
  });

  const list=document.getElementById('dictWordList');
  const countTxt=document.getElementById('dictCountTxt');
  if(countTxt) countTxt.textContent=dictFiltered.length+' کلمه';

  if(!dictFiltered.length){
    list.innerHTML=`<div class="dict-empty">🔍 نتیجه‌ای پیدا نشد</div>`;
    return;
  }

  list.innerHTML=dictFiltered.slice(0,80).map((w,i)=>`
    <div class="dict-word-card" style="--art-color:${getArtColor(w.art)};" onclick="openDictWord(${DICT_WORDS.indexOf(w)});sfxTap();">
      <div class="dict-card-top">
        <div class="dict-de-word">${w.de}</div>
        <div class="dict-art-badge ${getArtClass(w.art)}">${getArtLabel(w.art)}</div>
      </div>
      <div class="dict-fa">${w.fa}</div>
      <div class="dict-card-bottom">
        <div class="dict-phonetic">${w.phonetic||''}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="dict-tags">${(w.tags||[]).slice(0,2).map(t=>`<span class="dict-tag">${t}</span>`).join('')}</div>
          <button class="dict-speak-btn" onclick="event.stopPropagation();speak('${w.de.replace(/'/g,"\\'")}');sfxTap();">🔊</button>
        </div>
      </div>
    </div>
  `).join('');

  if(dictFiltered.length>80){
    list.innerHTML+=`<div class="dict-empty" style="font-size:12px;">+ ${dictFiltered.length-80} کلمه دیگر — جستجو را محدودتر کن</div>`;
  }
}

function openDictWord(idx){
  const w=DICT_WORDS[idx];
  if(!w) return;
  const overlay=document.createElement('div');
  overlay.className='dict-modal-overlay';
  overlay.onclick=e=>{if(e.target===overlay){overlay.remove();sfxTap();}};

  const isVerb=w.art==='verb';
  const isNoun=['der','die','das'].includes(w.art);

  let conjugation='';
  if(isVerb && w.forms){
    conjugation=`
      <div class="dict-section">
        <div class="dict-section-title">صرف فعل · Präsens</div>
        <div class="dict-conjugation-grid">
          ${Object.entries(w.forms).map(([p,f])=>`
            <div class="dict-conj-cell">
              <div class="dict-conj-pron">${p}</div>
              <div class="dict-conj-form">${f}</div>
            </div>
          `).join('')}
        </div>
        ${w.partizip?`<div style="margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);">Partizip II: <span style="color:var(--gold)">${w.partizip}</span> · ${w.hilfsverb||'haben'}</div>`:''}
      </div>
    `;
  }

  let nounInfo='';
  if(isNoun && w.pl){
    nounInfo=`
      <div class="dict-section">
        <div class="dict-section-title">صورت‌های اسم</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px 14px;">
            <div style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:4px;">مفرد</div>
            <div style="font-family:'Spectral',serif;font-size:16px;color:var(--gold2);">${w.art} ${w.de}</div>
          </div>
          <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px 14px;">
            <div style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:4px;">جمع</div>
            <div style="font-family:'Spectral',serif;font-size:16px;color:var(--plum2);">die ${w.pl}</div>
          </div>
        </div>
      </div>
    `;
  }

  const examples=w.ex && w.ex.length ? `
    <div class="dict-section">
      <div class="dict-section-title">مثال‌ها</div>
      ${w.ex.map(e=>`
        <div class="dict-example-row">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
            <div class="dict-example-de" style="flex:1;">${e.de}</div>
            <button class="dict-speak-btn" style="flex-shrink:0;margin-top:2px;" onclick="speakWithAnim(this,'${e.de.replace(/'/g,"\\'").replace(/"/g,"&quot;")}');sfxTap();">🔊</button>
          </div>
          <div class="dict-example-fa">${e.fa}</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  const synonyms=w.syn && w.syn.length ? `
    <div class="dict-section">
      <div class="dict-section-title">مترادف‌ها</div>
      <div class="dict-synonyms">
        ${w.syn.map(s=>`<span class="dict-synonym-chip" onclick="searchDictWord('${s}')">${s}</span>`).join('')}
      </div>
    </div>
  ` : '';

  overlay.innerHTML=`
    <div class="dict-modal-box">
      <div class="dict-modal-handle"></div>
      <div class="dict-modal-header">
        <div>
          <div class="dict-modal-word">${w.de}</div>
          <div class="dict-modal-phonetic">${w.phonetic||''}</div>
        </div>
        <div class="dict-modal-right">
          <div class="dict-art-badge ${getArtClass(w.art)} dict-modal-art">${getArtLabel(w.art)}</div>
          <button class="dict-modal-speak" onclick="speak('${w.de.replace(/'/g,"\\'")}');sfxTap();">🔊</button>
        </div>
      </div>
      <div class="dict-modal-fa">${w.fa}</div>
      ${w.fa2?`<div class="dict-modal-fa-sub">${w.fa2}</div>`:''}
      ${nounInfo}
      ${conjugation}
      ${examples}
      ${synonyms}
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button style="flex:1;padding:14px;border-radius:14px;border:1px solid rgba(212,168,67,.3);background:rgba(212,168,67,.08);color:var(--gold);font-family:'IranSans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;" onclick="speak('${w.de.replace(/'/g,"\\'")}');sfxTap();">🔊 بشنو</button>
        <button style="flex:1;padding:14px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'IranSans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;" onclick="this.closest('.dict-modal-overlay').remove();sfxTap();">بستن</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function searchDictWord(word){
  document.querySelector('.dict-modal-overlay')?.remove();
  const input=document.getElementById('dictSearchInput');
  if(input){input.value=word;filterDict();}
}

    {de:'schön',phonetic:'/ʃøːn/',fa:'زیبا',cat:'صفات',diff:'medium',tip:'ö لب‌ها رو گرد کن و e بگو.'},
    {de:'schnell',phonetic:'/ʃnɛl/',fa:'سریع',cat:'صفات',diff:'medium',tip:'Sch+n با هم: «شن» سریع.'},
    {de:'interessant',phonetic:'/ˌɪntəʁɛˈsant/',fa:'جالب',cat:'صفات',diff:'hard',tip:'تکیه روی آخرین هجاست: inte-res-SANT.'},
    {de:'wichtig',phonetic:'/ˈvɪçtɪç/',fa:'مهم',cat:'صفات',diff:'hard',tip:'-ig آخر مثل «ئیخ» است.'},
    {de:'müde',phonetic:'/ˈmyːdə/',fa:'خسته',cat:'صفات',diff:'medium',tip:'ü لب‌ها گرد، «ای» بگو.'},
    {de:'freundlich',phonetic:'/ˈfʁɔʏntlɪç/',fa:'مهربان',cat:'صفات',diff:'hard',tip:'eu مثل «اوی» است.'},
  ]
};

const pronState={words:[],idx:0,phase:'idle',correct:0,total:0,cat:'همه',recognition:null,synth:window.speechSynthesis,voices:[],streak:0,attempts:0,speed:1,wrongQueue:[],wordHistory:{}};

function getPronWords(){if(pronState.cat==='همه')return PRON_WORDS.all;return PRON_WORDS.all.filter(w=>w.cat===pronState.cat);}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function loadVoices(){const v=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('de'));if(v.length)pronState.voices=v;}
if(window.speechSynthesis){speechSynthesis.onvoiceschanged=loadVoices;loadVoices();}

function renderPronunciation(){
  const cats=['همه',...new Set(PRON_WORDS.all.map(w=>w.cat))];
  pronState.words=shuffleArr([...getPronWords()]);
  pronState.idx=0;pronState.correct=0;pronState.total=0;pronState.streak=0;pronState.attempts=0;pronState.wrongQueue=[];
  const el=document.getElementById('pronunciationContent');
  el.innerHTML=`
    <div class="pron-hero">
      <div class="pron-hero-title">AUSSPRACHE · تمرین تلفظ</div>
      <div class="pron-hero-sub">بشنو · تکرار کن · امتیاز بگیر</div>
      <div class="pron-streak-row">
        <span class="pron-streak-fire">🔥</span>
        <div>
          <div class="pron-streak-count" id="pronStreakNum">0</div>
          <div class="pron-streak-lbl">STREAK</div>
        </div>
        <div class="pron-streak-dots">
          ${[1,2,3,4,5].map(i=>`<div class="pron-streak-dot" id="sd${i}">${i}</div>`).join('')}
        </div>
      </div>
    </div>
    <div class="pron-score-strip">
      <div class="pron-score-item"><div class="pron-score-val" id="pronCorrectCount">0</div><div class="pron-score-lbl">RICHTIG</div></div>
      <div class="pron-score-item"><div class="pron-score-val" id="pronTotalCount">0</div><div class="pron-score-lbl">GESAMT</div></div>
      <div class="pron-score-item"><div class="pron-score-val" id="pronPctDisplay">—</div><div class="pron-score-lbl">SCORE</div></div>
    </div>
    <div class="pron-cats" id="pronCats">
      ${cats.map(c=>`<button class="pron-cat-btn${c===pronState.cat?' active':''}" onclick="selectPronCat('${c}')">${c}</button>`).join('')}
    </div>
    <div id="pronCardArea"></div>
  `;
  renderPronCard();
}

function selectPronCat(cat){pronState.cat=cat;pronState.words=shuffleArr([...getPronWords()]);pronState.idx=0;pronState.correct=0;pronState.total=0;pronState.streak=0;pronState.attempts=0;pronState.wrongQueue=[];document.querySelectorAll('.pron-cat-btn').forEach(b=>b.classList.toggle('active',b.textContent===cat));updatePronScore();renderPronCard();}

function getActiveWord(){if(pronState.wrongQueue.length>0)return pronState.wrongQueue[0];return pronState.words[pronState.idx%pronState.words.length];}

function renderPronCard(){
  stopListening();
  const area=document.getElementById('pronCardArea');
  if(!area)return;
  const words=pronState.wrongQueue.length>0?pronState.wrongQueue:pronState.words;
  if(!words.length){area.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px 0;">کلمه‌ای پیدا نشد</div>';return;}
  const w=getActiveWord();
  pronState.phase='idle';pronState.attempts=0;
  const hist=pronState.wordHistory[w.de]||{bestAttempt:99};
  const stars=hist.bestAttempt<=1?3:hist.bestAttempt<=2?2:hist.bestAttempt<=3?1:0;
  const diffLabels={easy:'A1 · آسان',medium:'A2 · متوسط',hard:'B1 · سخت'};
  area.innerHTML=`
    <div class="pron-word-card" id="pronWordCard">
      <div class="pron-category-badge">${w.cat}</div>
      <div class="pron-diff-badge ${w.diff||'easy'}">${diffLabels[w.diff||'easy']}</div>
      <div class="pron-de-word" id="pronDeWord">${w.de}</div>
      <div class="pron-phonetic">${w.phonetic}</div>
      <div class="pron-fa-meaning">${w.fa}</div>
      <div class="pron-stars-row" id="pronStars">
        <span class="pron-star${stars>=1?' earned':''}">★</span>
        <span class="pron-star${stars>=2?' earned':''}">★</span>
        <span class="pron-star${stars>=3?' earned':''}">★</span>
      </div>
      <div class="pron-attempts-row" id="pronAttemptDots"></div>
      <div class="pron-speed-btns">
        <button class="pron-speed-btn${pronState.speed===1?' active':''}" onclick="setPronSpeed(1)">▶ عادی</button>
        <button class="pron-speed-btn${pronState.speed===0.5?' active':''}" onclick="setPronSpeed(0.5)">🐢 آهسته</button>
      </div>
    </div>
    ${w.tip?`<div class="pron-tip-box"><span class="pron-tip-icon">💡</span><span class="pron-tip-text">${w.tip}</span></div>`:''}
    <div class="pron-result" id="pronResult">
      <div class="pron-result-emoji" id="pronResultEmoji"></div>
      <div class="pron-result-title" id="pronResultTitle"></div>
      <div class="pron-result-heard" id="pronResultHeard"></div>
    </div>
    <div class="mic-area">
      <div class="mic-wave" id="micWave">${Array.from({length:16},()=>'<span></span>').join('')}</div>
      <div class="mic-ring-outer" id="micRing" onclick="handleMicClick()">
        <div class="mic-ring-inner" id="micInner">🎙</div>
      </div>
      <div class="mic-status-label" id="micStatus">ابتدا ▶ گوش کن</div>
    </div>
    <div class="pron-actions">
      <button class="pron-btn primary" onclick="pronSpeak();sfxTap();">▶ گوش کن</button>
      <button class="pron-btn" onclick="pronNext();sfxTap();">← بعدی</button>
    </div>
  `;
}

function setPronSpeed(s){pronState.speed=s;document.querySelectorAll('.pron-speed-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&s===1)||(i===1&&s===0.5)));}

function pronSpeak(){
  const w=getActiveWord();
  const wordEl=document.getElementById('pronDeWord');
  if(wordEl)wordEl.classList.add('speaking');
  const utt=new SpeechSynthesisUtterance(w.de);
  utt.lang='de-DE';utt.rate=pronState.speed<1?0.45:0.82;utt.pitch=1.05;
  const deVoice=pronState.voices.find(v=>v.lang==='de-DE')||pronState.voices[0];
  if(deVoice)utt.voice=deVoice;
  utt.onend=()=>{if(wordEl)wordEl.classList.remove('speaking');setMicStatus('🎙 میکروفون رو بزن و تکرار کن','');};
  utt.onerror=()=>{if(wordEl)wordEl.classList.remove('speaking');};
  pronState.synth.cancel();pronState.synth.speak(utt);
}

function handleMicClick(){if(pronState.phase==='listening'){stopListening();return;}startListening();}

function setMicStatus(txt,cls){const el=document.getElementById('micStatus');if(el){el.textContent=txt;el.className='mic-status-label'+(cls?' '+cls:'');}}

function startListening(){
  if(pronState.phase==='listening')return;
  pronState.synth.cancel();
  pronState.phase='listening';
  const ring=document.getElementById('micRing');
  const wave=document.getElementById('micWave');
  if(ring)ring.classList.add('listening');
  if(wave)wave.classList.add('active');
  setMicStatus('در حال گوش دادن... 🎤','listening');
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){stopListening();showTextFallback();return;}
  let finished=false;
  const cleanup=()=>{if(finished)return;finished=true;pronState.phase='idle';if(ring)ring.classList.remove('listening');if(wave)wave.classList.remove('active');if(pronState.recognition){try{pronState.recognition.abort();}catch(e){}pronState.recognition=null;}};
  try{
    const rec=new SR();pronState.recognition=rec;
    rec.lang='de-DE';rec.interimResults=false;rec.maxAlternatives=5;rec.continuous=false;
    rec.onresult=e=>{if(finished)return;const heard=e.results?.[0]?.[0]?.transcript?.trim()?.toLowerCase()||'';cleanup();if(!heard){showTextFallback();return;}const target=getActiveWord().de.toLowerCase().trim();showPronResult(pronPronMatch(heard,target),heard);};
    rec.onerror=e=>{cleanup();if(e.error==='not-allowed'){setMicStatus('اجازه میکروفون داده نشده');return;}showTextFallback();};
    rec.onend=()=>{if(!finished){cleanup();showTextFallback();}};
    rec.start();
  }catch(err){cleanup();showTextFallback();}
}

function showTextFallback(){
  pronState.phase='idle';
  const ring=document.getElementById('micRing');const wave=document.getElementById('micWave');
  if(ring)ring.classList.remove('listening');if(wave)wave.classList.remove('active');
  const w=getActiveWord();
  document.getElementById('textFallbackOverlay')?.remove();
  const overlay=document.createElement('div');overlay.id='textFallbackOverlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(13,10,26,.88);backdrop-filter:blur(8px);';
  overlay.innerHTML=`<div style="background:linear-gradient(160deg,rgba(26,20,48,.98),rgba(13,10,26,.99));border:1px solid rgba(155,109,204,.3);border-radius:24px;padding:28px 24px;width:min(340px,90vw);text-align:center;">
    <div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:8px;font-family:IranSans,sans-serif;">تلفظ رو تایپ کن</div>
    <div style="font-size:24px;font-family:'Cinzel Decorative',serif;color:var(--plum2);margin-bottom:16px;">${w.de}</div>
    <input id="tfInput" type="text" autocomplete="off" autocorrect="off" spellcheck="false" autocapitalize="none" placeholder="${w.de.toLowerCase()}" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.06);border:1px solid rgba(155,109,204,.3);border-radius:12px;padding:12px 14px;font-size:18px;color:#fff;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;"/>
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button onclick="document.getElementById('textFallbackOverlay').remove()" style="flex:1;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;font-family:IranSans,sans-serif;">انصراف</button>
      <button id="tfSubmit" style="flex:2;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--rose),var(--plum2));color:#fff;font-size:14px;cursor:pointer;font-weight:700;font-family:IranSans,sans-serif;">تأیید ✓</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  const input=document.getElementById('tfInput');
  const submit=()=>{const typed=input.value.trim().toLowerCase();if(!typed)return;overlay.remove();showPronResult(pronPronMatch(typed,w.de.toLowerCase().trim()),typed);};
  document.getElementById('tfSubmit').addEventListener('click',submit);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  setTimeout(()=>input.focus(),100);
}

function stopListening(){
  pronState.phase='idle';
  document.getElementById('micRing')?.classList.remove('listening');
  const wave=document.getElementById('micWave');if(wave){wave.classList.remove('active');wave.style.opacity='0';}
  if(pronState.recognition){try{pronState.recognition.abort();}catch(e){}pronState.recognition=null;}
}

function levenshtein(a,b){if(!a)return b.length;if(!b)return a.length;const dp=Array.from({length:a.length+1},(_,i)=>Array.from({length:b.length+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[a.length][b.length];}

function pronScore(heard,target){
  const norm=s=>s.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z\s]/g,'').trim();
  const pk=s=>s.replace(/sch/g,'sh').replace(/ch/g,'k').replace(/w/g,'v').replace(/z/g,'ts').replace(/ei/g,'ai').replace(/ie/g,'i').replace(/eu/g,'oi').replace(/(.)\\1/g,'$1').trim();
  const stripArt=s=>s.replace(/^(der|die|das|ein|eine)\\s+/i,'').trim();
  const h=stripArt(norm(heard)),t=stripArt(norm(target));
  const hk=pk(h),tk=pk(t);
  if(h===t||hk===tk)return 1.0;
  const maxLen=Math.max(hk.length,tk.length);
  if(maxLen===0)return 1.0;
  const pkScore=1-(levenshtein(hk,tk)/maxLen);
  const rawMax=Math.max(h.length,t.length);
  const rawScore=rawMax===0?1:1-(levenshtein(h,t)/rawMax);
  return Math.max(pkScore,rawScore);
}
function pronPronMatch(heard,target){return pronScore(heard,target)>=0.78;}

function showPronResult(correct,heard){
  pronState.total++;if(correct)pronState.correct++;
  updatePronScore();
  const box=document.getElementById('pronResult');
  if(!box)return;
  box.className='pron-result show '+(correct?'correct':'wrong');
  document.getElementById('pronResultEmoji').textContent=correct?'🎉':'❌';
  document.getElementById('pronResultTitle').textContent=correct?'✦ RICHTIG · درست!':'✗ دوباره تلاش کن';
  document.getElementById('pronResultHeard').textContent='شنیدم: '+heard;
  if(correct){
    pronState.streak++;updateStreakUI();
    if(pronState.wrongQueue.length>0&&pronState.wrongQueue[0].de===getActiveWord().de)pronState.wrongQueue.shift();
    const thisAttempts=pronState.attempts+1;
    const prev=pronState.wordHistory[getActiveWord().de]||{bestAttempt:99};
    pronState.wordHistory[getActiveWord().de]={bestAttempt:Math.min(prev.bestAttempt,thisAttempts)};
    addXP(8+Math.min(pronState.streak*2,12));sfxCorrect();
    setTimeout(()=>pronNext(),1800);
  }else{
    pronState.streak=0;updateStreakUI();pronState.attempts++;
    const w=getActiveWord();if(!pronState.wrongQueue.find(x=>x.de===w.de))pronState.wrongQueue.push(w);
    sfxWrong();
  }
}

function pronNext(){
  if(pronState.wrongQueue.length===0)pronState.idx++;
  pronState.attempts=0;
  renderPronCard();
}

function updatePronScore(){
  const c=document.getElementById('pronCorrectCount');const t=document.getElementById('pronTotalCount');const p=document.getElementById('pronPctDisplay');
  if(c)c.textContent=pronState.correct;if(t)t.textContent=pronState.total;
  if(p)p.textContent=pronState.total>0?Math.round((pronState.correct/pronState.total)*100)+'%':'—';
}
function updateStreakUI(){
  const num=document.getElementById('pronStreakNum');if(num)num.textContent=pronState.streak;
  for(let i=1;i<=5;i++){const dot=document.getElementById('sd'+i);if(dot)dot.classList.toggle('lit',pronState.streak>=i);}
}

   INIT
═══════════════════════════════════════════ */
renderHome();
</script>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0D0A1A"/>
<title>HerrBNM</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Spectral:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
@font-face{font-family:'IranSans';src:url('https://cdn.jsdelivr.net/gh/rastikerdar/iranian-fonts@main/IRANSansWeb/IRANSansWeb.woff2') format('woff2');font-weight:400;font-display:swap;}
@font-face{font-family:'IranSans';src:url('https://cdn.jsdelivr.net/gh/rastikerdar/iranian-fonts@main/IRANSansWeb/IRANSansWeb_Bold.woff2') format('woff2');font-weight:700;font-display:swap;}
@font-face{font-family:'IranSans';src:url('https://cdn.jsdelivr.net/gh/rastikerdar/iranian-fonts@main/IRANSansWeb/IRANSansWeb_Medium.woff2') format('woff2');font-weight:500;font-display:swap;}
:root{
  --bg:#0D0A1A;--bg2:#130F25;--surface:rgba(255,255,255,.032);--surface2:rgba(255,255,255,.058);
  --glass:rgba(13,10,26,.75);--border:rgba(180,140,255,.12);--border2:rgba(180,140,255,.26);--border3:rgba(180,140,255,.45);
  --text:#F0E8FF;--text2:#A890C8;--muted:#7A6A96;
  --gold:#D4A843;--gold2:#F0C864;--gold-dim:rgba(212,168,67,.12);--gold-glow:rgba(212,168,67,.28);
  --plum:#9B6DCC;--plum2:#B890E8;--plum-dim:rgba(155,109,204,.12);
  --rose:#E85A8A;--rose-dim:rgba(232,90,138,.1);--mint:#5DDBA8;--mint-dim:rgba(93,219,168,.1);
  --nav-h:calc(70px + env(safe-area-inset-bottom,0px));--r:16px;--r-lg:20px;--r-xl:28px;
  --fs-xs:11px;--fs-sm:13px;--fs-md:15px;--fs-lg:17px;--fs-xl:20px;--fs-xxl:24px;--touch:48px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'IranSans','Segoe UI',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;color:var(--text);overscroll-behavior:none;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(120,70,200,.15) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%,rgba(212,168,67,.09) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(155,109,204,.06) 0%,transparent 70%);
  animation:meshShift 18s ease-in-out infinite alternate;}
@keyframes meshShift{0%{opacity:.7}100%{opacity:1}}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px;}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
.orb-line-t,.orb-line-b{position:fixed;left:0;right:0;height:1px;z-index:2;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(212,168,67,.2) 20%,rgba(180,140,255,.3) 50%,rgba(212,168,67,.2) 80%,transparent 100%);}
.orb-line-t{top:0;}.orb-line-b{bottom:0;}
#app{position:relative;z-index:5;max-width:480px;margin:0 auto;padding-bottom:var(--nav-h);min-height:100vh;}
/* HEADER */
header{position:relative;z-index:10;background:linear-gradient(180deg,rgba(13,10,26,.98),rgba(19,15,37,.9));backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border2);padding:max(44px,calc(40px + env(safe-area-inset-top))) 16px 14px;overflow:hidden;}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold) 25%,var(--plum2) 55%,var(--gold) 75%,transparent);animation:headerBeam 6s ease-in-out infinite alternate;}
@keyframes headerBeam{0%{opacity:.5;transform:scaleX(.8)}100%{opacity:1;transform:scaleX(1)}}
.header-inner{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo-block{display:flex;align-items:center;gap:10px;}
.logo-sigil{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(212,168,67,.18),rgba(155,109,204,.14));border:1px solid rgba(212,168,67,.35);display:grid;place-items:center;font-size:22px;flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 0 24px rgba(212,168,67,.12),inset 0 1px 0 rgba(212,168,67,.15);animation:sigilPulse 4s ease-in-out infinite;}
@keyframes sigilPulse{0%,100%{box-shadow:0 0 24px rgba(212,168,67,.12),0 0 0 0 rgba(212,168,67,.2)}50%{box-shadow:0 0 36px rgba(212,168,67,.2),0 0 0 6px rgba(212,168,67,.0)}}
.logo-sigil::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(212,168,67,.12),transparent);animation:sigilSheen 4s ease-in-out infinite;}
@keyframes sigilSheen{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
.logo-name{font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,var(--gold2),var(--plum2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 10px rgba(212,168,67,.3));}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);margin-top:2px;}
.xp-gem{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(212,168,67,.09),rgba(155,109,204,.06));border:1px solid rgba(212,168,67,.28);border-radius:99px;padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap;box-shadow:0 0 18px rgba(212,168,67,.1);min-height:var(--touch);}
.xp-gem-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:gemBlink 2s ease-in-out infinite;}
@keyframes gemBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.lvl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.lvl-label{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.lvl-info{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.xp-track{height:6px;background:rgba(212,168,67,.07);border-radius:99px;border:1px solid rgba(212,168,67,.1);overflow:visible;position:relative;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--plum),var(--gold));border-radius:99px;transition:width 1s cubic-bezier(.34,1.56,.64,1);position:relative;box-shadow:0 0 12px rgba(212,168,67,.4);}
.xp-fill::after{content:'◆';position:absolute;right:-7px;top:-8px;font-size:12px;color:var(--gold);filter:drop-shadow(0 0 6px var(--gold));animation:diamondSpin .6s ease-in-out infinite alternate;}
@keyframes diamondSpin{0%{transform:rotate(-15deg) scale(.9)}100%{transform:rotate(15deg) scale(1.1)}}
/* XP TOAST */
.xp-toast{position:fixed;top:calc(env(safe-area-inset-top,0px) + 100px);left:50%;transform:translateX(-50%);z-index:999;background:linear-gradient(135deg,rgba(212,168,67,.18),rgba(155,109,204,.12));border:1px solid rgba(212,168,67,.4);border-radius:99px;padding:8px 22px;font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;color:var(--gold2);animation:toastPop .4s cubic-bezier(.34,1.56,.64,1) forwards,toastFade 1.1s ease .4s forwards;}
@keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.8)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes toastFade{0%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-12px)}}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(480px,100%);z-index:50;background:rgba(13,10,26,.97);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid var(--border2);display:flex;justify-content:space-around;padding:10px 4px calc(10px + env(safe-area-inset-bottom,0px));}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'IranSans',sans-serif;font-size:10px;font-weight:700;padding:4px 8px;border-radius:14px;transition:.28s cubic-bezier(.34,1.56,.64,1);-webkit-user-select:none;user-select:none;min-height:var(--touch);}
.nav-btn .nav-icon{font-size:22px;transition:.28s;}
.nav-icon-wrap{border-radius:14px;padding:5px 16px;transition:.28s;border:1px solid transparent;}
.nav-btn.active{color:var(--gold);}
.nav-btn.active .nav-icon-wrap{background:rgba(212,168,67,.1);border-color:rgba(212,168,67,.3);box-shadow:0 0 18px rgba(212,168,67,.15),inset 0 0 10px rgba(212,168,67,.05);}
.nav-btn.active .nav-icon{transform:scale(1.15);filter:drop-shadow(0 0 6px var(--gold));}
/* SCREENS */
.screen{display:none;padding:16px 16px 12px;overflow-y:auto;max-height:calc(100vh - var(--nav-h) - 100px);}
.screen.active{display:block;animation:fadeSlideIn .32s cubic-bezier(.34,1.36,.64,1);}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
/* STREAK BANNER */
/* STREAK BANNER */
.streak-banner{border-radius:14px;padding:13px 15px;margin-bottom:14px;background:rgba(212,168,67,.06);border:1px solid rgba(212,168,67,.16);display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.streak-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.4),transparent);}
.streak-fire{font-size:24px;flex-shrink:0;animation:fireWave 1.2s ease-in-out infinite alternate;filter:drop-shadow(0 0 8px rgba(255,179,0,.5));}
@keyframes fireWave{0%{transform:scale(1) rotate(-5deg)}100%{transform:scale(1.1) rotate(5deg)}}
.streak-info{flex:1;}
.streak-num{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--gold2);}
.streak-lbl{font-size:11px;color:rgba(212,168,67,.55);margin-top:1px;}
.streak-dots{display:flex;gap:4px;flex-shrink:0;}
.streak-dot{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:700;}
.streak-dot.done{background:rgba(212,168,67,.2);border-color:rgba(212,168,67,.4);color:var(--gold2);}
/* SEC TITLE */
.sec-title{font-family:'Cinzel Decorative',serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-title::before,.sec-title::after{content:'';flex:1;height:1px;background:rgba(212,168,67,.15);}
.sec-title::before{flex:0 0 12px;}
/* TOPIC CARDS - گرید دو ستونه */
.topics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.topic-card{
  background:rgba(255,255,255,.036);
  border-radius:16px;
  padding:14px 12px 12px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.09);
  border-top:2px solid var(--tc-line,rgba(212,168,67,.5));
  transition:.22s cubic-bezier(.34,1.36,.64,1);
  position:relative;overflow:hidden;
  -webkit-user-select:none;user-select:none;
  display:flex;flex-direction:column;align-items:flex-start;gap:8px;
  box-shadow:0 4px 18px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.04);
  min-height:90px;
}
.topic-card::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,var(--tc-tint,rgba(212,168,67,.05)) 0%,transparent 65%);pointer-events:none;}
.topic-card::after{content:'›';position:absolute;bottom:10px;left:12px;font-size:16px;color:var(--tc-line,rgba(212,168,67,.6));opacity:.6;transition:.22s;}
.topic-card:active{transform:scale(.94);opacity:.85;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.topic-card:hover{border-color:var(--tc-line,rgba(212,168,67,.6));box-shadow:0 6px 24px rgba(0,0,0,.22),0 0 0 1px rgba(255,255,255,.04);}
.t-icon{font-size:24px;line-height:1;position:relative;z-index:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));}
.t-main{flex:1;min-width:0;position:relative;z-index:1;width:100%;}
.t-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;word-break:break-word;white-space:normal;}
.t-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px;direction:ltr;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px;}
.t-right{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;align-items:flex-end;gap:3px;z-index:1;}
.t-prog{width:36px;height:3px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;}
.t-prog-fill{height:100%;border-radius:99px;background:var(--tc-line,var(--gold));transition:width .7s ease;}
.t-pct{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tc-line,var(--gold));font-weight:700;}
.t-badge{background:rgba(93,219,168,.15);color:var(--mint);font-size:8px;padding:2px 6px;border-radius:99px;font-weight:700;border:1px solid rgba(93,219,168,.3);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:6px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'IranSans',sans-serif;font-size:13px;font-weight:700;margin-bottom:18px;padding:6px 0;-webkit-user-select:none;user-select:none;transition:.18s;}
.back-btn:active{color:var(--gold);}
/* LESSON */
.lesson-header{margin-bottom:20px;}
.lesson-header-top{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.lesson-topic-icon{font-size:32px;line-height:1;}
.lesson-title{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--text);line-height:1.3;}
.lesson-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-top:3px;}
.lesson-divider{height:1px;background:linear-gradient(90deg,rgba(212,168,67,.3),rgba(155,109,204,.15),transparent);margin-bottom:20px;}
/* EXPLAIN SECTIONS */
.lesson-section{margin-bottom:22px;}
.lesson-section-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.lesson-section-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05);}
.lesson-body{
  font-size:14px;color:var(--text2);line-height:2;
  word-break:break-word;overflow-wrap:break-word;
  background:rgba(255,255,255,.022);
  border-radius:12px;border:1px solid rgba(255,255,255,.05);
  padding:14px 16px;
}
/* TABLE */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.018);}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto;}
th{background:rgba(212,168,67,.07);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;padding:10px 12px;text-align:right;border-bottom:1px solid rgba(212,168,67,.12);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;font-size:13px;line-height:1.6;}
td.de{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold2);direction:ltr;text-align:left;word-break:break-word;min-width:80px;white-space:nowrap;}
td.fa{color:var(--text2);word-break:break-word;}
tr:last-child td{border-bottom:none;}
/* RULES */
.rules-list{display:flex;flex-direction:column;gap:7px;}
.rule-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:rgba(155,109,204,.06);border-radius:10px;border-right:2px solid rgba(155,109,204,.35);}
.rule-dot{color:var(--plum2);font-size:12px;flex-shrink:0;margin-top:1px;}
.rule-text{font-size:13px;color:var(--text2);line-height:1.7;word-break:break-word;overflow-wrap:break-word;}
/* EXAMPLES */
.example-row{
  background:linear-gradient(135deg,rgba(212,168,67,.04),rgba(155,109,204,.03));
  border:1px solid rgba(212,168,67,.1);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:10px;
  position:relative;
  overflow:hidden;
}
.example-row::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.25) 50%,transparent);}
.example-de{
  font-family:'Spectral',serif;font-size:17px;font-weight:600;
  color:var(--text);direction:ltr;text-align:left;
  margin-bottom:10px;line-height:1.55;word-break:break-word;
  padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.example-fa-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.example-fa{font-size:14px;color:var(--text2);flex:1;min-width:0;word-break:break-word;line-height:1.6;text-align:right;}
.speak-mini{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  border:1px solid rgba(155,109,204,.4);
  background:rgba(155,109,204,.14);
  color:var(--plum2);border-radius:99px;
  padding:7px 14px;font-size:12px;font-family:'IranSans',sans-serif;
  cursor:pointer;transition:.2s;flex-shrink:0;
  font-weight:700;
  box-shadow:0 2px 10px rgba(155,109,204,.14);
  min-width:70px;min-height:34px;
  white-space:nowrap;
}
.speak-mini::before{content:'▶';font-size:9px;transition:.2s;}
.speak-mini:active{transform:scale(.92);background:rgba(155,109,204,.28);}
.speak-mini.playing{background:rgba(155,109,204,.24);border-color:rgba(155,109,204,.6);color:#fff;box-shadow:0 0 14px rgba(155,109,204,.25);}
.speak-mini.playing::before{content:'';}
/* اکولایزر */
.speak-eq{display:none;align-items:flex-end;gap:2px;height:14px;}
.speak-mini.playing .speak-eq{display:flex;}
.speak-mini.playing .speak-text{display:none;}
.speak-eq span{display:block;width:3px;border-radius:2px;background:rgba(184,144,232,.9);}
.speak-mini.playing .speak-eq span:nth-child(1){animation:eqBar .65s ease-in-out infinite;}
.speak-mini.playing .speak-eq span:nth-child(2){animation:eqBar .65s ease-in-out .12s infinite;}
.speak-mini.playing .speak-eq span:nth-child(3){animation:eqBar .65s ease-in-out .28s infinite;}
.speak-mini.playing .speak-eq span:nth-child(4){animation:eqBar .65s ease-in-out .08s infinite;}
@keyframes eqBar{0%,100%{height:3px}50%{height:13px}}
.start-quiz-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,rgba(212,168,67,.18),rgba(155,109,204,.12));border:1px solid rgba(212,168,67,.3);color:var(--gold2);font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:.2s;margin-top:4px;min-height:var(--touch);}
.start-quiz-btn:active{transform:scale(.97);}
/* QUIZ */
.quiz-hud{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.quiz-counter{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap;}
.quiz-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;}
.quiz-track-fill{height:100%;background:linear-gradient(90deg,var(--plum),var(--gold));border-radius:99px;transition:width .5s ease;}
.quiz-score-badge{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);font-weight:700;white-space:nowrap;}
.quiz-card{background:linear-gradient(135deg,rgba(212,168,67,.05),rgba(155,109,204,.04));border:1px solid var(--border2);border-radius:var(--r-lg);padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.3) 50%,transparent);}
.quiz-type-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--plum2);background:rgba(155,109,204,.1);border:1px solid rgba(155,109,204,.2);border-radius:99px;padding:3px 10px;display:inline-block;margin-bottom:10px;}
.quiz-q{font-size:16px;font-weight:700;color:var(--text);line-height:1.6;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.option-btn{padding:14px 10px;border-radius:14px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'IranSans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.22s;min-height:var(--touch);-webkit-user-select:none;user-select:none;}
.option-btn:active{transform:scale(.94);}
.option-btn.correct{background:rgba(93,219,168,.15);border-color:rgba(93,219,168,.5);color:var(--mint);box-shadow:0 0 20px rgba(93,219,168,.15);}
.option-btn.wrong{background:rgba(232,90,138,.12);border-color:rgba(232,90,138,.4);color:var(--rose);}
.option-btn.disabled{pointer-events:none;}
.fill-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:14px 18px;font-size:16px;color:var(--text);font-family:'JetBrains Mono',monospace;text-align:center;outline:none;margin-bottom:12px;transition:.3s;direction:ltr;}
.fill-input:focus{border-color:rgba(155,109,204,.5);box-shadow:0 0 0 3px rgba(155,109,204,.08);}
.check-btn,.action-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(155,109,204,.1));border:1px solid rgba(212,168,67,.3);color:var(--gold2);font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:700;cursor:pointer;transition:.22s;margin-bottom:10px;min-height:var(--touch);letter-spacing:.5px;}
.check-btn:active,.action-btn:active{transform:scale(.97);}
.action-btn{display:none;}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;padding:14px;background:var(--surface);border-radius:14px;border:1px solid var(--border);margin-bottom:12px;}
.scramble-sentence{min-height:48px;background:rgba(212,168,67,.04);border:1px dashed rgba(212,168,67,.25);border-radius:12px;padding:10px;display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;align-items:center;}
.word-chip{padding:8px 14px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13px;cursor:pointer;transition:.18s;-webkit-user-select:none;user-select:none;}
.word-chip.bank{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.word-chip.bank:active{transform:scale(.92);}
.word-chip.bank.used{opacity:.25;pointer-events:none;}
.word-chip.placed{background:rgba(155,109,204,.12);border:1px solid rgba(155,109,204,.3);color:var(--plum2);}
.feedback-box{border-radius:14px;padding:16px;margin-bottom:12px;text-align:center;display:none;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.feedback-box.correct{background:rgba(93,219,168,.07);border:1px solid rgba(93,219,168,.35);}
.feedback-box.wrong{background:rgba(232,90,138,.07);border:1px solid rgba(232,90,138,.35);}
.fb-title{font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:700;margin-bottom:5px;}
.feedback-box.correct .fb-title{color:var(--mint);}
.feedback-box.wrong .fb-title{color:var(--rose);}
.fb-text{font-size:13px;color:var(--text2);}
.listen-btn{width:100%;padding:16px 20px;border-radius:16px;border:1px solid rgba(155,109,204,.4);background:linear-gradient(135deg,rgba(155,109,204,.14),rgba(93,219,168,.08));cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:14px;transition:.22s;-webkit-user-select:none;user-select:none;box-shadow:0 4px 18px rgba(155,109,204,.1),inset 0 1px 0 rgba(255,255,255,.05);}
.listen-btn:active{transform:scale(.97);box-shadow:none;}
.listen-play-circle{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--plum),rgba(93,219,168,.7));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 18px rgba(155,109,204,.3);}
.listen-play-icon{width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:none;border-left:14px solid #fff;margin-right:-3px;}
.listen-btn-label{font-family:'Cinzel Decorative',serif;font-size:12px;color:var(--plum2);letter-spacing:1px;display:block;margin-bottom:4px;}
.listen-btn-bars{display:flex;align-items:center;gap:3px;height:20px;}
.listen-btn-bars span{display:block;width:3px;border-radius:2px;background:var(--plum2);height:6px;}
.listen-btn.playing .listen-btn-bars span{animation:barDance .8s ease-in-out infinite;}
.listen-btn.playing .listen-btn-bars span:nth-child(2){animation-delay:.1s;}
.listen-btn.playing .listen-btn-bars span:nth-child(3){animation-delay:.2s;}
.listen-btn.playing .listen-btn-bars span:nth-child(4){animation-delay:.3s;}
.listen-btn.playing .listen-btn-bars span:nth-child(5){animation-delay:.2s;}
.listen-btn.playing .listen-btn-bars span:nth-child(6){animation-delay:.1s;}
.listen-btn.playing .listen-btn-bars span:nth-child(7){animation-delay:.15s;}
.listen-btn.playing .listen-btn-bars span:nth-child(8){animation-delay:.25s;}
@keyframes barDance{0%,100%{height:4px}50%{height:18px}}
.hint-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(212,168,67,.25);background:rgba(212,168,67,.06);color:var(--gold);border-radius:99px;padding:7px 16px;font-size:13px;font-family:'IranSans',sans-serif;cursor:pointer;margin-bottom:12px;transition:.2s;-webkit-user-select:none;user-select:none;}
.hint-overlay{position:fixed;inset:0;z-index:200;background:rgba(13,10,26,.85);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;}
.hint-modal{background:linear-gradient(160deg,rgba(26,20,48,.98),rgba(13,10,26,.99));border:1px solid rgba(212,168,67,.3);border-radius:24px;padding:28px 24px;width:min(340px,90vw);}
.hint-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.hint-modal-title{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--gold);letter-spacing:1px;}
.hint-modal-close{border:none;background:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;}
.hint-modal-body{font-size:14px;color:var(--text2);line-height:1.8;}
/* RESULT */
.result-screen{text-align:center;padding:20px 10px;}
.result-emoji{font-size:64px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(212,168,67,.4));}
.result-screen h2{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold2);margin-bottom:6px;letter-spacing:1px;}
.result-screen p{font-size:14px;color:var(--text2);margin-bottom:24px;}
.result-stats{display:flex;gap:12px;justify-content:center;margin-bottom:24px;}
.result-stat{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:16px 20px;min-width:80px;}
.rs-val{font-family:'Cinzel Decorative',serif;font-size:22px;font-weight:700;color:var(--gold2);}
.rs-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-top:4px;}
.retry-btn{width:100%;padding:16px;border-radius:14px;border:1px solid rgba(212,168,67,.35);background:linear-gradient(135deg,rgba(212,168,67,.12),rgba(155,109,204,.08));color:var(--gold2);font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:700;cursor:pointer;transition:.22s;margin-bottom:10px;letter-spacing:.5px;-webkit-user-select:none;user-select:none;}
.retry-btn:active{transform:scale(.97);}
/* PROGRESS */
.progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;cursor:default;}
.pc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pc-name{font-size:14px;font-weight:700;color:var(--text);}
.pc-pct{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--gold);}
.pc-bar{height:6px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden;}
.pc-fill{height:100%;background:linear-gradient(90deg,var(--plum),var(--gold));border-radius:99px;transition:width .8s ease;}
/* ===================== DICTIONARY ===================== */
.dict-search-bar{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;position:relative;}
.dict-search-icon{font-size:18px;flex-shrink:0;color:var(--muted);}
.dict-search-input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--text);font-family:'IranSans',sans-serif;text-align:right;}
.dict-search-input::placeholder{color:var(--muted);}
.dict-filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.dict-filters::-webkit-scrollbar{display:none;}
.dict-filter-btn{flex-shrink:0;padding:7px 16px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'IranSans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.22s;min-height:36px;-webkit-user-select:none;user-select:none;}
.dict-filter-btn.active{background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(155,109,204,.08));border-color:rgba(212,168,67,.45);color:var(--gold);}
.dict-word-list{display:flex;flex-direction:column;gap:8px;}
.dict-word-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:.22s;-webkit-user-select:none;user-select:none;position:relative;overflow:hidden;}
.dict-word-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--art-color,rgba(212,168,67,.3)),transparent);}
.dict-word-card:active{transform:scale(.98);}
.dict-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.dict-de-word{font-family:'Spectral',serif;font-size:20px;color:var(--text);direction:ltr;font-weight:600;}
.dict-art-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;flex-shrink:0;}
.art-der{background:rgba(64,160,240,.13);color:#5AAFE8;border:1px solid rgba(64,160,240,.35);}
.art-die{background:rgba(232,90,138,.1);color:var(--rose);border:1px solid rgba(232,90,138,.25);}
.art-das{background:rgba(80,210,130,.12);color:#4DCC8A;border:1px solid rgba(80,210,130,.3);}
.art-verb{background:rgba(212,168,67,.1);color:var(--gold);border:1px solid rgba(212,168,67,.25);}
.art-adj{background:rgba(240,200,100,.1);color:#f0c864;border:1px solid rgba(240,200,100,.25);}
.art-adv{background:rgba(93,219,168,.08);color:var(--mint);border:1px solid rgba(93,219,168,.2);}
.art-other{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.dict-fa{font-size:14px;color:var(--text2);font-weight:500;}
.dict-card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.dict-phonetic{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);direction:ltr;}
.dict-tags{display:flex;gap:5px;}
.dict-tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.dict-speak-btn{
  width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(155,109,204,.35);
  background:rgba(155,109,204,.1);
  color:var(--plum2);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;flex-shrink:0;
  box-shadow:0 2px 8px rgba(155,109,204,.1);
}
.dict-speak-btn:active{background:rgba(155,109,204,.25);transform:scale(.9);}
.dict-speak-btn.playing{background:rgba(155,109,204,.2);border-color:rgba(155,109,204,.6);}
/* DICT MODAL */
.dict-modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(13,10,26,.88);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom,0px);}
.dict-modal-box{background:linear-gradient(180deg,rgba(22,17,42,.99),rgba(13,10,26,.99));border:1px solid var(--border2);border-radius:28px 28px 0 0;padding:24px 22px 32px;width:min(480px,100%);max-height:82vh;overflow-y:auto;position:relative;animation:slideUp .35s cubic-bezier(.34,1.36,.64,1);}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.dict-modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--plum2) 70%,transparent);}
.dict-modal-handle{width:40px;height:4px;background:rgba(255,255,255,.1);border-radius:99px;margin:0 auto 20px;}
.dict-modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.dict-modal-word{font-family:'Spectral',serif;font-size:32px;color:var(--text);direction:ltr;font-weight:600;line-height:1.1;}
.dict-modal-phonetic{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);direction:ltr;margin-top:4px;}
.dict-modal-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.dict-modal-art{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:4px 14px;border-radius:99px;}
.dict-modal-speak{width:46px;height:46px;border-radius:50%;border:1px solid rgba(155,109,204,.45);background:rgba(155,109,204,.14);color:var(--plum2);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:0 4px 14px rgba(155,109,204,.18);}
.dict-modal-speak:active{background:rgba(155,109,204,.3);transform:scale(.92);}
.dict-modal-fa{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;}
.dict-modal-fa-sub{font-size:14px;color:var(--text2);margin-bottom:20px;}
.dict-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.dict-section-title{font-family:'Cinzel Decorative',serif;font-size:10px;color:var(--gold);letter-spacing:2px;margin-bottom:12px;}
.dict-conjugation-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dict-conj-cell{background:rgba(255,255,255,.03);border-radius:8px;padding:8px 10px;}
.dict-conj-pron{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.dict-conj-form{font-size:14px;color:var(--plum2);font-family:'JetBrains Mono',monospace;font-weight:700;}
.dict-example-row{background:rgba(212,168,67,.04);border:1px solid rgba(212,168,67,.12);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.dict-example-de{font-family:'Spectral',serif;font-size:16px;color:var(--text);direction:ltr;text-align:left;margin-bottom:4px;}
.dict-example-fa{font-size:13px;color:var(--text2);}
.dict-synonyms{display:flex;flex-wrap:wrap;gap:7px;}
.dict-synonym-chip{padding:5px 14px;border-radius:99px;background:rgba(155,109,204,.1);border:1px solid rgba(155,109,204,.2);color:var(--plum2);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;transition:.18s;}
.dict-synonym-chip:active{background:rgba(155,109,204,.25);}
.dict-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
.dict-count-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.dict-count-txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
/* PRONUNCIATION */
.pron-hero{background:linear-gradient(135deg,rgba(155,109,204,.12),rgba(93,219,168,.07));border:1px solid rgba(155,109,204,.3);border-radius:var(--r-xl);padding:20px 22px 18px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden;}
.pron-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--plum2) 35%,var(--mint) 65%,transparent);}
.pron-hero-title{font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--plum2),var(--mint));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;margin-bottom:5px;}
.pron-hero-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;}
.pron-streak-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(155,109,204,.15);}
.pron-streak-fire{font-size:20px;animation:fireWave .9s ease-in-out infinite alternate;}
.pron-streak-count{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--gold2);}
.pron-streak-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;}
.pron-streak-dots{display:flex;gap:5px;}
.pron-streak-dot{width:22px;height:22px;border-radius:50%;font-size:10px;display:grid;place-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:700;transition:.3s;}
.pron-streak-dot.lit{background:linear-gradient(135deg,rgba(212,168,67,.3),rgba(232,90,138,.18));border-color:rgba(212,168,67,.6);color:var(--gold2);box-shadow:0 0 8px rgba(212,168,67,.3);}
.pron-score-strip{display:flex;gap:10px;margin-bottom:16px;}
.pron-score-item{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 8px;text-align:center;}
.pron-score-val{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;color:var(--gold2);}
.pron-score-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-top:3px;}
.pron-word-card{background:rgba(255,255,255,.055);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:24px 20px 20px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.28);}
.pron-word-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(155,109,204,.3) 50%,transparent);}
.pron-de-word{font-family:'Spectral',serif;font-size:clamp(32px,9vw,56px);font-weight:700;line-height:1.1;word-break:break-word;color:var(--text);letter-spacing:.5px;text-shadow:0 0 24px rgba(155,109,204,.2);margin-bottom:6px;direction:ltr;transition:all .4s cubic-bezier(.34,1.56,.64,1);}
.pron-de-word.speaking{color:var(--plum2);text-shadow:0 0 40px rgba(155,109,204,.6);transform:scale(1.06);}
.pron-phonetic{font-family:'JetBrains Mono',monospace;font-size:clamp(12px,3.5vw,17px);color:var(--muted);opacity:.75;letter-spacing:1.5px;margin-bottom:8px;direction:ltr;}
.pron-fa-meaning{font-size:clamp(14px,4vw,18px);color:var(--text2);font-weight:700;background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.18);border-radius:99px;display:inline-block;padding:6px 18px;margin-top:4px;}
.pron-category-badge{position:absolute;top:14px;right:14px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--plum2);background:rgba(155,109,204,.12);border:1px solid rgba(155,109,204,.25);border-radius:99px;padding:4px 10px;}
.pron-diff-badge{position:absolute;top:14px;left:14px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;border-radius:99px;padding:4px 10px;}
.pron-diff-badge.easy{color:var(--mint);background:rgba(93,219,168,.1);border:1px solid rgba(93,219,168,.25);}
.pron-diff-badge.medium{color:var(--gold);background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.25);}
.pron-diff-badge.hard{color:var(--rose);background:rgba(232,90,138,.1);border:1px solid rgba(232,90,138,.25);}
.pron-stars-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;}
.pron-star{font-size:18px;opacity:.2;transition:.3s cubic-bezier(.34,1.56,.64,1);}
.pron-star.earned{opacity:1;filter:drop-shadow(0 0 6px var(--gold));animation:starPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}70%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.pron-attempts-row{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:8px;}
.pron-attempt-dot{width:8px;height:8px;border-radius:50%;transition:.3s;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);}
.pron-attempt-dot.wrong{background:rgba(232,90,138,.5);border-color:rgba(232,90,138,.7);}
.pron-tip-box{background:rgba(212,168,67,.05);border:1px solid rgba(212,168,67,.2);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;}

.pron-speed-btn{padding:6px 16px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;transition:.2s;-webkit-user-select:none;user-select:none;}
.pron-speed-btn.active{border-color:rgba(155,109,204,.5);background:rgba(155,109,204,.12);color:var(--plum2);}
.pron-speed-btn:active{transform:scale(.92);}
.pron-result{border-radius:var(--r);padding:16px 18px;margin:0 0 16px;text-align:center;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);display:none;border:1px solid transparent;}
.pron-result.show{display:block;}
.pron-result.correct{background:rgba(93,219,168,.07);border-color:rgba(93,219,168,.35);}
.pron-result.wrong{background:rgba(232,90,138,.07);border-color:rgba(232,90,138,.35);}

.pron-result-title{font-family:'Cinzel Decorative',serif;font-size:12px;font-weight:700;letter-spacing:1.5px;margin-bottom:5px;}
.pron-result.correct .pron-result-title{color:var(--mint);}
.pron-result.wrong .pron-result-title{color:var(--rose);}
.pron-result.partial .pron-result-title{color:var(--gold2);}
.pron-result-heard{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);direction:ltr;margin-top:4px;}
.pron-actions{display:flex;gap:10px;margin-bottom:14px;}
.pron-btn{flex:1;padding:14px 10px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'IranSans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.22s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;gap:7px;min-height:var(--touch);-webkit-user-select:none;user-select:none;}
.pron-btn.primary{background:linear-gradient(135deg,rgba(155,109,204,.18),rgba(93,219,168,.1));border-color:rgba(155,109,204,.4);color:var(--plum2);box-shadow:0 0 20px rgba(155,109,204,.1);}
.pron-btn:active{transform:scale(.95);}
.pron-cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.pron-cats::-webkit-scrollbar{display:none;}
.pron-cat-btn{flex-shrink:0;padding:8px 16px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'IranSans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.22s;min-height:38px;-webkit-user-select:none;user-select:none;}
.pron-cat-btn.active{background:linear-gradient(135deg,rgba(155,109,204,.2),rgba(93,219,168,.08));border-color:rgba(155,109,204,.5);color:var(--plum2);}
.mic-area{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0 8px;}
.mic-ring-outer{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:.3s cubic-bezier(.34,1.56,.64,1);-webkit-user-select:none;user-select:none;}
.mic-ring-outer::before,.mic-ring-outer::after{content:'';position:absolute;border-radius:50%;border:1px solid rgba(155,109,204,.2);animation:micRipple 2.5s ease-out infinite;}
.mic-ring-outer::before{width:100%;height:100%;}
.mic-ring-outer::after{width:130%;height:130%;animation-delay:.8s;}
@keyframes micRipple{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.35);opacity:0}}
.mic-ring-outer.listening::before,.mic-ring-outer.listening::after{border-color:rgba(232,90,138,.5);animation-duration:1.2s;}
.mic-ring-inner{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 10px 40px rgba(0,0,0,.3);transition:.3s cubic-bezier(.34,1.56,.64,1);}
.mic-ring-outer.listening .mic-ring-inner{background:rgba(90,255,220,.12);border-color:rgba(90,255,220,.45);box-shadow:0 0 40px rgba(90,255,220,.4);transform:scale(1.06);}
.mic-status-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);transition:.3s;}
.mic-status-label.listening{color:var(--rose);}
.mic-status-label.success{color:var(--mint);}
.mic-wave{display:flex;align-items:center;gap:3px;height:32px;opacity:0;transition:opacity .3s;}
.mic-wave.active{opacity:1;}
.mic-wave span{display:block;width:4px;border-radius:3px;background:linear-gradient(180deg,var(--rose),rgba(232,90,138,.3));height:4px;}
/* STATS GRID IN HOME */
.home-stats{display:flex;gap:8px;margin-bottom:16px;}
.home-stat{flex:1;background:rgba(255,255,255,.026);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:11px 8px;text-align:center;}
.home-stat-val{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold2);font-weight:700;line-height:1;}
.home-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:1px;}
</style>
</head>

<script>
/* ═══════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════ */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function getCtx(){if(!actx)actx=new AudioCtx();return actx;}
function playTone(freq,type,dur,vol=0.18,attack=0.008,release=0.18){try{const ctx=getCtx();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type=type;osc.frequency.value=freq;const now=ctx.currentTime;gain.gain.setValueAtTime(0,now);gain.gain.linearRampToValueAtTime(vol,now+attack);gain.gain.exponentialRampToValueAtTime(0.0001,now+dur);osc.start(now);osc.stop(now+dur+0.05);}catch(e){}}
function sfxCorrect(){playTone(523.25,'sine',.12,.15,.005,.1);setTimeout(()=>playTone(659.25,'sine',.12,.15,.005,.1),80);setTimeout(()=>playTone(783.99,'sine',.2,.12,.005,.18),160);}
function sfxWrong(){playTone(200,'sawtooth',.08,.12,.003,.08);setTimeout(()=>playTone(170,'sawtooth',.12,.1,.003,.12),70);}
function sfxTap(){playTone(880,'sine',.06,.06,.002,.06);}
function sfxNav(){playTone(660,'sine',.08,.07,.003,.07);}
function sfxLevelUp(){[392,523.25,659.25,783.99,1046.50].forEach((f,i)=>{setTimeout(()=>playTone(f,'sine',.22,.18,.005,.2),i*90);});}
function sfxConfetti(){[1047,1175,1319,1568].forEach((f,i)=>{setTimeout(()=>playTone(f,'triangle',.15,.1,.004,.14),i*70);});}

/* ═══════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════ */
(function(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const dots=Array.from({length:40},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.2+.2,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,alpha:Math.random()*.25+.04,clr:Math.random()>.6?'212,168,67':'155,109,204',twinkle:Math.random()*Math.PI*2}));
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);dots.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.twinkle+=.02;if(d.x<0)d.x=canvas.width;if(d.x>canvas.width)d.x=0;if(d.y<0)d.y=canvas.height;if(d.y>canvas.height)d.y=0;const a=d.alpha*(0.6+0.4*Math.sin(d.twinkle));ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=`rgba(${d.clr},${a})`;ctx.fill();});requestAnimationFrame(draw);}
  draw();
})();
function triggerConfetti(){const canvas=document.getElementById('particles');const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;const colors=['rgba(212,168,67,.9)','rgba(155,109,204,.9)','rgba(93,219,168,.9)','rgba(232,90,138,.9)'];const pieces=Array.from({length:60},()=>({x:W/2+(Math.random()*220-110),y:H*.35,vx:(Math.random()-.5)*10,vy:Math.random()*-14-5,r:Math.random()*4.5+2,color:colors[Math.floor(Math.random()*colors.length)],life:1,rot:Math.random()*360,shape:Math.random()>.5?'rect':'circle'}));function step(){pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.32;p.life-=.016;p.rot+=5;ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;if(p.shape==='rect')ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}ctx.restore();});if(pieces.some(p=>p.life>0))requestAnimationFrame(step);}requestAnimationFrame(step);sfxConfetti();}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const state={xp:0,level:1,totalXP:0,progress:{},currentTopic:null,currentQuizIndex:0,currentQuiz:[],score:0,dictQuery:'',dictCat:'همه'};

/* ═══════════════════════════════════════════
   SPEECH
═══════════════════════════════════════════ */
function speak(text){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=0.82;speechSynthesis.speak(u);}
function speakWithAnim(btn,text){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=0.82;if(btn){btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');u.onerror=()=>btn.classList.remove('playing');}speechSynthesis.speak(u);}
function toggleSpeak(btn,text){if(!('speechSynthesis' in window))return;if(btn&&btn.classList.contains('playing')){speechSynthesis.cancel();btn.classList.remove('playing');return;}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=0.82;if(btn){btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');u.onerror=()=>btn.classList.remove('playing');}speechSynthesis.speak(u);}

/* ═══════════════════════════════════════════
   XP
═══════════════════════════════════════════ */
function addXP(n){const prev=state.level;state.xp+=n;state.totalXP+=n;state.level=Math.floor(state.totalXP/100)+1;updateXPBar();showXPToast(n);if(state.level>prev)sfxLevelUp();}
function updateXPBar(){const p=state.totalXP%100;document.getElementById('xpFill').style.width=p+'%';const r=['I','II','III','IV','V','VI','VII','VIII','IX','X'];document.getElementById('levelLabel').textContent='LEKTION '+(r[state.level-1]||state.level);document.getElementById('xpLabel').textContent=p+' / 100 XP';document.getElementById('totalXP').textContent=state.totalXP;}
function showXPToast(n){const t=document.createElement('div');t.className='xp-toast';t.textContent='+ '+n+' XP';document.body.appendChild(t);setTimeout(()=>t.remove(),1500);}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function showScreen(id,btn){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(btn){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}sfxNav();}

/* ═══════════════════════════════════════════
   GRAMMAR DATA & QUIZ GENERATORS
═══════════════════════════════════════════ */
function generatePronounQuiz(){return[{type:'mcq',q:'کدام ضمیر برای «ما» استفاده می‌شود؟',options:['ich','wir','ihr','sie'],answer:'wir'},{type:'mcq',q:'ضمیر مناسب برای «او (زن)» چیست؟',options:['er','es','sie','du'],answer:'sie'},{type:'scramble',q:'جمله را مرتب کن:',words:['lernt','er','Deutsch'],answer:'er lernt Deutsch'},{type:'mcq',q:'«Sie» با S بزرگ یعنی چه؟',options:['او (زن)','آن‌ها','شما (رسمی)','ما'],answer:'شما (رسمی)'},{type:'fill',q:'___ bin Student. (من)',answer:'Ich',hint:'ضمیر اول شخص مفرد'},{type:'listen',q:'بشنو - کدام ضمیر است؟',text:'Wir lernen Deutsch.',options:['ich','du','wir','sie'],answer:'wir'},{type:'mcq',q:'ضمیر «آن» (خنثی) چیست؟',options:['er','sie','es','ihr'],answer:'es'},{type:'fill',q:'___ seid Studenten. (شما - جمع)',answer:'Ihr',hint:'ضمیر دوم شخص جمع غیررسمی'}];}
function generatePraesensQuiz(){return[{type:'mcq',q:'صرف «machen» برای «du»:',options:['mache','machst','macht','machen'],answer:'machst'},{type:'fill',q:'Er ___ Deutsch. (sprechen - نامنظم)',answer:'spricht',hint:'نامنظم: a → i'},{type:'mcq',q:'کدام صرف «gehen» برای «wir» درست است؟',options:['geht','gehst','gehen','gehe'],answer:'gehen'},{type:'scramble',q:'جمله را مرتب کن:',words:['du','Hausaufgaben','machst'],answer:'du machst Hausaufgaben'},{type:'mcq',q:'پسوند منظم برای «ich» چیست؟',options:['-st','-t','-e','-en'],answer:'-e'},{type:'listen',q:'بشنو - کدام صرف درست است؟',text:'Sie gehen in die Schule.',options:['geht','gehst','gehen','gehe'],answer:'gehen'},{type:'fill',q:'Ihr ___ sehr gut. (arbeiten)',answer:'arbeitet',hint:'ihr → -et'},{type:'mcq',q:'کدام فعل نامنظم است؟',options:['machen','spielen','sprechen','lernen'],answer:'sprechen'}];}
function generateSeparableQuiz(){return[{type:'mcq',q:'«aufstehen» یعنی چه؟',options:['خرید کردن','بیدار شدن','رفتن','دیدن'],answer:'بیدار شدن'},{type:'mcq',q:'«anrufen» یعنی چه؟',options:['بیدار شدن','خرید کردن','تلفن زدن','رفتن'],answer:'تلفن زدن'},{type:'scramble',q:'جمله را مرتب کن:',words:['auf','er','macht','die Tür'],answer:'er macht die Tür auf'},{type:'mcq',q:'پیشوند در جمله کجا می‌رود؟',options:['اول جمله','بعد از فعل','آخر جمله','قبل از موضوع'],answer:'آخر جمله'},{type:'listen',q:'بشنو - کدام فعل جداشدنی است؟',text:'Ich sehe heute fern.',options:['sehen','fernsehen','stehen','gehen'],answer:'fernsehen'},{type:'fill',q:'Er ___ seine Mutter ___. (anrufen)',answer:'ruft an',hint:'پیشوند «an» جدا می‌شود'},{type:'mcq',q:'«mitkommen» در جمله - پیشوند کجاست؟',options:['اول','وسط','آخر','بعد از Sie'],answer:'آخر'}];}

{id:'conjunctions',icon:'🔗',name:'حروف ربط',sub:'und · aber · oder · denn',clr:'rgba(155,109,204,.55)',tint:'rgba(155,109,204,.06)',explain:{title:'حروف ربط ساده (Konjunktionen)',body:'حروف ربط هماهنگ‌کننده دو جمله یا بخش را به هم وصل می‌کنند و ترتیب کلمات را تغییر نمی‌دهند.',table:[['und','و','Ich lerne und er schläft.'],['aber','اما / ولی','Er ist müde, aber er lernt.'],['oder','یا','Kommst du oder gehst du?'],['denn','چون / زیرا','Ich lerne, denn ich will gut sein.'],['sondern','بلکه (بعد از نفی)','Er ist nicht groß, sondern klein.']],tableHeaders:['حرف ربط','معنی','مثال'],rules:['ترتیب V2 بعد از حروف ربط حفظ می‌شود','قبل از aber و sondern ویرگول می‌آید'],examples:[{de:'Ich trinke Tee und sie trinkt Kaffee.',fa:'من چای می‌نوشم و او قهوه می‌نوشد.'},{de:'Er ist müde, aber er arbeitet.',fa:'او خسته است، اما کار می‌کند.'},{de:'Kommst du mit oder gehst du heim?',fa:'می‌آیی یا به خانه می‌روی؟'}]},quiz:generateConjunctionsQuiz()},

{id:'nebensatz',icon:'🔀',name:'جمله پیرو',sub:'Nebensatz · Hauptsatz · dass',clr:'rgba(93,219,168,.55)',tint:'rgba(93,219,168,.06)',badge:'A2',explain:{title:'جمله اصلی و پیرو (Haupt- & Nebensatz)',body:'در آلمانی می‌توانیم دو جمله را با حروف ربط تبعی مانند «dass» ترکیب کنیم. در Nebensatz (جمله پیرو)، فعل به آخر جمله می‌رود.',table:[['Hauptsatz','جمله اصلی','Ich weiß, ...'],['Nebensatz + dass','... که','... dass er kommt.'],['Ich glaube, dass...','فکر می‌کنم که...','فعل آخر'],['Er sagt, dass...','می‌گوید که...','فعل آخر'],['Ich hoffe, dass...','امیدوارم که...','فعل آخر']],tableHeaders:['ساختار','معنی','نکته'],rules:['Nebensatz: فعل به آخر می‌رود','قبل از dass ویرگول می‌آید','Modal در Nebensatz هم آخر می‌آید'],examples:[{de:'Ich weiß, dass er morgen kommt.',fa:'می‌دانم که او فردا می‌آید.'},{de:'Er glaubt, dass sie müde ist.',fa:'فکر می‌کند که او خسته است.'},{de:'Ich hoffe, dass du gesund bist.',fa:'امیدوارم که سالم باشی.'}]},quiz:generateNebensatzQuiz()},
{id:'weilDa',icon:'💡',name:'دلیل: weil و da',sub:'weil · da · Nebensatz',clr:'rgba(232,90,138,.55)',tint:'rgba(232,90,138,.05)',badge:'A2',explain:{title:'بیان دلیل با weil و da',body:'«weil» و «da» هر دو به معنی «چون / زیرا» هستند و یک Nebensatz می‌سازند - فعل به آخر می‌رود.',table:[['weil','چون - دلیل ناشناخته','Ich schlafe, weil ich müde bin.'],['da','چون - دلیل شناخته‌شده','Da es regnet, bleibe ich zu Hause.'],['weil','محاوره‌ای‌تر','بیشتر در گفتگو'],['da','رسمی‌تر','بیشتر در نوشتار']],tableHeaders:['کلمه','کاربرد','مثال'],rules:['فعل در Nebensatz با weil/da به آخر می‌رود','da اغلب اول جمله می‌آید','weil اغلب در وسط جمله می‌آید'],examples:[{de:'Ich lerne Deutsch, weil ich in Deutschland arbeiten will.',fa:'آلمانی یاد می‌گیرم چون می‌خواهم در آلمان کار کنم.'},{de:'Da das Wetter schön ist, gehen wir spazieren.',fa:'چون هوا خوب است پیاده‌روی می‌کنیم.'},{de:'Er bleibt zu Hause, weil er krank ist.',fa:'خانه می‌ماند چون بیمار است.'}]},quiz:generateWeilDaQuiz()},

function generateAkkusativQuiz(){return[
  {type:'mcq',q:'Akkusativ جواب کدام سؤال است؟',options:['wer? (که)','wem? (به که)','wen/was? (که/چه را)','wessen? (مال که)'],answer:'wen/was? (که/چه را)'},
  {type:'mcq',q:'آرتیکل «der Mann» در Akkusativ چه می‌شود؟',options:['der Mann','dem Mann','den Mann','des Mannes'],answer:'den Mann'},
  {type:'fill',q:'Ich sehe ___ Mann. (مذکر - Akkusativ)',answer:'den',hint:'مذکر در Akkusativ: der → den'},
  {type:'mcq',q:'«die Frau» در Akkusativ:',options:['der Frau','dem Frau','die Frau','den Frau'],answer:'die Frau'},
  {type:'scramble',q:'مرتب کن:',words:['kauft','einen','Er','Kaffee'],answer:'Er kauft einen Kaffee'},
  {type:'mcq',q:'«das Kind» در Akkusativ:',options:['dem Kind','des Kindes','das Kind','den Kind'],answer:'das Kind'},
  {type:'fill',q:'Sie liebt ___ Katze. (مؤنث - die)',answer:'die',hint:'مؤنث و خنثی در Akkusativ تغییر نمی‌کنند'},
  {type:'listen',q:'بشنو - مفعول مستقیم کدام است؟',text:'Ich kaufe einen Apfel.',options:['Ich','kaufe','einen Apfel','kein'],answer:'einen Apfel'},
  {type:'mcq',q:'حرف اضافه‌ای که همیشه Akkusativ می‌سازد:',options:['mit','bei','durch','seit'],answer:'durch'},
  {type:'fill',q:'Er geht ___ die Tür. (durch)',answer:'durch die',hint:'durch + Akkusativ'},
  {type:'mcq',q:'نامعرفه مذکر در Akkusativ:',options:['ein','einem','einen','einer'],answer:'einen'},
  {type:'mcq',q:'«für» کدام حالت می‌سازد؟',options:['Nominativ','Dativ','Akkusativ','Genitiv'],answer:'Akkusativ'}
];}

  {type:'listen',q:'بشنو - Akkusativ یا Dativ؟',text:'Ich hänge das Bild an die Wand.',options:['Dativ (wo?)','Akkusativ (wohin?)'],answer:'Akkusativ (wohin?)'}

   HOME
═══════════════════════════════════════════ */
function renderHome(){
  const totalDone=Object.values(state.progress).filter(v=>v>=90).length;
  const avgProgress=Math.round(Object.values(state.progress).reduce((a,b)=>a+b,0)/TOPICS.length);
  const el=document.getElementById('homeContent');
  el.innerHTML=`
    <div class="streak-banner">
      <div class="streak-fire">🔥</div>
      <div class="streak-info">
        <div class="streak-num">۱ روز streak</div>
        <div class="streak-lbl">امروز رو حفظ کن!</div>
      </div>
      <div class="streak-dots">
        <div class="streak-dot done">✓</div>
        <div class="streak-dot">٢</div>
        <div class="streak-dot">٣</div>
        <div class="streak-dot">٤</div>
        <div class="streak-dot">٥</div>
      </div>
    </div>
    <div class="home-stats">
      <div class="home-stat"><div class="home-stat-val">${state.totalXP}</div><div class="home-stat-lbl">XP</div></div>
      <div class="home-stat"><div class="home-stat-val">${totalDone}</div><div class="home-stat-lbl">DONE</div></div>
      <div class="home-stat"><div class="home-stat-val">${avgProgress}%</div><div class="home-stat-lbl">PROGRESS</div></div>
    </div>
    <div class="sec-title">گرامر A1 · ۱۲ موضوع</div>
    <div class="topics-grid" id="topicsGridA1"></div>
    <div class="sec-title" style="margin-top:22px;">گرامر A2 · ۱۰ موضوع</div>
    <div class="topics-grid" id="topicsGridA2"></div>
    <div style="height:8px;"></div>
  `;
  const a1Topics=TOPICS.filter(t=>!t.badge);
  const a2Topics=TOPICS.filter(t=>t.badge==='A2');
  function buildGrid(list){return list.map((t)=>{
    const pct=state.progress[t.id]||0;
    const done=pct>=90;
    return `<div class="topic-card" style="--tc-line:${t.clr};--tc-tint:${t.tint};opacity:0;transform:translateY(8px);" onclick="openTopic('${t.id}');sfxTap();">
      <div class="t-right">
        ${done?`<div class="t-badge">✦</div>`:(pct>0?`<div class="t-pct">${pct}%</div>`:'')}
        <div class="t-prog"><div class="t-prog-fill" style="width:${pct}%"></div></div>
      </div>
      <span class="t-icon">${t.icon}</span>
      <div class="t-main">
        <div class="t-name">${t.name}</div>
        <div class="t-sub">${t.sub}</div>
      </div>
    </div>`;
  }).join('');}
  document.getElementById('topicsGridA1').innerHTML=buildGrid(a1Topics);
  document.getElementById('topicsGridA2').innerHTML=buildGrid(a2Topics);
  setTimeout(()=>{
    document.querySelectorAll('.topic-card').forEach((c,i)=>{
      setTimeout(()=>{c.style.transition='.35s cubic-bezier(.34,1.36,.64,1)';c.style.opacity='1';c.style.transform='translateY(0)';},i*30);
    });
  },50);
}

/* ═══════════════════════════════════════════

function openTopic(id){
  sfxTap();
  const topic=TOPICS.find(t=>t.id===id);
  state.currentTopic=topic;
  showScreen('lessonScreen');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const e=topic.explain;
  const hasH=e.tableHeaders;
  const rows=e.table.map(r=>`<tr>${r.map((c,i)=>`<td class="${i===0?'de':'fa'}">${c}</td>`).join('')}</tr>`).join('');
  const examples=e.examples.map(ex=>`<div class="example-row">
    <div class="example-de">${ex.de}</div>
    <div class="example-fa-row">
      <span class="example-fa">${ex.fa}</span>
      <button class="speak-mini" onclick="speakWithAnim(this,'${ex.de.replace(/'/g,"\\'")}');sfxTap();"><span class="speak-eq"><span></span><span></span><span></span><span></span></span><span class="speak-text">بشنو</span></button>
    </div>
  </div>`).join('');
  const rules=e.rules.map(r=>`<div class="rule-item"><span class="rule-dot">◈</span><span class="rule-text">${r}</span></div>`).join('');
  document.getElementById('lessonContent').innerHTML=`
    <button class="back-btn" onclick="showScreen('homeScreen');renderHome();">← بازگشت</button>
    <div class="lesson-header">
      <div class="lesson-header-top">
        <span class="lesson-topic-icon">${topic.icon}</span>
        <div>
          <div class="lesson-title">${e.title}</div>
          <div class="lesson-sub">${topic.sub}</div>
        </div>
      </div>
    </div>
    <div class="lesson-divider"></div>

    <div class="lesson-section">
      <div class="lesson-section-label">توضیح</div>
      <div class="lesson-body">${e.body}</div>
    </div>

    <div class="lesson-section">
      <div class="lesson-section-label">جدول</div>
      <div class="table-wrap">
        <table>${hasH?`<tr>${e.tableHeaders.map(h=>`<th>${h}</th>`).join('')}</tr>`:''}${rows}</table>
      </div>
    </div>

    <div class="lesson-section">
      <div class="lesson-section-label">قوانین کلیدی</div>
      <div class="rules-list">${rules}</div>
    </div>

    <div class="lesson-section">
      <div class="lesson-section-label">مثال‌ها</div>
      ${examples}
    </div>

    <button class="start-quiz-btn" onclick="startQuiz()">شروع آزمون · ${topic.quiz.length} سوال ←</button>
  `;
  document.getElementById('lessonScreen').scrollTop=0;

/* ═══════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════ */
function startQuiz(){sfxTap();state.currentQuiz=state.currentTopic.quiz;state.currentQuizIndex=0;state.score=0;showScreen('quizScreen');renderQuestion();}
function renderQuestion(){
  const q=state.currentQuiz[state.currentQuizIndex];
  const total=state.currentQuiz.length,idx=state.currentQuizIndex;
  const typeLabel={mcq:'انتخاب چندگزینه‌ای',scramble:'مرتب‌سازی',fill:'پر کردن جای خالی',listen:'گوش دادن'}[q.type]||q.type;
  let bodyHTML='';
  if(q.type==='mcq'||q.type==='listen'){
    if(q.type==='listen'){bodyHTML=`<button class="listen-btn" onclick="toggleSpeak(this,'${q.text.replace(/'/g,"\\'")}');sfxTap();">
      <div class="listen-btn-play"><div class="listen-play-circle"><div class="listen-play-icon"></div></div></div>
      <div class="listen-btn-body"><span class="listen-btn-label">بشنو و انتخاب کن</span><div class="listen-btn-bars"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
    </button>`;}
    bodyHTML+=`<div class="options-grid">${q.options.map(o=>`<button class="option-btn" onclick="checkMCQ(this,'${o.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}');sfxTap();">${o}</button>`).join('')}</div>`;
  }else if(q.type==='scramble'){
    const shuffled=[...q.words].sort(()=>Math.random()-.5);
    const chipsHTML=shuffled.map((w,i)=>`<div class="word-chip bank" id="bankChip_${i}" data-word="${w.replace(/"/g,'&quot;')}" onclick="placeWord(this);sfxTap();">${w}</div>`).join('');
    bodyHTML=`<div class="scramble-sentence" id="scrambleSentence"></div>
    <div class="word-bank" id="wordBank">${chipsHTML}</div>
    <input type="hidden" id="scrambleAnswer" value="${q.answer.replace(/"/g,'&quot;')}"/>
    <button class="check-btn" onclick="checkScramble();sfxTap();">✦ تأیید</button>`;
  }else if(q.type==='fill'){
    bodyHTML=`${q.hint?`<button class="hint-btn" onclick="showHintModal('${q.hint.replace(/'/g,"\\'")}');sfxTap();">💡 راهنما</button>`:''}
    <input class="fill-input" id="fillInput" placeholder="پاسخ را اینجا بنویس..." autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="check-btn" onclick="checkFill('${q.answer.replace(/'/g,"\\'")}')">✦ تأیید</button>`;
  }
  document.getElementById('quizContent').innerHTML=`
    <div class="quiz-hud">
      <div class="quiz-counter">${idx+1}/${total}</div>
      <div class="quiz-track"><div class="quiz-track-fill" style="width:${Math.round((idx/total)*100)}%"></div></div>
      <div class="quiz-score-badge">✦ ${state.score}</div>
    </div>
    <div class="quiz-card">
      <span class="quiz-type-tag">${typeLabel}</span>
      <div class="quiz-q">${q.q}</div>
    </div>
    ${bodyHTML}
    <div class="feedback-box" id="feedbackBox"><div class="fb-title" id="fbTitle"></div><div class="fb-text" id="fbText"></div></div>
    <button class="action-btn" id="nextBtn" onclick="nextQuestion()">بعدی ←</button>
  `;
  if(q.type==='listen'){setTimeout(()=>{const lb=document.querySelector('.listen-btn');if(lb)toggleSpeak(lb,q.text);},350);}
  document.getElementById('quizScreen').scrollTop=0;
}
function placeWord(el){
  const word=el.dataset.word;
  const srcId=el.id;
  const s=document.getElementById('scrambleSentence');
  const c=document.createElement('div');
  c.className='word-chip placed';
  c.dataset.word=word;
  c.dataset.srcId=srcId;
  c.textContent=word;
  c.onclick=()=>{
    s.removeChild(c);
    const src=document.getElementById(srcId);
    if(src)src.classList.remove('used');
    sfxTap();
  };
  s.appendChild(c);
  el.classList.add('used');
}
function checkMCQ(btn,chosen,answer){document.querySelectorAll('.option-btn').forEach(b=>b.classList.add('disabled'));if(chosen===answer){btn.classList.add('correct');showFeedback(true,'✦ RICHTIG · درست!','پاسخ صحیح است. آفرین!');state.score++;addXP(10);sfxCorrect();}else{btn.classList.add('wrong');document.querySelectorAll('.option-btn').forEach(b=>{if(b.textContent===answer)b.classList.add('correct');});showFeedback(false,'✗ FALSCH · اشتباه',`پاسخ درست: ${answer}`);sfxWrong();}document.getElementById('nextBtn').style.display='block';}
function checkScramble(){
  const s=document.getElementById('scrambleSentence');
  const answerEl=document.getElementById('scrambleAnswer');
  if(!answerEl)return;
  const answerRaw=answerEl.value;
  const chips=Array.from(s.querySelectorAll('.word-chip'));
  if(chips.length===0){showFeedback(false,'✗ جمله خالی است','کلمات را مرتب کن');return;}
  // Reconstruct placed sentence from dataset.word (preserves multi-word chips like "zu Hause")
  const placedWords=chips.map(c=>c.dataset.word||c.textContent.trim());
  const placed=placedWords.join(' ').replace(/\s+/g,' ').trim();
  const ans=answerRaw.replace(/\s+/g,' ').trim();
  if(placed===ans){
    showFeedback(true,'✦ RICHTIG · درست!','ترتیب کلمات صحیح است.');
    state.score++;addXP(15);sfxCorrect();
  }else{
    showFeedback(false,'✗ FALSCH · اشتباه',`پاسخ درست: ${ans}`);
    sfxWrong();
  }
  document.querySelector('.check-btn').disabled=true;
  document.getElementById('nextBtn').style.display='block';
}
function checkFill(answer){const input=document.getElementById('fillInput');const val=input.value.trim();const correct=val.toLowerCase()===answer.toLowerCase();input.disabled=true;if(correct){input.style.borderColor='rgba(93,219,168,.4)';input.style.boxShadow='0 0 0 4px rgba(93,219,168,.1)';showFeedback(true,'✦ RICHTIG · درست!','پاسخ صحیح است.');state.score++;addXP(12);sfxCorrect();}else{input.style.borderColor='rgba(232,90,138,.4)';input.style.boxShadow='0 0 0 4px rgba(232,90,138,.1)';showFeedback(false,'✗ FALSCH · اشتباه',`پاسخ درست: ${answer}`);sfxWrong();}document.querySelector('.check-btn').disabled=true;document.getElementById('nextBtn').style.display='block';}
function showFeedback(ok,title,text){const box=document.getElementById('feedbackBox');box.className='feedback-box '+(ok?'correct':'wrong');box.style.display='block';document.getElementById('fbTitle').textContent=title;document.getElementById('fbText').textContent=text;}
function nextQuestion(){sfxTap();state.currentQuizIndex++;if(state.currentQuizIndex>=state.currentQuiz.length)showResult();else renderQuestion();}

/* ═══════════════════════════════════════════
   RESULT
═══════════════════════════════════════════ */
function showResult(){
  const total=state.currentQuiz.length,score=state.score,pct=Math.round((score/total)*100);
  const prev=state.progress[state.currentTopic.id]||0;
  state.progress[state.currentTopic.id]=Math.max(prev,pct);
  let emoji='😅',msg='دوباره تلاش کن!';
  if(pct>=90){emoji='🏆';msg='MEISTER · استاد شدی!';}
  else if(pct>=70){emoji='🎉';msg='SEHR GUT · خوب بود!';}
  else if(pct>=50){emoji='💪';msg='WEITER SO · ادامه بده!';}
  document.getElementById('resultScreen').innerHTML=`
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <h2>${msg}</h2>
      <p>${state.currentTopic.name}</p>
      <div class="result-stats">
        <div class="result-stat"><div class="rs-val">${score}/${total}</div><div class="rs-label">CORRECT</div></div>
        <div class="result-stat"><div class="rs-val">${pct}%</div><div class="rs-label">SCORE</div></div>
        <div class="result-stat"><div class="rs-val">+${score*10}</div><div class="rs-label">XP</div></div>
      </div>
      <button class="retry-btn" onclick="startQuiz()">↺ دوباره آزمون بده</button>
      <button class="retry-btn" style="border-color:rgba(155,109,204,.35);background:linear-gradient(135deg,rgba(155,109,204,.12),rgba(212,168,67,.06));" onclick="openTopic('${state.currentTopic.id}')">◈ مرور درس</button>
      <button class="retry-btn" style="border-color:var(--border);background:var(--surface);color:var(--text2);" onclick="showScreen('homeScreen');renderHome();">⌂ بازگشت به خانه</button>
    </div>
  `;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('resultScreen').classList.add('active');
  document.getElementById('resultScreen').scrollTop=0;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  triggerConfetti();
}

  document.getElementById('progressList').innerHTML=`
